  { id:"john", name:"John", tag:"The mystic. The one Jesus loved.", era:"AD 60-100", connection:"The inner three · Revelation · I AM WHO I AM", books:["Gospel of John","1, 2, 3 John","Revelation"],
    story:"One of the twelve, son of Zebedee. Jesus nicknamed him and his brother Boanerges, sons of thunder. He once asked Jesus if they could call down fire on a Samaritan village that refused to receive them. Jesus rebuked them. He was in the inner three, Peter, James, John, at the Transfiguration and at Gethsemane. He stood at the foot of the cross and was given Mary, Jesus' mother, to care for.\n\nHe wrote the most mystical and theologically dense gospel, the three letters that reduce the entire Christian life to one word, love, and the Revelation, which he received on the island of Patmos in exile.\n\nRead him when you need to understand that God is not just powerful but intimate. His gospel opens with the claim that Jesus is the Word through whom everything was made. His letters claim that God is love, not that God is loving, but that love is what God is.",
    keyVerse:"John 1:1", keyVerseText:"In the beginning was the Word, and the Word was with God, and the Word was God.",
    bridge:"John wrote the gospel that opens with ’In the beginning was the Word.’ He understood that language itself is sacred, that naming something is an act of power. Black women have always known that who gets to name you matters. John gave the last word back to God." },
  { id:"ruth-author", name:"Ruth (the book)", tag:"The author is unknown. The story is not.", era:"BC 1100", connection:"Ancestor of David · ancestor of Jesus", books:["Ruth"],
    story:"The book of Ruth is a short story told with the precision and craft of a novel. It is set during the time of the judges. The author is unknown, one of the few books of Scripture where no authorship is attributed. It is one of only two books of the Bible named after women.\n\nThe book is notable for its literary construction, its layered use of hesed throughout, and its gentle movement from emptiness to fullness. It reads in a single sitting. Every word earns its place.\n\nRead it when you need to understand that ordinary faithfulness in ordinary circumstances is the soil in which God grows extraordinary things. Read it when you need to know that loyalty to the people God gives you is itself a form of worship.",
    keyVerse:"Ruth 1:16", keyVerseText:"Where you go I will go, and where you stay I will stay. Your people will be my people and your God my God.",
    bridge:"Whoever wrote Ruth understood that faithfulness is not always dramatic. It is a woman choosing to stay when she has permission to leave. It is showing up for someone else's family as if it were your own. That kind of love has kept Black communities alive for centuries. It did not start with us." },
  { id:"isaiah", name:"Isaiah", tag:"The one who said yes in the throne room.", era:"BC 740-700", connection:"Prophecied Jesus in detail 700 years before his birth", books:["Isaiah"],
    story:"Isaiah son of Amoz was a prophet in Jerusalem during the reigns of four kings. He had direct access to the royal court. He had a vision of God in the temple in the year King Uzziah died, the Lord seated on a throne, seraphim calling holy, holy, holy. He said: woe to me, I am ruined, for I am a man of unclean lips. A seraph touched his lips with a coal from the altar. He heard: who will go for us? He said: here I am. Send me.\n\nHe wrote the most poetically sophisticated prophetic literature in the Hebrew Bible. The second half of the book contains what scholars call the servant songs, precise prophetic descriptions of Jesus written seven hundred years before his birth.\n\nRead him when you need to understand the holiness of God. Read him when you need a word larger than your circumstances. Isaiah chapter 40 begins: comfort, comfort my people. It ends: those who hope in the Lord will renew their strength. They will soar on wings like eagles.",
    keyVerse:"Isaiah 40:31", keyVerseText:"Those who hope in the Lord will renew their strength. They will soar on wings like eagles; they will run and not grow weary, they will walk and not be faint.",
    bridge:"Isaiah 43, ’I have called you by name, you are mine’, has been spoken over Black women in their darkest moments since the first time someone dared to believe it was for them too. Isaiah wrote to people in exile who wondered if God had forgotten their address. He had not. He has not." },
  { id:"matthew", name:"Matthew", tag:"The tax collector who became an eyewitness.", era:"AD 60-70", connection:"Disciple of Jesus · eyewitness account", books:["Matthew"],
    story:"Matthew was a tax collector in Capernaum when Jesus walked by and said: follow me. Tax collectors were despised, they worked for Rome, they overcharged, they were considered traitors. Matthew left immediately. He hosted a dinner for Jesus at his house and invited all the other tax collectors he knew. The Pharisees complained about the company Jesus kept. Jesus said: it is not the healthy who need a doctor.\n\nMatthew's gospel is the most Jewish of the four. He quotes the Old Testament more than any other gospel writer. He was writing primarily for Jewish Christians who needed to understand that Jesus was the fulfillment of everything their Scriptures pointed toward. His genealogy opens with Abraham, the father of the Jewish nation, and traces the line directly to Jesus.\n\nRead him when you need to understand how the Old Testament points to Jesus. Read him when you need the Sermon on the Mount. Read him when you need to be reminded that the people Jesus chose were the ones everyone else had already written off.",
    keyVerse:"Matthew 28:20", keyVerseText:"And surely I am with you always, to the very end of the age.",
    bridge:"Matthew was a tax collector, a collaborator with Rome, despised by his own people. Jesus chose him anyway and then gave him the assignment of writing the genealogy that includes five women the religious establishment would have erased. Matthew knew what it felt like to be written off. He wrote everyone back in." },
  { id:"mark", name:"Mark", tag:"Peter's interpreter. The fastest gospel.", era:"AD 55-65", connection:"Companion of Peter · companion of Paul", books:["Mark"],
    story:"Mark was not one of the twelve. He was John Mark, nephew of Barnabas, companion of Paul and Barnabas on their first missionary journey. He left early and went home, which caused a split between Paul and Barnabas so sharp that they separated. Later, Paul and Mark reconciled. Paul called him useful to me for ministry.\n\nBut Mark's primary source was Peter. The early church fathers consistently identify Mark's gospel as Peter's testimony filtered through Mark's pen. Mark was Peter's interpreter, literally translating his Aramaic into Greek for Roman audiences. This is why Mark's gospel reads differently than the others: it is fast, concrete, action-driven. The word immediately appears over forty times. Mark wrote down what Peter preached, and Peter preached to people who needed the story told quickly and with authority.\n\nRead him when you need the gospel at speed. Read him when the theological complexity of Paul feels heavy and you need to return to: Jesus came, Jesus healed, Jesus died, Jesus rose.",
    keyVerse:"Mark 10:45", keyVerseText:"Even the Son of Man did not come to be served, but to serve, and to give his life as a ransom for many.",
    bridge:"Mark's gospel is the shortest and the fastest. No genealogy. No birth narrative. Just: Jesus showed up and started healing people. For Black women who are exhausted by preamble and need someone to get to the point, Mark wrote for you. The kingdom is urgent. It does not wait for proper introduction." },
  { id:"luke", name:"Luke", tag:"The physician who interviewed everyone.", era:"AD 60-80", connection:"Companion and co-laborer of Paul", books:["Luke","Acts"],
    story:"Luke was a physician. He was a Gentile, the only non-Jewish author in the New Testament. He traveled with Paul for significant portions of the third missionary journey. The sections of Acts where the narrative shifts to we are the places where Luke was present.\n\nBefore he wrote his gospel, Luke tells us he carefully investigated everything from the beginning. He interviewed eyewitnesses. He examined sources. He was writing for Theophilus, most likely a high-ranking Roman official, and he needed to present the case for Jesus with historical precision. Luke's gospel includes more stories about women than any other. He is the one who records the Magnificat, the story of Anna, the healing of the woman bent double, the widow of Nain, the woman who lost a coin and swept the whole house.\n\nHe also wrote Acts, the only history of the early church we have. Read Luke when you need to understand that the gospel was always for everyone. Read Acts when you need to be reminded that the church was not always institutional. Once it was just people carrying fire from house to house.",
    keyVerse:"Luke 4:18", keyVerseText:"The Spirit of the Lord is on me, because he has anointed me to proclaim good news to the poor.",
    bridge:"Luke was a doctor and the only Gentile author in the New Testament. He interviewed people. He listened carefully. He is the one who gave us Mary's Magnificat, a young Black-skinned woman from a colonized nation singing that God lifts the humble and sends the powerful away empty. Luke knew whose story that was." },
  { id:"peter", name:"Peter", tag:"The one who denied Jesus three times and built the church.", era:"AD 55-65", connection:"One of the twelve · Jesus renamed him Rock", books:["1 Peter","2 Peter"],
    story:"Simon was a fisherman when Andrew brought him to meet Jesus. Jesus looked at him and said: you are Simon son of John. You will be called Cephas, which means Peter, which means rock. He was impulsive, bold, frequently wrong, frequently rebuked, and one of the three closest to Jesus.\n\nHe walked on water and sank. He said you are the Christ, the Son of the living God, the great confession, and minutes later was told get behind me, Satan. He cut off a soldier's ear in Gethsemane. He denied Jesus three times around a charcoal fire. And after the resurrection, Jesus met him at another charcoal fire and asked him three times: do you love me? Three affirmations to meet three denials.\n\nHe preached the first sermon after Pentecost and three thousand people came to faith in a single day. He wrote two letters, practical, urgent, pastoral, to scattered churches under pressure. Read him when you have failed and need to know the failure is not final. Read him when you need to understand that suffering has a purpose and that you are being refined.",
    keyVerse:"1 Peter 5:10", keyVerseText:"After you have suffered a little while, the God of all grace will himself restore you and make you strong, firm and steadfast.",
    bridge:"Peter denied Jesus three times the night it mattered most, and Jesus still handed him the keys. Black women have been taught that their failures disqualify them from purpose. Peter's story is the answer. Restoration is not just possible. It is the pattern." },
  { id:"james", name:"James", tag:"The brother of Jesus who did not believe until the resurrection.", era:"AD 45-50", connection:"Brother of Jesus · leader of the Jerusalem church", books:["James"],
    story:"James was the brother of Jesus. During Jesus' ministry, his brothers did not believe in him. After the resurrection, Paul tells us that Jesus appeared specifically to James. Whatever James saw in that appearance changed everything. He became one of the pillars of the Jerusalem church, someone so revered that he was called James the Just.\n\nHis letter is the most practical book in the New Testament. Do not just listen to the word, do what it says. Faith without works is dead. Control your tongue. Do not show favoritism to the rich. Care for orphans and widows. It reads like wisdom literature, like Proverbs delivered in letter form, because James was steeped in Jewish wisdom tradition.\n\nHe was eventually martyred, thrown from the temple and beaten. He died with a reputation for holiness that even his enemies acknowledged. Read him when your faith has become theoretical. Read him when you need to be reminded that what you believe should change how you behave.",
    keyVerse:"James 1:22", keyVerseText:"Do not merely listen to the word, and so deceive yourselves. Do what it says.",
    bridge:"James wrote the letter that says faith without works is dead. The Black church has lived that theology for centuries, not faith as escape from the world but faith as engagement with it. James wrote for people who had to prove nothing to God and everything to themselves." },
  { id:"jesus-entry", name:"Jesus", tag:"The Word made flesh. Every book points here.", era:"BC 4 – AD 33", connection:"The fulfillment of every prophecy · the subject of every page",
    books:["The entire Bible points toward and through him"],
    story:"Jesus of Nazareth did not write a book. He is the subject of every book. The Old Testament points forward to him. The New Testament looks back and explains him and carries his mission forward. When Moses wrote about a deliverer, he was writing about Jesus. When David wrote Psalm 22, my God, my God, why have you forsaken me, he wrote words Jesus would quote from the cross a thousand years later. When Isaiah described a suffering servant who was pierced for our transgressions, he was describing Jesus seven centuries before it happened.\n\nJesus himself said: you search the scriptures because you think that in them you have eternal life, and it is they that testify about me. He claimed to be the fulfillment of everything his people had been waiting for, the law, the prophets, the writings. He said: before Abraham was, I am, using the name God had given Moses at the burning bush.\n\nHe was crucified, buried, and rose on the third day. He appeared to more than five hundred people. His resurrection is the event around which all of Christian history turns.\n\nEvery author in this library knew him, was transformed by him, or pointed toward him. He is the reason this book exists.",
    keyVerse:"John 1:14", keyVerseText:"The Word became flesh and made his dwelling among us. We have seen his glory, the glory of the one and only Son, who came from the Father, full of grace and truth.",
    bridge:"Jesus was born into an occupied nation, raised poor, executed by the state, and resurrected anyway. The entire story of Black faith in America is built on the audacity of that last part. He did not survive the empire. He outlasted it. Every Black woman who has held on is holding that same theology." },
  { id:"solomon", name:"Solomon", tag:"The wisest man who ever lived who still got it wrong.", era:"BC 970-930", connection:"Son of David · ancestor of Jesus", books:["Proverbs","Ecclesiastes","Song of Solomon"],
    story:"Solomon was the son of David and Bathsheba, anointed king after David. God appeared to him in a dream and said: ask for whatever you want me to give you. Solomon asked for wisdom and an understanding heart to govern the people. God gave him wisdom beyond any before or after him, and added riches and honor as well.\n\nHe built the temple. He wrote Proverbs, practical wisdom for daily life. He wrote Ecclesiastes, a sustained meditation on the meaninglessness of life without God that reads like something from a modern existentialist. He wrote the Song of Solomon, the most erotic love poem in the Hebrew Bible, which the rabbis called the Holy of Holies of Scripture.\n\nAnd then he married hundreds of foreign wives, who turned his heart toward other gods. The wisest man who ever lived made the most predictable of mistakes. Read him when you need practical daily wisdom. Read Ecclesiastes when everything feels pointless. Read the Song when you need to understand that God created desire and that love is not separate from the sacred.",
    keyVerse:"Proverbs 3:5-6", keyVerseText:"Trust in the Lord with all your heart and lean not on your own understanding; in all your ways submit to him, and he will make your paths straight.",
    bridge:"Solomon wrote Ecclesiastes in the voice of a man who had everything and still felt the emptiness. Proverbs 31 has been used to burden Black women with impossible standards, but read in context, it is poetry about capability and worth, not a performance checklist. The woman described in that passage is not exhausted. She is powerful." },
  { id:"jeremiah", name:"Jeremiah", tag:"The weeping prophet. The one who preached with no visible results.", era:"BC 627-587", connection:"Prophesied the destruction of Jerusalem and the new covenant", books:["Jeremiah","Lamentations"],
    story:"Jeremiah was called to prophesy before he was born, or so God told him. He preached for forty years and watched everyone ignore him. He prophesied the fall of Jerusalem and was called a traitor. He was put in a cistern. He was forbidden by God from marrying or having children, from mourning the dead, or from celebrating with the living, he was to be a living sign of the isolation sin creates.\n\nHe wrote Lamentations after Jerusalem fell, a sustained, literary lament over the destruction of the city. He is credited with writing portions of 1 and 2 Kings. He is also the one who received and recorded the promise of the new covenant: I will put my law within them, and I will write it on their hearts. Jesus quoted this promise at the Last Supper.\n\nRead him when faithfulness feels pointless. Read him when you have been doing the right thing for a long time with no visible result. Read Lamentations when you need language for grief that is communal and not just personal.",
    keyVerse:"Jeremiah 29:13", keyVerseText:"You will seek me and find me when you seek me with all your heart.",
    bridge:"Jeremiah wept over Jerusalem. He was called the weeping prophet, a man whose grief was part of his assignment, not a sign of weakness. Black women have been told to be strong, to hold it together, to not fall apart. Jeremiah's existence says: lamentation is prophetic. Your tears are not a malfunction." },
  { id:"ezekiel", name:"Ezekiel", tag:"The prophet who saw visions no one could explain.", era:"BC 593-571", connection:"Prophesied during the Babylonian exile", books:["Ezekiel"],
    story:"Ezekiel was a priest who was deported to Babylon before Jerusalem fell. He received his call to prophecy by the river Chebar, a vision of four living creatures, four wheels within wheels, a gleaming expanse, a throne of sapphire, and above it all a figure like a human being with the appearance of fire and light. He fell facedown.\n\nHe acted out his prophecies in ways that were strange and costly: lying on his side for 390 days, cooking food over dung, shaving his head and dividing the hair into thirds. He was told his wife would die and he was not to mourn publicly. He did not mourn. His extreme obedience was itself the message.\n\nBut he also wrote the most hope-filled vision of restoration in the Old Testament: the valley of dry bones. Bones coming together, flesh forming, breath entering. Can these bones live? God asked. And Ezekiel said: Lord God, you know. Read him when the situation looks dead and you need to know that breath can come to what looks finished.",
    keyVerse:"Ezekiel 37:5", keyVerseText:"This is what the Sovereign Lord says to these bones: I will make breath enter you, and you will come to life.",
    bridge:"Ezekiel saw dry bones and was commanded to prophesy life into them. The spiritual tradition of Black women has been doing exactly that, speaking life into communities that the world said were dead, finished, unrecoverable. That vision did not originate with Ezekiel. God has been doing it since the beginning." },
  { id:"daniel", name:"Daniel", tag:"Who kept his convictions in the empire that tried to redefine him.", era:"BC 605-530", connection:"Prophesied in Babylon during the exile", books:["Daniel"],
    story:"Daniel was taken from Jerusalem to Babylon as a teenager, selected for his appearance, intelligence, and aptitude. He was to be trained for three years in the language and literature of the Babylonians, to serve in the king's court. He decided from the start that he would not defile himself with the royal food and wine. He asked for vegetables and water for ten days. After ten days he looked better than all the young men who ate the royal food.\n\nHe interpreted dreams. He refused to stop praying when it was made illegal and was thrown into a den of lions. His three friends refused to bow to the king's statue and were thrown into a furnace heated seven times hotter than usual. None of them died.\n\nHis visions form the theological foundation for the apocalyptic literature of the New Testament, including Revelation. Read him when you are living in an empire that is asking you to compromise your identity. Read him when you need to know that faithfulness in a hostile environment is not naive, it is powerful.",
    keyVerse:"Daniel 3:17-18", keyVerseText:"If we are thrown into the blazing furnace, the God we serve is able to deliver us. But even if he does not, we want you to know, Your Majesty, that we will not serve your gods.",
    bridge:"Daniel refused to stop praying even when the law said it would kill him. He did not make a scene. He did not argue. He went home, opened the window toward Jerusalem, and prayed as he always had. There is a whole theology in that, the quiet defiance of continuing to be yourself when systems demand your silence." },
  { id:"job-author", name:"Job (the book)", tag:"The oldest book in the Bible. The one that asks the hardest question.", era:"Unknown, possibly BC 1500-1000", connection:"Addresses suffering before the Law was given", books:["Job"],
    story:"The book of Job may be the oldest text in the Bible. The author is unknown. Job himself is identified as a man from the land of Uz who was blameless and upright, one who feared God and turned away from evil. He was wealthy, had children, was respected. Then he lost everything, in two waves of catastrophe that the reader knows, but Job does not, were permitted by God in response to a challenge from the adversary.\n\nJob's friends came and sat with him in silence for seven days. Then they opened their mouths. The bulk of the book is a sustained theological argument among Job, his three friends, a young man named Elihu, and eventually God himself, who speaks from the whirlwind.\n\nGod never answers the question of why. He answers the question of who. At the end, God says to the friends: you have not spoken what is right, as my servant Job has. Job, who argued with God, was more right than the friends who defended God.\n\nRead him when your suffering is making you question everything. Read him when well-meaning people are giving you bad theology. Read him when you need to know that you can say what is true about your experience even when it is painful.",
    keyVerse:"Job 19:25", keyVerseText:"I know that my redeemer lives, and that in the end he will stand on the earth.",
    bridge:"Job's friends told him his suffering was his fault. They offered theological explanations for his pain that protected their own comfort. Black women have been on the receiving end of that kind of counsel their entire lives. God's response to Job's friends was fury. He did not validate them. He told them to go ask Job to pray for them." },
  { id:"psalms-authors", name:"The Psalmists", tag:"Seventy-three psalms are David's. The rest belong to many others.", era:"BC 1000-400", connection:"The prayer book of Israel, used in temple worship", books:["Psalms"],
    story:"The book of Psalms is an anthology. It has multiple authors writing across six hundred years. David wrote 73 of the 150. Others were written by Asaph, the sons of Korah, Solomon, Moses, Heman, Ethan, and many who are anonymous.\n\nThe psalms cover every human emotion, not tidied up or made spiritually presentable. Raw anger. Profound grief. Crushing loneliness. Exuberant joy. Confusion. Doubt. Gratitude. Desire. Protest. Praise. Lament. The full range of the human experience brought into direct conversation with God.\n\nThey were sung in the temple, memorized by Jesus, quoted on the cross, read in every synagogue. The Psalms have been the prayer book of faith communities for three thousand years because they give language to what we feel when we do not have our own words.\n\nRead them when you do not know how to pray. Let the psalmists pray what you cannot say. Let their language carry what you are carrying.",
    keyVerse:"Psalm 46:1", keyVerseText:"God is our refuge and strength, an ever-present help in trouble.",
    bridge:"The Psalms are the original honest prayer tradition. Lament psalms, the ones that scream at God, that demand to know where He has been, make up a third of the book. The Black church has always known how to hold praise and pain in the same service. The Psalms are why that is not a contradiction." },
  { id:"hosea", name:"Hosea", tag:"Who was asked to love the unfaithful to illustrate what God does.", era:"BC 750-715", connection:"His marriage was a parable of God's love for Israel", books:["Hosea"],
    story:"God told Hosea to marry a woman who would be unfaithful. Gomer became his wife and bore him children. She was unfaithful. God told Hosea to go and buy her back. He did. The whole book is simultaneously the story of Hosea's marriage and the story of God's relationship with Israel, a people he loved who kept running from him, and a God who kept going after them.\n\nHosea is the source of the phrase I desire mercy, not sacrifice, which Jesus quoted twice. He is the source of the metaphor of God as a parent who taught a child to walk, lifted them to his cheek, bent down to feed them, a God of tender, parental love who cannot give up on what belongs to him.\n\nRead him when you have been unfaithful and are afraid you have gone too far. Read him when you need to understand that the love of God is not theoretical or conditional but relentlessly, stubbornly personal.",
    keyVerse:"Hosea 6:6", keyVerseText:"For I desire mercy, not sacrifice, and acknowledgment of God rather than burnt offerings.",
    bridge:"God told Hosea to marry a woman who would be unfaithful, and then told him to go find her and bring her home. The entire book is about a God who keeps pursuing what has walked away from Him. Black women who have spent years convinced they have gone too far to be found, this book was written for that specific fear." },
  { id:"amos", name:"Amos", tag:"The farmer who interrupted the worship service.", era:"BC 760-750", connection:"First prophet to write his prophecies as a book", books:["Amos"],
    story:"Amos was a sheep breeder and fig farmer from Tekoa. He was not a professional prophet. He was not from a prophetic family. He went to Bethel, the official royal sanctuary of the northern kingdom, and preached during a period of prosperity and religious activity. The religious establishment told him to go back to Judah and earn his living prophesying there.\n\nAmos said: I was no prophet, nor a prophet's son, but I was a herdsman, and a dresser of sycamore figs, and the Lord took me from following the flock, and said to me, Go, prophesy to my people Israel.\n\nHis message was that religious observance without justice is an offense to God. Let justice roll down like waters and righteousness like an ever-flowing stream. He said this to people who were going to church regularly, celebrating religious festivals, singing worship songs, while oppressing the poor and cheating in their business dealings.\n\nRead him when religious life and ordinary life have become disconnected. Read him when you need to understand that worship is not a performance for God but a posture that should change how you treat people.",
    keyVerse:"Amos 5:24", keyVerseText:"But let justice roll on like a river, righteousness like a never-failing stream.",
    bridge:"Amos was a farmer from a small town who walked into the national sanctuary and interrupted the worship service to say: God hates your singing when your neighbors are hungry. He was not a professional prophet. He had no institutional credentials. He had a word and he said it. That is a tradition Black women know well." },
  { id:"micah", name:"Micah", tag:"Who summed up the whole law in one verse.", era:"BC 735-700", connection:"Contemporary of Isaiah and Hosea", books:["Micah"],
    story:"Micah was a contemporary of Isaiah, prophesying to both the northern and southern kingdoms during the same period. He came from a small town in the Judean hills. He named three capitals, Samaria, Jerusalem, Bethlehem, in ways that mattered prophetically: Samaria would fall, Jerusalem would fall, and from Bethlehem one would come whose origins are from ancient days.\n\nMicah 5:2 is one of the clearest messianic prophecies in the Old Testament, naming Bethlehem as the birthplace of the coming ruler. Matthew quotes it when the magi ask where the Messiah is to be born.\n\nBut Micah is best known for the verse that is the simplest summary of the prophetic ethic: He has shown you, O mortal, what is good. And what does the Lord require of you? To act justly and to love mercy and to walk humbly with your God.\n\nRead him when you need the whole thing reduced to its essential parts. When the complexity of faith has become overwhelming, come back to this.",
    keyVerse:"Micah 6:8", keyVerseText:"He has shown you, O mortal, what is good. And what does the Lord require of you? To act justly and to love mercy and to walk humbly with your God.",
    bridge:"Micah 6:8, act justly, love mercy, walk humbly, was not written for people who had power and needed to be reminded to share it. It was written for people living under unjust systems who needed to know what faithfulness looked like anyway. Black women have been living that theology under impossible conditions since before this country had a name." },
  { id:"habakkuk", name:"Habakkuk", tag:"Who argued with God and wrote it down for everyone to read.", era:"BC 612-600", connection:"Prophesied just before the Babylonian invasion", books:["Habakkuk"],
    story:"Habakkuk is almost entirely a conversation between the prophet and God. He opens with a complaint: God, why do you tolerate injustice? Why do you look at wrongdoing and just watch? God responds: I am raising up the Babylonians to deal with it. Habakkuk objects: You cannot seriously use a wicked nation as your instrument. God responds again.\n\nWhat makes Habakkuk remarkable is that God does not rebuke him for asking hard questions. The book is a model for honest theological wrestling, the kind that names what is true about what you see and refuses to perform peace you do not have, while ultimately arriving at trust that is not naive because it has been earned through the argument.\n\nThe book ends with a confession of radical trust in a God who has not yet explained himself: even though the fig tree does not blossom and there are no grapes on the vines, even though the olive crop fails and the fields produce no food, yet I will rejoice in the Lord.\n\nRead him when things are bad and you cannot square it with what you believe. Read him when you need permission to say to God: I do not understand what you are doing.",
    keyVerse:"Habakkuk 3:17-18", keyVerseText:"Though the fig tree does not bud and there are no grapes on the vines, yet I will rejoice in the Lord, I will be joyful in God my Savior.",
    bridge:"Habakkuk argued with God. He complained. He demanded answers. He said: I see what is happening and it does not make sense and I need you to explain yourself. And then he wrote one of the most extraordinary confessions of trust in the entire Bible. Black women who have argued with God in the dark and found their way to ’yet I will rejoice’ know this man." },
  { id:"jude", name:"Jude", tag:"The other brother of Jesus. One letter. All urgency.", era:"AD 60-80", connection:"Brother of Jesus and James", books:["Jude"],
    story:"Jude identifies himself as a servant of Jesus Christ and a brother of James, which means he was also a brother of Jesus. Like James, he did not believe in Jesus during his ministry. The resurrection changed him. He wrote one short letter, one chapter, twenty-five verses, to address a specific crisis in the early church: people who were twisting the grace of God into a license for immorality and denying Jesus as Lord.\n\nHis letter is dense, urgent, and full of unusual references, he quotes from the noncanonical book of Enoch and references an argument between the archangel Michael and the devil over the body of Moses. He clearly knew his Jewish tradition deeply.\n\nAt the end of the letter he writes one of the most beautiful doxologies in the New Testament: to him who is able to keep you from stumbling and to present you before his glorious presence without fault and with great joy, to the only God our Savior be glory, majesty, power, and authority, through Jesus Christ our Lord, before all ages, now and forevermore.\n\nRead him when you need a reminder that not all theology that sounds spiritual is true.",
    keyVerse:"Jude 24-25", keyVerseText:"To him who is able to keep you from stumbling and to present you before his glorious presence without fault and with great joy, to the only God our Savior be glory, majesty, power and authority.",
    bridge:"Jude wrote: to him who is able to keep you from stumbling, be glory. He was writing to a church being destabilized from inside, by people who claimed to speak for God while doing harm. Black women in church spaces have navigated that their entire lives. The doxology at the end of Jude was written for people who needed to know that God's keeping power is greater than the damage done by those who misused His name." },
  { id:"nehemiah", name:"Nehemiah", tag:"Who prayed, planned, and built the wall.", era:"BC 445-420", connection:"Governor of Jerusalem · rebuilt the city", books:["Nehemiah"],
    story:"Nehemiah was the cupbearer to the Persian king, a position of intimate trust that gave him access few Jews in exile had. He heard that Jerusalem's walls were in ruins and the people were in disgrace. He wept. He fasted. He prayed for four months. When the king asked what was wrong, Nehemiah prayed in the moment before he answered. He asked for permission and resources to go rebuild. The king granted it.\n\nBack in Jerusalem, he rallied the people to build. Each family rebuilt the section of wall outside their own home. He armed the builders, a trowel in one hand, a sword in the other. The wall was completed in fifty-two days. Sanballat and Tobiah ridiculed the effort. Nehemiah prayed. They threatened to attack. Nehemiah armed the people and kept building.\n\nRead him when you are rebuilding something that was broken. Read him when you face opposition to the work God has given you. Read him when you need to see what it looks like to combine prayer with strategy without confusing the two.",
    keyVerse:"Nehemiah 6:3", keyVerseText:"I am doing a great work, so that I can't come down. Why should the work cease, while I leave it and come down to you?",
    bridge:"Nehemiah heard that the walls were in ruins and wept. Then he asked for permission, developed a plan, organized people, prayed constantly, and refused to stop when opposition came from every direction. That is not a metaphor. That is what Black women do. The wall was built in 52 days because everyone built the section in front of their own house." },
  { id:"ezra", name:"Ezra", tag:"The scribe who brought the Word back to the people.", era:"BC 457-420", connection:"Priest and scribe, restored Torah reading after the exile", books:["Ezra","1 & 2 Chronicles"],
    story:"Ezra was a priest and scribe who led a second wave of Jewish exiles from Babylon back to Jerusalem. He arrived to find that the community that had returned first had intermarried with surrounding peoples and was drifting from covenant faithfulness. His response was not legislation. He read the law aloud to the people, all of it, from morning to midday, while they stood. The Levites helped the people understand what they heard. The people wept.\n\nThe scene in Nehemiah 8 where Ezra reads and the people weep is one of the most moving in Scripture. They had not heard the law in a generation. When they heard it and understood it, grief came first, then joy, then celebration, all in sequence, in one day.\n\nHe is thought to have compiled Chronicles, which retells the story of Israel with particular emphasis on worship, the temple, and the Levitical priesthood. Read him when you need a model for what it looks like to bring people back to the Word.",
    keyVerse:"Ezra 7:10", keyVerseText:"Ezra had set his heart to seek the law of the Lord, to do it, and to teach in Israel statutes and ordinances.",
    bridge:"Ezra set his heart to seek the law of the Lord, to do it, and to teach it. That sequence, seek, do, teach, is the shape of a life committed to something larger than itself. The women who built Black literacy, Black education, and Black faith in America followed that same sequence. They did not wait for conditions to be favorable." },
  { id:"malachi", name:"Malachi", tag:"The last voice before four hundred years of silence.", era:"BC 450-430", connection:"Last OT prophet · bridge to John the Baptist", books:["Malachi"],
    story:"Malachi means my messenger. No other information about him exists, we do not know his family, his tribe, or his circumstances. He was writing to a post-exilic community that had returned from Babylon, rebuilt the temple, and resumed worship, but whose worship had become corrupt. They were bringing blind animals for sacrifice and saying the table of the Lord is contemptible. They had stopped tithing. Marriages had become transactional. Divorce was casual.\n\nBut Malachi ends with a promise: before the great and dreadful day of the Lord, he will send Elijah the prophet, who will turn the hearts of fathers to their children and the hearts of children to their fathers. This is the last word of the Old Testament. Then four hundred years of silence.\n\nThe next voice heard is John the Baptist in the wilderness, the one Jesus called Elijah who was to come. Malachi is the bridge.\n\nRead him when your practice of faith has become mechanical. Read him when you need to be reminded that God is paying attention to the quality, not just the quantity, of your devotion.",
    keyVerse:"Malachi 3:10", keyVerseText:"Test me now in this, says the Lord of Armies, if I will not open you the windows of heaven, and pour you out a blessing, that there will not be room enough for.",
    bridge:"Malachi ends the Old Testament with a challenge: test me in this. Try it. Open the storehouse and see what I do. That is not the voice of a God who demands blind faith. That is the voice of a God who says: I know you have been disappointed. I am asking you to try again. Black women who have kept showing up when the evidence argued against it know exactly what that costs and exactly what it means." },
  { id:"zechariah", name:"Zechariah", tag:"Who saw the most vivid visions between Isaiah and Revelation.", era:"BC 520-480", connection:"Contemporary of Haggai · more messianic prophecy than any minor prophet", books:["Zechariah"],
    story:"Zechariah was a priest and prophet who worked alongside Haggai to encourage the rebuilding of the temple after the exile. He received eight night visions in a single night, visions of horsemen among the myrtle trees, four horns, a man with a measuring line, a lampstand fed by olive trees, a flying scroll, a woman in a basket. They are strange and layered and not fully interpreted by the angel who showed them to him.\n\nBut Zechariah also contains some of the clearest messianic prophecies in the Old Testament. He prophesied the triumphal entry into Jerusalem on a donkey. He prophesied thirty pieces of silver. He prophesied the piercing of the one they would look on, the verse John quotes at the crucifixion. He prophesied a fountain opened for sin and impurity.\n\nRead him when you want to trace the prophetic thread that runs through the Old Testament toward the New. Read him when you want to see what the Spirit was showing people centuries before it happened.",
    keyVerse:"Zechariah 9:9", keyVerseText:"Rejoice greatly, daughter of Zion! Shout, daughter of Jerusalem! Behold, your King comes to you. He is righteous, and having salvation, humble, and riding on a donkey.",
    bridge:"Not by might, nor by power, but by my Spirit. Zechariah wrote that to a man trying to rebuild something that looked too broken to be saved. Black women have been rebuilding things that looked beyond recovery, families, communities, faith, for generations. The answer has always been the same: not by might. By my Spirit." },
  { id:"jonah", name:"Jonah", tag:"Who ran from God and ended up in a fish.", era:"BC 785-760", connection:"The reluctant missionary, a sign of the resurrection", books:["Jonah"],
    story:"God told Jonah to go to Nineveh, the capital of Assyria, Israel's most feared enemy. Jonah went to Joppa and booked passage on a ship going the opposite direction. A storm came. Jonah confessed he was running from God. The sailors threw him overboard. The storm stopped. A great fish swallowed him. He prayed from inside the fish. He was vomited out on dry land.\n\nGod told him to go to Nineveh again. Jonah went. He preached the most minimal sermon in history: forty days and Nineveh will be overthrown. Eight words. The entire city repented, from the king down to the animals. God relented from the disaster. Jonah was angry. He went outside the city and waited, hoping God would still destroy it. God grew a plant to give him shade, then sent a worm to kill it. Jonah was devastated about the plant. God said: you had compassion on the plant. Should I not have compassion on Nineveh?\n\nJesus cited Jonah as a sign of the resurrection: as Jonah was three days in the belly of the great fish, so will the Son of Man be three days in the heart of the earth.\n\nRead him when you are running from what God is asking you to do. Read him when the people you think least deserve grace receive it and you are angry about it.",
    keyVerse:"Jonah 4:10-11", keyVerseText:"You have had compassion on the vine. Should I not have compassion on Nineveh, that great city, in which are more than one hundred twenty thousand persons?",
    bridge:"Jonah ran from his assignment because he knew God would be merciful to people Jonah thought did not deserve mercy. That is an honest accounting of a feeling most people will not admit. The book ends with God asking a question Jonah cannot answer. Black women who have had to wrestle with extending grace where they did not want to give it know that the book ends where it does on purpose." },
  { id:"joel", name:"Joel", tag:"Who saw the day of Pentecost before it happened.", era:"BC 835-800 or later, debated", connection:"Prophecy quoted by Peter on the day of Pentecost", books:["Joel"],
    story:"We know almost nothing about Joel the person. His book is three chapters and one extended metaphor: a locust plague, either literal or symbolic, that devastates the land. He calls the people to repentance: return to the Lord your God, for he is gracious and compassionate, slow to anger and abounding in love.\n\nBut chapter 2 contains a promise that Peter quoted on the day of Pentecost, and said this is what was spoken through the prophet Joel: afterward I will pour out my Spirit on all people. Your sons and daughters will prophesy. Your old men will dream dreams. Your young men will see visions. Even on male and female servants I will pour out my Spirit in those days.\n\nPentecost was the fulfillment of Joel's promise. What Joel saw as afterward, the disciples understood as now. The Spirit poured out on all people, not just priests, not just prophets, not just men. All people.\n\nRead him when you need to understand that the Spirit available to you is the same Spirit Joel described, the same Spirit that filled the upper room.",
    keyVerse:"Joel 2:28", keyVerseText:"It will happen afterward, that I will pour out my Spirit on all flesh; and your sons and your daughters will prophesy.",
    bridge:"Joel 2:28, I will pour out my Spirit on all people. Your sons and daughters will prophesy. The word all has never been theoretical. It was radical when Joel wrote it and it has been radical every time someone read it since. Black women who were told their voices did not belong in theology, in pulpits, in interpretation, this verse belongs to them specifically." },
  { id:"zephaniah", name:"Zephaniah", tag:"Who held both warning and the most tender promise of restoration.", era:"BC 640-609", connection:"Contemporary of Jeremiah · ancestor of King Hezekiah", books:["Zephaniah"],
    story:"Zephaniah was a royal descendant, his genealogy traces back to King Hezekiah, who prophesied during the reign of Josiah, the reforming king. He opened with the most comprehensive judgment oracle in the prophetic literature: I will sweep away everything from the face of the earth. Then he narrowed, Judah, then Jerusalem, then specific neighborhoods, then specific corrupt officials and priests.\n\nBut at the end of the book, without warning, the tone shifts entirely. The Lord your God is with you, the Mighty Warrior who saves. He will take great delight in you; in his love he will no longer rebuke you, but will rejoice over you with singing.\n\nGod singing over you. It is one of the most startling images in the prophetic literature. The God who opened the book sweeping everything away closes it singing. The same God. The same people.\n\nRead him when you need to hold both the seriousness of God and the tenderness of God in the same hand.",
    keyVerse:"Zephaniah 3:17", keyVerseText:"The Lord your God is in your midst, a Mighty One who will save. He will rejoice over you with joy. He will quiet you in his love. He will rejoice over you with singing.",
    bridge:"Zephaniah 3:17, the Lord your God is in your midst, a mighty one who will save. He will rejoice over you with gladness. He will quiet you by his love. He will exult over you with loud singing. God singing over you is the most intimate image in the prophets. Black women who have spent their lives being loud and strong for everyone else, someone is singing over you. It is not metaphor." },
  { id:"haggai", name:"Haggai", tag:"Who asked one question and rebuilt the temple.", era:"BC 520", connection:"Contemporary of Zechariah · prophet of post-exile restoration", books:["Haggai"],
    story:"Haggai has the most precisely dated prophecies in the Old Testament, we know the exact day and month of each one. He prophesied for a period of about four months in 520 BCE. His message was directed at a specific problem: the Jews who had returned from exile had been back in Jerusalem for eighteen years, had built their own paneled houses, but had not rebuilt the temple. They said: the time has not come for the Lord's house to be built.\n\nHaggai asked one question: Is it time for you yourselves to dwell in your paneled houses while this house lies in ruins? And then: Consider your ways. You have planted much but harvested little. You eat but are never satisfied. You put on clothes but are not warm. Your wages go into a bag with holes in it. Consider your ways.\n\nThe leaders heard and the people obeyed. They began rebuilding three weeks after Haggai spoke. He is the only prophet in the Old Testament whose message had immediate visible results.\n\nRead him when you are prioritizing your own comfort over what God has asked you to build. Consider your ways.",
    keyVerse:"Haggai 1:7-8", keyVerseText:"This is what the Lord of Armies says: Consider your ways. Go up to the mountain, get wood, and build the house. I will take pleasure in it, and I will be glorified, says the Lord.",
    bridge:"Haggai told the people to consider their ways. The word is diagnostic, not accusatory. He asked: are you building what you were sent to build, or are you building what is comfortable? Black women in ministry, leadership, and calling have been asked to consider their ways in this same spirit. Not with condemnation. With a question that has a real answer." },
  { id:"nahum", name:"Nahum", tag:"The oracle against Nineveh. The other side of Jonah's story.", era:"BC 663-612", connection:"Prophesied the destruction of the same city Jonah warned", books:["Nahum"],
    story:"Nahum is the book most people have never heard of. It is a sustained declaration of judgment against Nineveh, the same city that repented when Jonah preached and was spared. A century and a half later, Nineveh had returned to violence and oppression. God sent Nahum.\n\nHis name means comfort. The comfort he brought was to the nations that Assyria had terrorized, including Israel. The God who is slow to anger and great in power will not leave the guilty unpunished. Nineveh fell to Babylon in 612 BCE, exactly as Nahum described: overwhelmed by a flood, fire in her gates, gates of the rivers opened.\n\nHis book is also the source of the verse Romans 10:15 quotes, how beautiful are the feet of those who bring good news of peace.\n\nRead him when you need to know that God sees the suffering of the oppressed and does not leave it unaddressed. The delay is not absence.",
    keyVerse:"Nahum 1:7", keyVerseText:"The Lord is good, a stronghold in the day of trouble; and he knows those who take refuge in him.",
    bridge:"Nahum 1:7, the Lord is good, a stronghold in the day of trouble. He knows those who take refuge in him. Written inside a book about the collapse of an empire that had terrorized God's people for generations. The goodness of God and the justice of God are not two different things in Nahum. They are the same thing. Black women who have waited for justice know why that matters." }
];

const OT_BOOKS = ["Genesis","Exodus","Leviticus","Numbers","Deuteronomy","Joshua","Judges","Ruth","1 Samuel","2 Samuel","1 Kings","2 Kings","1 Chronicles","2 Chronicles","Ezra","Nehemiah","Esther","Job","Psalms","Proverbs","Ecclesiastes","Song of Solomon","Isaiah","Jeremiah","Lamentations","Ezekiel","Daniel","Hosea","Joel","Amos","Obadiah","Jonah","Micah","Nahum","Habakkuk","Zephaniah","Haggai","Zechariah","Malachi"];
const NT_BOOKS = ["Matthew","Mark","Luke","John","Acts","Romans","1 Corinthians","2 Corinthians","Galatians","Ephesians","Philippians","Colossians","1 Thessalonians","2 Thessalonians","1 Timothy","2 Timothy","Titus","Philemon","Hebrews","James","1 Peter","2 Peter","1 John","2 John","3 John","Jude","Revelation"];

function getStudyData(book) {
  const studies = {
    "Romans": {
      ref:"Romans 8:1-39", title:"No Condemnation", lede:"There is therefore now no condemnation for those who are in Christ Jesus.",
      scripture:`<p><span class="vnum">1</span>There is therefore now no condemnation for those who are in Christ Jesus. <span class="vnum">2</span>For the law of the Spirit of life in Christ Jesus made me free from the law of sin and of death. <span class="vnum">18</span>For I consider that the sufferings of this present time are not worth comparing with the glory that will be revealed toward us. <span class="vnum">28</span>We know that all things work together for good for those who love God, to those who are called according to his purpose. <span class="vnum">35</span>Who shall separate us from the love of Christ? Could oppression, or anguish, or persecution, or famine, or nakedness, or peril, or sword? <span class="vnum">37</span>No, in all these things, we are more than conquerors through him who loved us. <span class="vnum">38</span>For I am persuaded that neither death, nor life, nor angels, nor principalities, nor things present, nor things to come, nor powers, <span class="vnum">39</span>nor height, nor depth, nor any other created thing, will be able to separate us from the love of God, which is in Christ Jesus our Lord.</p>`,
      author:"Paul", when:"Roughly 57 CE", where:"Written from Corinth", audience:"The church in Rome",
      context:"Paul was writing to a church divided between Jewish and Gentile believers. He needed to establish the theological foundation of the gospel before he arrived. Romans is not a casual letter. It is a legal argument, a theological treatise, and a pastoral letter all at once. Chapter 8 is the resolution, where all the argument about law and grace lands in a declaration of freedom.",
      keyTerms:[
        {script:"κατάκριμα",word:"katakrima",lang:"Greek",gloss:"condemnation, the final judgment against",note:"Paul says there is now no katakrima. Not that you have not done things wrong. But that the final verdict has already been spoken and it is not against you."},
        {script:"ὑπερνικάω",word:"hypernikao",lang:"Greek",gloss:"more than conquerors, to super-conquer",note:"We do not merely survive what comes against us. We exceed. We come out with more than we went in with."}
      ],
      relatable:"There is a voice that follows you into every room. It pulls up your record, what you did, what was done to you, what you said, who you were before. It has a verdict. Paul wrote Romans 8 for that voice. He said: there is no condemnation for those who are in Christ Jesus. None. Not reduced. Not suspended. None. For Black women who have been convicted by systems designed to find them guilty, by churches that catalogued their failures, by relationships that reminded them daily of their unworthiness, this is not inspiration. This is a legal ruling that supersedes every other verdict on the record.",
      themes:"Romans 8 is the chapter the Black church has carried through every generation of survival. Paul wrote it as a prisoner of empire to people living under occupation. He named the Spirit who intercedes when you do not have the words. He named the suffering of the present time that does not compare to the glory coming. He named the God who is for us against everything arranged against us. This is not abstract theology. It is the theological foundation of every Black woman who stayed alive on faith when the circumstances argued against it.",
      prayer:"God of no condemnation. I come to you with the full weight of what the voice has been saying about me. The record it keeps pulling up. The verdict it keeps reading over my life. And I stand here in the legal reality of Romans 8, not as a concept I am trying to believe but as a truth I am receiving into my body right now. There is no condemnation for me. None. I am not on probation. I am not awaiting sentencing. The Judge himself has spoken and what he said is final. I receive that today, in the specific place where shame has been loudest, in the specific room where I have felt most unworthy. Your Spirit intercedes for me when I do not have the words. I do not always have the words. Thank you for the Spirit who does. Let nothing, not what was done to me, not what I have done, not what is happening right now, not what is coming, separate me from this love. I believe it is true. Now let me live like it is. Amen.", carry:"Today, when the voice pulls up your record, say this out loud: there is no condemnation. Not in my head, not whispered. Out loud. The verdict has been replaced and you are allowed to say so."
    },
    "Psalms": {
      ref:"Psalm 23", title:"The Lord Is My Shepherd", lede:"The Lord is my shepherd. I shall not be in want.",
      scripture:`<p><span class="vnum">1</span>The Lord is my shepherd; I shall not be in want. <span class="vnum">2</span>He makes me lie down in green pastures. He leads me beside still waters. <span class="vnum">3</span>He restores my soul. He guides me in the paths of righteousness for his name's sake. <span class="vnum">4</span>Even though I walk through the valley of the shadow of death, I will fear no evil, for you are with me. Your rod and your staff, they comfort me. <span class="vnum">5</span>You prepare a table before me in the presence of my enemies. You anoint my head with oil. My cup runs over. <span class="vnum">6</span>Surely goodness and loving kindness shall follow me all the days of my life, and I will dwell in the Lord's house forever.</p>`,
      author:"David", when:"Roughly 1000 BCE", where:"Israel", audience:"All of Israel, sung in the temple and in private",
      context:"David wrote this psalm as a shepherd who had become a king. He knew what it meant to be the one caring for animals, and what it meant to need care himself. The psalm moves from pastoral imagery to a table in the presence of enemies, from a field to a banquet hall. Both images are about God's provision. The last line says dwell in the house of the Lord forever, the Hebrew is return, which suggests a homecoming rather than a first arrival.",
      keyTerms:[
        {script:"רָעָה",word:"ra'ah",lang:"Hebrew",gloss:"to shepherd, to tend, to care for as a shepherd cares",note:"The Lord is my ra'ah. This is an active, ongoing present-tense word. Not was or will be. Is. Right now. Tending you."},
        {script:"שׁוּב",word:"shuv",lang:"Hebrew",gloss:"to return, to restore, literally to bring back",note:"He restores my soul. The word is shuv, to bring back what wandered. He finds what left and returns it to where it belongs."}
      ],
      relatable:"The 23rd Psalm was memorized by enslaved Black women who had no other property. It was spoken over the dying in hospital rooms where no one else came. It was whispered in kitchens and fields and jail cells and boardrooms by women who needed to know that God was somewhere in the valley with them. You have been in the valley, not the metaphorical kind, the actual dark place where you are not sure what comes next. David does not promise you bypass it. He promises you do not walk it alone and you do not stay there.",
      themes:"The Psalms are the original permission to be honest with God. Thirty-five percent of them are laments, raw, unfiltered, sometimes angry prayers that say: where are you? How long? Why? Black women have been told for centuries to be grateful, to be strong, to not complain, to not take up space with their pain. The Psalms say something different. They say bring it all and say it plainly. Your grief is not disrespect. Your question is not faithlessness. Your lament is the language of someone who still believes God is listening.",
      prayer:"God my shepherd, I come to you with the valley I am in right now. Not the metaphorical kind. The actual dark place where I do not know what is on the other side. Your rod and your staff comfort me. Not because they remove the valley but because they tell me I am not walking it alone. You prepared a table for me in the presence of my enemies. You anointed my head while the threat was still real. I receive the provision that comes in the middle of the warfare, not after it is resolved. Goodness and mercy will follow me. All the days of my life. This day. Even this difficult, unresolved, uncertain day. I will dwell in your house. I will be with you. That is where I want to be. Amen.", carry:"Before you go to sleep tonight, say the 23rd Psalm. Not as recitation. As testimony. Name the valley you are currently in. Then finish the psalm. He restores. He guides. Goodness and mercy follow you."
    },
    "Isaiah": {
      ref:"Isaiah 40:28-31", title:"They That Wait", lede:"Those who hope in the Lord will renew their strength.",
      scripture:`<p><span class="vnum">28</span>Haven't you known? Haven't you heard? The everlasting God, the Lord, the Creator of the ends of the earth, doesn't faint. He isn't weary. His understanding is unsearchable. <span class="vnum">29</span>He gives power to the weak. He increases the strength of him who has no might. <span class="vnum">30</span>Even the youths shall faint and be weary, and the young men shall utterly fall; <span class="vnum">31</span>but those who wait for the Lord will renew their strength. They will mount up with wings like eagles. They will run, and not be weary. They will walk, and not faint.</p>`,
      author:"Isaiah", when:"Roughly 700 BCE", where:"Jerusalem", audience:"Israel in exile and approaching exile",
      context:"This passage begins a new section of Isaiah, a section of comfort. The first word of chapter 40 is comfort. Isaiah was speaking to a people who had suffered conquest and would suffer exile, and to generations he would never meet who would read his words in Babylon. He is not promising easy circumstances. He is promising that the source of strength is inexhaustible. Have you not known? Have you not heard? He is reminding them of what they already have access to.",
      keyTerms:[
        {script:"קָוָה",word:"qavah",lang:"Hebrew",gloss:"to wait, to hope, to bind together, like twisting strands into a cord",note:"Those who wait for the Lord. The waiting is not passive. It is an active binding of yourself to who God is while you cannot see what He is doing."},
        {script:"חָלַף",word:"chalaph",lang:"Hebrew",gloss:"to renew, to change, to pass through and be changed by the passing",note:"They will renew their strength. The word suggests not simply restoration but transformation, coming out of the waiting different than you went in."}
      ],
      relatable:"You have been tired in a way that sleep does not fix. The kind of tired that comes from carrying things that were never supposed to be yours alone, the household, the workplace, the community, the emotional labor of everyone around you, the grief of watching systems harm people you love and being expected to remain composed. Isaiah was writing to a people in exile, under occupation, depleted. He said: wait on the Lord. Not wait passively. Wait actively, expectantly, anchored. And then: you will run and not be weary.",
      themes:"Isaiah 40 was written for people who had been told by their circumstances that God had forgotten them. The prophet's answer was not a five-step plan. It was a vision: God does not faint. God does not grow weary. The everlasting God, creator of the ends of the earth, his energy is not depleted by your situation. And he gives his power to the exhausted. This chapter is the theological foundation for every Black woman who has kept going past the point where she had any reasonable right to. The strength was not hers alone.",
      prayer:"God who does not grow weary and does not faint, I come to you in the depletion. The kind that does not respond to more effort or better strategy. The kind that comes from carrying things that were never mine to carry alone. You are the everlasting God. You created the ends of the earth. You do not run out. And you give your power to the faint, your strength to the powerless. I receive it today. Not after I have rested enough. Not after the season changes. Right now in the middle of the tired, I receive the strength that mounts up. I will run and not be weary. I will walk and not faint. Not by my own generation of energy. By yours flowing through me. Amen.", carry:"Identify one thing you have been trying to carry in your own strength that belongs to God. Write it down. Then stop. Actually stop doing that one thing today and let God be responsible for it."
    },
    "John": {
      ref:"John 1:1-14", title:"In the Beginning Was the Word", lede:"The Word became flesh and made his dwelling among us.",
      scripture:`<p><span class="vnum">1</span>In the beginning was the Word, and the Word was with God, and the Word was God. <span class="vnum">2</span>The same was in the beginning with God. <span class="vnum">3</span>All things were made through him. Without him, nothing was made that has been made. <span class="vnum">4</span>In him was life, and the life was the light of men. <span class="vnum">5</span>The light shines in the darkness, and the darkness hasn't overcome it. <span class="vnum">9</span>The true light that enlightens everyone was coming into the world. <span class="vnum">10</span>He was in the world, and the world was made through him, and the world didn't recognize him. <span class="vnum">11</span>He came to his own, and those who were his own didn't receive him. <span class="vnum">12</span>But as many as received him, to them he gave the right to become God's children, to those who believe in his name. <span class="vnum">14</span>The Word became flesh and lived among us. We saw his glory, such glory as of the one and only Son of the Father, full of grace and truth.</p>`,
      author:"John", when:"Roughly 85-95 CE", where:"Ephesus", audience:"Both Jewish and Gentile Christians in Asia Minor",
      context:"John opens his gospel not with a birth narrative but with a declaration of cosmic origin. In the beginning, the same words that open Genesis. He is placing Jesus at the origin of everything. The Word is a deliberate double reference: for Greek readers, logos was the rational principle behind all things. For Jewish readers, the Word was how God had always created and communicated. John is saying: Jesus is what both of you have been pointing toward.",
      keyTerms:[
        {script:"λόγος",word:"logos",lang:"Greek",gloss:"the Word, reason, meaning, the principle by which all things are ordered",note:"In the beginning was the Logos. John chose this word deliberately for both Jewish and Greek audiences. He is claiming Jesus is the rational ground of the universe."},
        {script:"σκοτία",word:"skotia",lang:"Greek",gloss:"darkness, and the darkness did not overcome it",note:"The darkness has never overcome the light. The word for overcome also means comprehend. Darkness has neither defeated nor understood what the light is."}
      ],
      relatable:"Jesus had a long theological conversation with a Samaritan woman at a well at noon, the hour when respectable people were not at wells. She was alone. She had five husbands and was currently with a man who was not her husband. Jesus did not begin the conversation with her sin. He began it with her thirst. Give me a drink. And then he told her about living water that would mean she would never thirst again. He made her a theologian before he addressed her history. She ran back to the city and brought people to him. The woman everyone was avoiding became the first evangelist in Samaria.",
      themes:"The encounter at the well is one of the most radical moments in the gospels. Jesus crossed racial lines (Jew and Samaritan), gender lines (a man speaking to a woman alone), and social lines (a rabbi speaking to someone with her history). He did not do any of it accidentally. He chose the route through Samaria when Jews typically went around. He sat at the well. He asked her specifically. Womanist theologians have returned to this passage repeatedly as evidence that Jesus actively sought out the woman the community had sidelined. He went there on purpose.",
      prayer:"God who became flesh and moved into the neighborhood, who sat at the well at noon and waited for the woman everyone else had already dismissed, I come to you as someone you have been waiting for. Not someone who stumbled across you. Someone you positioned yourself to meet. You went through Samaria on purpose. You sat at that well on purpose. You asked her for a drink on purpose. You told her everything she ever did not to expose her but to say: I see the whole thing and I am still here. See the whole thing in me today. And stay. Not because I have resolved it. Because you are the God who stays in the middle of unresolved. Give me the living water. Let me stop coming back to wells that leave me thirsty again. I receive what only you can give. Amen.", carry:"Write down the one thing Jesus said to the woman at the well that you needed to hear today. Not the whole story. One thing. Carry it into your next conversation."
    },
    "Philippians": {
      ref:"Philippians 4:4-13", title:"The Peace That Passes Understanding", lede:"I can do all things through Christ who strengthens me.",
      scripture:`<p><span class="vnum">4</span>Rejoice in the Lord always. Again I will say, rejoice! <span class="vnum">5</span>Let your gentleness be known to all men. The Lord is at hand. <span class="vnum">6</span>In nothing be anxious, but in everything, by prayer and petition with thanksgiving, let your requests be made known to God. <span class="vnum">7</span>The peace of God, which surpasses all understanding, will guard your hearts and your thoughts in Christ Jesus. <span class="vnum">8</span>Whatever things are true, whatever things are honorable, whatever things are just, whatever things are pure, whatever things are lovely, whatever things are of good report: if there is any virtue, and if there is any praise, think about these things. <span class="vnum">11</span>I have learned, in whatever state I am, to be content. <span class="vnum">12</span>I know how to be humbled, and I know also how to abound. In everything and in all things I have learned the secret both to be filled and to be hungry, both to abound and to be in need. <span class="vnum">13</span>I can do all things through Christ who strengthens me.</p>`,
      author:"Paul", when:"Roughly 62 CE", where:"Written from prison in Rome", audience:"The church at Philippi",
      context:"Paul wrote this letter from prison. The most joyful letter in the New Testament was written by a man in chains. The word rejoice appears more in Philippians than any other letter. He is not performing happiness, he is describing what it looks like when contentment is learned rather than circumstantial. I have learned, it was a process. It was not natural. The famous verse about doing all things is not about athletic achievement. It is about surviving both abundance and poverty with equal grace.",
      keyTerms:[
        {script:"εἰρήνη",word:"eirene",lang:"Greek",gloss:"peace, but specifically the peace that results from being made right",note:"The peace of God. This is not the absence of conflict. This is the settled wholeness that comes from being in right relationship with God. It guards, it stands watch over your mind."},
        {script:"φρουρέω",word:"phroureō",lang:"Greek",gloss:"to guard, to garrison, a military term for standing watch over a city gate",note:"The peace will guard your hearts and minds. Phroureō is what soldiers did at city gates. This peace is not passive. It is standing watch against what would destabilize you."}
      ],
      relatable:"Paul wrote Philippians from prison. He wrote about joy eleven times. He wrote: I have learned to be content in all circumstances. Learned, past tense, acquired through experience, not downloaded at conversion. The contentment he is describing is not numbness. It is the settled knowledge of who God is that exists underneath and independent of circumstances. He had been abased. He had abounded. He had learned both. The peace that passes understanding is available to you in the exact circumstances you are in right now.",
      themes:"Philippians is the epistle of joy that was written from the least joyful circumstances. That dissonance is the whole point. Joy in Paul's theology is not circumstantial, it is rooted in the knowledge of God's character, the presence of Christ, and the certainty of the future. Black women who have praised in pain, who have held on when the evidence argued for letting go, who have known the peace that makes no logical sense in the middle of things that make no logical sense, this is their epistle.",
      prayer:"God of the peace that passes understanding, I come to you from the anxiety. Not the general anxiety. The specific one. The one that woke me up at 3am. The one that has my chest tight right now. I bring it to you not as a spiritual performance but as a real act of transfer. I cannot hold this and be okay. I give it to you. And I ask for the peace that Paul received while chained in a prison cell. Not the peace that comes when everything is resolved. The peace that stands guard right now, in the middle of the unresolved, over my mind and my heart. I also receive what Paul said he learned: contentment. In whatever state I am in. I am learning it. I have not mastered it. But you are teaching me. And I trust that you who began this work in me will bring it to completion. Amen.", carry:"Whatever is true, whatever is noble, whatever is right, whatever is pure, whatever is lovely, whatever is admirable, think about these things. Choose one and deliberately return your mind to it every time anxiety pulls you elsewhere today."
    },
    "Genesis": {
      ref:"Genesis 1:1-5, 26-28", title:"In the Beginning", lede:"In the beginning, God created the heavens and the earth.",
      scripture:`<p><span class="vnum">1</span>In the beginning, God created the heavens and the earth. <span class="vnum">2</span>The earth was formless and empty. Darkness was on the surface of the deep and God's Spirit was hovering over the surface of the waters. <span class="vnum">3</span>God said, "Let there be light," and there was light. <span class="vnum">4</span>God saw the light, and saw that it was good. God divided the light from the darkness. <span class="vnum">5</span>God called the light "day", and the darkness he called "night". There was evening and there was morning, the first day.</p><p><span class="vnum">26</span>God said, "Let's make man in our image, after our likeness. Let them have dominion over the fish of the sea, and over the birds of the sky, and over the livestock, and over all the earth, and over every creeping thing that creeps on the earth." <span class="vnum">27</span>God created man in his own image. In God's image he created him; male and female he created them. <span class="vnum">28</span>God blessed them. God said to them, "Be fruitful, multiply, fill the earth, and subdue it."</p>`,
      author:"Moses", when:"Roughly 1400 BCE, recording earlier events", where:"Written during the wilderness journey", audience:"Israel, a recently freed slave nation who needed to know who they were",
      context:"Moses wrote Genesis for a people who had just come out of Egypt, surrounded by a cosmology where multiple gods fought over creation and humans were an afterthought. Genesis 1 is a deliberate counter-claim. One God. One act of creation. No conflict, no battle between deities, just God speaking, and what he speaks existing. And at the end of it: human beings made in his image.",
      keyTerms:[
        {script:"בְּרֵאשִׁית",word:"bereshit",lang:"Hebrew",gloss:"in the beginning, the very first word of the Hebrew Bible",note:"Bereshit. Not a date. Not a scientific statement. The declaration that there was a before and God was already there."},
        {script:"צֶלֶם",word:"tselem",lang:"Hebrew",gloss:"image, likeness, the imprint of who God is placed in what He made",note:"Created in the tselem of God. The same word was used for the physical image of a king placed in a territory he controlled, declaring his presence and his authority. You are that image."}
      ],
      relatable:"Before the algorithm, before the beauty standard, before the medical system that has historically ignored Black women's pain, before every institution that has looked at your body and assigned it a lesser value, there was this: God created you in his own image. He called it very good. The imago Dei is not a theological nicety. It is a counter-declaration against every system that has spent centuries trying to convince Black women that their bodies, minds, and worth are less than. The record of creation says otherwise and it was written first.",
      themes:"Genesis 1 is a political document as much as a theological one. In a world that has always found ways to rank human beings by race, gender, class, and proximity to power, the creation narrative draws a single line: every human being carries the image of God. This was radical when it was written. It is radical now. Womanist theologians have argued for generations that the image of God is most clearly demonstrated in those the world works hardest to dehumanize. Genesis agrees.",
      prayer:"God who looked at what you made and called it very good, I come to you carrying everything the world has told me about my value. The beauty standard that was built to exclude me. The systems designed to tell me my body, my mind, my gifts, my presence are worth less. I reject every verdict that contradicts the record of creation. I was made in your image. Not a diminished version of it. Not adjacent to it. The full imago Dei. Before I did anything. Before I succeeded or failed at anything. Before any institution had the chance to grade me. You made me and you called it very good. Let me live from that origin today. Let me treat myself as someone who carries your image. Let me walk into every room knowing I did not arrive as a guest. I was made for this. Amen.", carry:"The next time someone or something tries to assign you a diminished value today, say this internally: I was made in the image of God and he called it very good. Not eventually. Right now."
    },
    "Matthew": {
      ref:"Matthew 5:3-12", title:"The Beatitudes", lede:"Blessed are the poor in spirit, for theirs is the kingdom of heaven.",
      scripture:`<p><span class="vnum">3</span>Blessed are the poor in spirit, for theirs is the Kingdom of Heaven. <span class="vnum">4</span>Blessed are those who mourn, for they shall be comforted. <span class="vnum">5</span>Blessed are the gentle, for they shall inherit the earth. <span class="vnum">6</span>Blessed are those who hunger and thirst after righteousness, for they shall be filled. <span class="vnum">7</span>Blessed are the merciful, for they shall obtain mercy. <span class="vnum">8</span>Blessed are the pure in heart, for they shall see God. <span class="vnum">9</span>Blessed are the peacemakers, for they shall be called children of God. <span class="vnum">10</span>Blessed are those who have been persecuted for righteousness' sake, for theirs is the Kingdom of Heaven. <span class="vnum">11</span>Blessed are you when people reproach you, persecute you, and say all kinds of evil against you falsely, for my sake. <span class="vnum">12</span>Rejoice, and be exceedingly glad, for great is your reward in heaven.</p>`,
      author:"Matthew", when:"Roughly 70 CE", where:"Possibly Antioch", audience:"Primarily Jewish Christians",
      context:"Jesus delivered the Sermon on the Mount at the beginning of his public ministry. Matthew records it as an extended teaching, three chapters. The Beatitudes open the sermon. They are not commands. They are declarations. Blessed are, not blessed will be if. They describe what is already true about the kingdom of God and who is welcome in it. Each one overturns a common assumption about who is blessed, who is favored, who God sees.",
      keyTerms:[
        {script:"μακάριος",word:"makarios",lang:"Greek",gloss:"blessed, happy, fortunate, deeply satisfied regardless of external circumstances",note:"Blessed are. Jesus says this eight times. He is not describing a feeling you have to achieve. He is describing a reality that already exists for the people he names."},
        {script:"πτωχός",word:"ptochos",lang:"Greek",gloss:"poor, specifically, those who are completely dependent, who have nothing of their own to offer",note:"Blessed are the poor in spirit. The ptochos are those who know they have nothing. Jesus says those are the ones who already have the kingdom."}
      ],
