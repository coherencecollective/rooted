<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Rooted</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Jost:wght@200;300;400;500&family=Noto+Serif+Hebrew&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#F2E7DA; --surface:#FAF4EC; --surface-2:#EFE4D6;
  --ink:#1C0F07; --ink-2:#3A2010; --muted:#7A5C48; --muted-2:#A88870; --muted-3:#C4A890;
  --terra:#8C3520; --amber:#A86D1E; --sage:#4B6140;
  --border:rgba(28,15,7,.1); --border-2:rgba(28,15,7,.18);
  --shadow:0 1px 12px rgba(28,15,7,.07); --shadow-2:0 3px 24px rgba(28,15,7,.11); --shadow-3:0 8px 48px rgba(28,15,7,.16);
  --r-xs:4px; --r-sm:8px; --r:14px; --r-lg:22px; --r-xl:32px;
  --serif:'Cormorant Garamond',Georgia,serif; --sans:'Jost',-apple-system,sans-serif; --hb:'Noto Serif Hebrew',serif;
  --s1:8px;--s2:16px;--s3:24px;--s4:40px;--s5:64px;--s6:96px;
  --label:10px; --caption:12px; --body:15px; --body-lg:17px; --sub:20px; --head:26px; --head-lg:34px;
  --display:clamp(28px,7.5vw,44px); --name:clamp(36px,9vw,52px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{height:100%;}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-weight:300;font-size:var(--body);line-height:1.6;-webkit-font-smoothing:antialiased;-webkit-text-size-adjust:100%;height:100%;overflow-x:hidden;}
button{background:none;border:none;cursor:pointer;font:inherit;color:inherit;-webkit-tap-highlight-color:transparent;}

/* ENTRY */
.entry{min-height:100svh;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:var(--s4) var(--s3);text-align:center;position:relative;}
.entry-mark{display:flex;flex-direction:column;align-items:center;margin-bottom:var(--s4);animation:fadeUp .8s ease both;}
.entry-r{font-family:var(--serif);font-size:clamp(72px,18vw,110px);font-weight:400;line-height:1;color:var(--ink);letter-spacing:-.04em;}
.entry-rule{width:80px;height:1px;background:var(--amber);margin:var(--s2) 0;}
.entry-name{font-family:var(--sans);font-size:var(--caption);letter-spacing:.35em;text-transform:uppercase;color:var(--ink-2);font-weight:400;}
.entry-name span{color:var(--amber);}
.entry-tag{font-family:var(--serif);font-style:italic;font-size:clamp(20px,5vw,28px);font-weight:300;line-height:1.45;color:var(--muted);max-width:28ch;margin-bottom:var(--s4);animation:fadeUp .8s .18s ease both;}
.entry-enter{font-family:var(--sans);font-size:var(--label);letter-spacing:.3em;text-transform:uppercase;color:var(--ink);padding:14px var(--s4);border:1px solid var(--border-2);border-radius:var(--r-xl);transition:all .2s;animation:fadeUp .8s .32s ease both;}
.entry-enter:hover,.entry-enter:active{background:var(--ink);color:var(--bg);border-color:var(--ink);}
.entry-ref{position:absolute;bottom:calc(var(--s3) + env(safe-area-inset-bottom,0px));font-family:var(--sans);font-size:var(--label);letter-spacing:.2em;text-transform:uppercase;color:var(--muted-3);animation:fadeUp .8s .45s ease both;}

/* APP SHELL */
.app{height:100svh;display:flex;flex-direction:column;overflow:hidden;}
.topnav{display:none;position:sticky;top:0;z-index:80;background:rgba(242,231,218,.94);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 var(--s4);height:56px;align-items:center;justify-content:space-between;}
.tn-mark{display:flex;align-items:center;gap:10px;}
.tn-r{font-family:var(--serif);font-size:28px;font-weight:400;line-height:1;color:var(--ink);letter-spacing:-.03em;}
.tn-rule{width:1px;height:20px;background:var(--amber);opacity:.5;}
.tn-name{font-family:var(--sans);font-size:var(--label);letter-spacing:.28em;text-transform:uppercase;color:var(--ink-2);font-weight:400;}
.tn-links{display:flex;gap:var(--s3);align-items:center;}
.tn-link{font-family:var(--sans);font-size:var(--caption);font-weight:300;color:var(--muted);letter-spacing:.03em;transition:color .15s;padding:4px 0;position:relative;}
.tn-link:hover{color:var(--ink);}
.tn-link.active{color:var(--terra);}
.tn-link.active::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:1.5px;background:var(--terra);border-radius:1px;}
.tn-btn{width:36px;height:36px;border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;color:var(--muted);transition:all .15s;}
.tn-btn:hover{background:var(--surface-2);color:var(--ink);}
.tn-btn svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;}

.scroll-view{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;scroll-behavior:smooth;}
.view{max-width:520px;margin:0 auto;padding:var(--s3) var(--s3) calc(90px + env(safe-area-inset-bottom,0px));}

.page{animation:pageIn .28s ease both;}
@keyframes pageIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes slideUp{from{transform:translateY(40px);opacity:0;}to{transform:translateY(0);opacity:1;}}

/* TAB BAR */
.tab-bar{position:fixed;bottom:0;left:0;right:0;z-index:80;background:rgba(250,244,236,.97);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid var(--border);display:flex;height:calc(58px + env(safe-area-inset-bottom,0px));padding-bottom:env(safe-area-inset-bottom,0px);box-shadow:0 -2px 20px rgba(28,15,7,.06);}
.tb-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--muted-2);font-family:var(--sans);font-size:9px;font-weight:300;letter-spacing:.08em;text-transform:uppercase;transition:color .15s;min-height:44px;padding:8px 4px;}
.tb-item.active{color:var(--terra);}
.tb-item.active .tb-icon{stroke-width:2;}
.tb-icon{width:20px;height:20px;fill:none;stroke:currentColor;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;}

@media(min-width:768px){
  .topnav{display:flex;}
  .tab-bar{display:none;}
  .view{max-width:780px;padding:var(--s4) var(--s4) var(--s5);}
  .scroll-view{overflow:visible;}
  .app{height:auto;overflow:visible;}
}

/* HOME */
.home-date{font-family:var(--sans);font-size:var(--caption);letter-spacing:.15em;text-transform:uppercase;color:var(--ink-2);padding:var(--s2) 0 var(--s3);display:flex;align-items:center;justify-content:space-between;}
.home-search-btn{color:var(--muted);padding:4px;}
.home-search-btn svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:1.7;stroke-linecap:round;}

.word-block{margin-bottom:var(--s4);}
.word-label{font-family:var(--sans);font-size:var(--label);letter-spacing:.22em;text-transform:uppercase;color:var(--muted-3);margin-bottom:var(--s1);}
.word-ref{font-family:var(--sans);font-size:var(--caption);letter-spacing:.15em;text-transform:uppercase;color:var(--amber);font-weight:400;margin-bottom:var(--s2);}
.word-pull{font-family:var(--serif);font-size:var(--display);font-weight:400;line-height:1.15;letter-spacing:-.02em;color:var(--ink);margin-bottom:var(--s3);}
.word-verse{font-family:var(--serif);font-style:italic;font-size:var(--body-lg);line-height:1.75;color:var(--muted);border-left:1.5px solid var(--amber);padding-left:var(--s2);margin-bottom:var(--s3);}
.word-footer{display:flex;align-items:flex-start;justify-content:space-between;gap:var(--s2);}
.word-prompt{font-family:var(--serif);font-style:italic;font-size:var(--caption);line-height:1.6;color:var(--muted-2);flex:1;}
.word-cta{font-family:var(--sans);font-size:var(--label);letter-spacing:.22em;text-transform:uppercase;color:var(--amber);flex-shrink:0;padding:2px 0;transition:opacity .15s;white-space:nowrap;}
.word-cta:hover{opacity:.7;}
.home-divider{height:1px;background:var(--border);margin:var(--s3) 0;}

.posture-label{font-family:var(--sans);font-size:var(--label);letter-spacing:.22em;text-transform:uppercase;color:var(--ink-2);margin-bottom:var(--s2);}
.posture-row{display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px;scrollbar-width:none;}
.posture-row::-webkit-scrollbar{display:none;}
.posture-pill{flex-shrink:0;font-family:var(--sans);font-size:var(--caption);font-weight:300;color:var(--muted);letter-spacing:.03em;padding:10px 18px;height:40px;border:1px solid var(--border-2);border-radius:var(--r-xl);white-space:nowrap;transition:all .15s;background:var(--surface);}
.posture-pill:hover,.posture-pill:active{background:var(--ink);color:var(--bg);border-color:var(--ink);}

.keyterm-label{font-family:var(--sans);font-size:var(--label);letter-spacing:.22em;text-transform:uppercase;color:var(--ink-2);margin-bottom:var(--s2);}
.keyterm-inner{display:flex;align-items:flex-start;justify-content:space-between;gap:var(--s2);}
.keyterm-word{font-family:var(--serif);font-style:italic;font-size:var(--sub);font-weight:400;color:var(--ink);margin-bottom:4px;}
.keyterm-gloss{font-family:var(--sans);font-size:var(--caption);color:var(--muted);line-height:1.55;}
.keyterm-script{font-family:var(--hb);font-size:36px;color:var(--amber);opacity:.65;direction:rtl;line-height:1;flex-shrink:0;}

/* SECTION HEADERS */
.sh-label{font-family:var(--sans);font-size:var(--label);letter-spacing:.22em;text-transform:uppercase;color:var(--terra);margin-bottom:var(--s2);}
.sh-label.amber{color:var(--amber);}
.sh-label.sage{color:var(--sage);}
.sh-title{font-family:var(--serif);font-size:var(--head-lg);font-weight:400;line-height:1.05;letter-spacing:-.02em;color:var(--ink);margin-bottom:var(--s2);}
.sh-lede{font-family:var(--serif);font-style:italic;font-size:var(--body);line-height:1.65;color:var(--muted);max-width:54ch;margin-bottom:var(--s3);}
.sh-intro{font-family:var(--serif);font-size:var(--body);line-height:1.75;color:var(--muted);padding:var(--s3) 0;margin-bottom:var(--s4);}
.sh-intro p+p{margin-top:var(--s2);}
.back-btn{display:inline-flex;align-items:center;gap:6px;font-family:var(--sans);font-size:var(--caption);letter-spacing:.1em;text-transform:uppercase;color:var(--muted-2);margin-bottom:var(--s3);transition:color .15s;}
.back-btn:hover{color:var(--ink);}
.back-btn svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:1.7;stroke-linecap:round;}

/* WOMEN LISTS */
.lineage-list,.women-list,.id-list,.authors-list,.prayer-rows{display:flex;flex-direction:column;gap:0;}
.lineage-row,.woman-row,.author-row{display:flex;align-items:center;justify-content:space-between;padding:var(--s3) 0;border-bottom:1px solid var(--border);cursor:pointer;transition:opacity .15s;gap:var(--s2);}
.lineage-row:hover,.woman-row:hover,.author-row:hover{opacity:.7;}
.lineage-row:first-child,.woman-row:first-child,.author-row:first-child{border-top:1px solid var(--border);}
.lr-name{font-family:var(--serif);font-size:clamp(28px,7vw,38px);font-weight:400;line-height:1;letter-spacing:-.02em;color:var(--ink);margin-bottom:4px;}
.lr-tag{font-family:var(--serif);font-style:italic;font-size:var(--body);color:var(--muted);line-height:1.4;}
.lr-ref{font-family:var(--sans);font-size:var(--label);letter-spacing:.18em;text-transform:uppercase;color:var(--terra);flex-shrink:0;}
.lineage-end{padding:var(--s4) 0 var(--s2);text-align:center;}
.le-text{font-family:var(--serif);font-style:italic;font-size:var(--body);color:var(--muted);margin-bottom:4px;}
.le-ref{font-family:var(--sans);font-size:var(--label);letter-spacing:.2em;text-transform:uppercase;color:var(--muted-3);}

.wr-info{flex:1;min-width:0;}
.wr-name{font-family:var(--serif);font-size:clamp(26px,6.5vw,36px);font-weight:400;line-height:1.05;letter-spacing:-.02em;color:var(--ink);margin-bottom:4px;}
.wr-tag{font-family:var(--serif);font-style:italic;font-size:var(--body);color:var(--muted);line-height:1.4;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.wr-term{font-family:var(--hb);font-size:22px;color:var(--amber);opacity:.55;direction:rtl;line-height:1;flex-shrink:0;}
.wr-arrow{color:var(--muted-3);font-size:var(--sub);flex-shrink:0;}

.hub-list{display:flex;flex-direction:column;gap:var(--s2);}
.hub-row{display:flex;align-items:center;justify-content:space-between;padding:var(--s3);background:var(--surface);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;transition:all .15s;box-shadow:var(--shadow);}
.hub-row:hover{box-shadow:var(--shadow-2);transform:translateY(-1px);}
.hr-label{font-family:var(--sans);font-size:var(--label);letter-spacing:.2em;text-transform:uppercase;font-weight:400;margin-bottom:6px;}
.hr-label.terra{color:var(--terra);}
.hr-label.amber{color:var(--amber);}
.hr-label.sage{color:var(--sage);}
.hr-title{font-family:var(--serif);font-size:var(--head);font-weight:400;color:var(--ink);line-height:1.05;margin-bottom:3px;}
.hr-sub{font-family:var(--serif);font-style:italic;font-size:var(--caption);color:var(--muted);}
.hr-arrow{font-size:var(--sub);color:var(--muted-3);flex-shrink:0;}

/* PRAYERS */
.prayer-section{margin-bottom:var(--s4);}
.prayer-cat{font-family:var(--sans);font-size:var(--label);letter-spacing:.22em;text-transform:uppercase;color:var(--terra);padding-bottom:var(--s2);border-bottom:1px solid var(--border);margin-bottom:var(--s2);}
.prayer-row{display:flex;align-items:center;justify-content:space-between;padding:var(--s2) 0;border-bottom:1px solid var(--border);cursor:pointer;transition:opacity .15s;gap:var(--s2);}
.prayer-row:hover{opacity:.7;}
.pr-theme{font-family:var(--sans);font-size:var(--label);letter-spacing:.15em;text-transform:uppercase;color:var(--muted-2);margin-bottom:3px;}
.pr-title{font-family:var(--serif);font-size:var(--body-lg);font-weight:400;color:var(--ink);line-height:1.2;}
.pr-arrow{color:var(--muted-3);font-size:var(--sub);flex-shrink:0;}
.prayer-full{font-family:var(--serif);font-style:italic;font-size:var(--body-lg);line-height:1.9;color:var(--ink);white-space:pre-wrap;}

/* IDENTITY */
.id-row{padding:var(--s2) 0;border-bottom:1px solid var(--border);cursor:pointer;transition:opacity .15s;}
.id-row:hover{opacity:.7;}
.id-row:first-child{border-top:1px solid var(--border);}
.id-decl{font-family:var(--serif);font-size:var(--body-lg);font-weight:400;color:var(--ink);line-height:1.35;margin-bottom:3px;}
.id-ref{font-family:var(--sans);font-size:var(--label);letter-spacing:.18em;text-transform:uppercase;color:var(--terra);}

/* STUDY */
.testament-block{margin-bottom:var(--s4);}
.testament-title{font-family:var(--sans);font-size:var(--label);letter-spacing:.22em;text-transform:uppercase;color:var(--muted-2);padding-bottom:var(--s1);border-bottom:1px solid var(--border);margin-bottom:var(--s2);}
.book-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:var(--r-sm);overflow:hidden;}
@media(min-width:480px){.book-grid{grid-template-columns:repeat(4,1fr);}}
@media(min-width:768px){.book-grid{grid-template-columns:repeat(6,1fr);}}
.book-btn{background:var(--surface);font-family:var(--sans);font-size:var(--caption);font-weight:300;color:var(--muted);padding:12px 6px;text-align:center;transition:all .12s;min-height:44px;line-height:1.3;}
.book-btn:hover,.book-btn:active{background:var(--ink);color:var(--bg);}
.book-btn.has-study{color:var(--ink);font-weight:400;}

.sv-ref{font-family:var(--sans);font-size:var(--label);letter-spacing:.22em;text-transform:uppercase;color:var(--terra);margin-bottom:var(--s1);}
.sv-title{font-family:var(--serif);font-size:var(--head-lg);font-weight:400;letter-spacing:-.02em;color:var(--ink);margin-bottom:var(--s1);}
.sv-lede{font-family:var(--serif);font-style:italic;font-size:var(--body-lg);color:var(--muted);margin-bottom:var(--s4);line-height:1.6;}
.sv-tabs{display:flex;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border);margin-bottom:var(--s4);}
.sv-tabs::-webkit-scrollbar{display:none;}
.sv-tab{font-family:var(--sans);font-size:var(--caption);font-weight:300;color:var(--muted);padding:10px 16px;white-space:nowrap;border-bottom:2px solid transparent;transition:all .15s;flex-shrink:0;}
.sv-tab.active{color:var(--ink);border-bottom-color:var(--amber);font-weight:400;}
.sv-panel{display:none;}
.sv-panel.on{display:block;}
.scripture-text{font-family:var(--serif);font-size:var(--body-lg);line-height:1.9;color:var(--ink);}
.scripture-text .vnum{font-family:var(--sans);font-size:9px;font-weight:400;letter-spacing:.1em;color:var(--amber);vertical-align:super;margin-right:3px;}
.scripture-text p+p{margin-top:var(--s2);}
.meta-grid{display:flex;flex-direction:column;gap:0;margin-bottom:var(--s4);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.meta-cell{display:flex;align-items:baseline;gap:var(--s3);padding:14px var(--s3);border-bottom:1px solid var(--border);background:var(--surface);}
.meta-cell:last-child{border-bottom:none;}
.mc-label{font-family:var(--sans);font-size:var(--label);letter-spacing:.18em;text-transform:uppercase;color:var(--muted-2);flex-shrink:0;width:80px;}
.mc-val{font-family:var(--serif);font-size:var(--body-lg);color:var(--ink);line-height:1.5;flex:1;}
.term-block{border:1px solid var(--border);border-radius:var(--r);padding:var(--s3);margin-bottom:var(--s2);background:var(--surface);}
.term-script{font-family:var(--hb);font-size:32px;color:var(--amber);margin-bottom:var(--s1);line-height:1;}
.term-word{font-family:var(--serif);font-style:italic;font-size:var(--head);color:var(--ink);font-weight:400;margin-bottom:4px;}
.term-lang{font-family:var(--sans);font-size:var(--label);letter-spacing:.18em;text-transform:uppercase;color:var(--amber);margin-bottom:var(--s2);}
.term-gloss{font-family:var(--serif);font-size:var(--body);color:var(--muted);margin-bottom:var(--s2);line-height:1.65;}
.term-note{font-family:var(--serif);font-style:italic;font-size:var(--caption);color:var(--muted-2);border-left:2px solid var(--amber);padding-left:var(--s2);line-height:1.65;}
.context-text,.breakdown-text{font-family:var(--serif);font-size:var(--body-lg);line-height:1.8;color:var(--ink);margin-bottom:var(--s3);}
.study-prayer{font-family:var(--serif);font-style:italic;font-size:var(--body-lg);line-height:1.85;color:var(--ink);}

/* AUTHORS */
.ar-era{font-family:var(--sans);font-size:var(--label);letter-spacing:.15em;text-transform:uppercase;color:var(--amber);margin-bottom:3px;}
.ar-name{font-family:var(--serif);font-size:var(--sub);font-weight:400;color:var(--ink);line-height:1.1;}
.ar-tag{font-family:var(--serif);font-style:italic;font-size:var(--caption);color:var(--muted);}
.ar-arrow{color:var(--muted-3);font-size:var(--body);flex-shrink:0;}

/* PEN */
.pen-tabs{display:flex;gap:0;margin-bottom:var(--s3);border-bottom:1px solid var(--border);}
.pen-tab{font-family:var(--sans);font-size:var(--caption);letter-spacing:.1em;text-transform:uppercase;color:var(--muted-2);padding:10px 20px;border-bottom:2px solid transparent;transition:all .15s;}
.pen-tab.active{color:var(--ink);border-bottom-color:var(--ink);}
.pen-area{width:100%;font-family:var(--serif);font-size:var(--body-lg);font-weight:300;color:var(--ink);line-height:1.8;border:none;background:transparent;resize:none;outline:none;min-height:40vh;}
.pen-area::placeholder{color:var(--muted-3);font-style:italic;}
.pen-save{font-family:var(--sans);font-size:var(--label);letter-spacing:.22em;text-transform:uppercase;color:var(--muted-2);padding:var(--s1) var(--s2);border:1px solid var(--border-2);border-radius:var(--r-xl);margin-top:var(--s2);transition:all .15s;}
.pen-save:hover{background:var(--ink);color:var(--bg);border-color:var(--ink);}
.pen-entries{margin-top:var(--s4);display:flex;flex-direction:column;gap:var(--s3);}
.pen-entry{padding:var(--s3) 0;border-bottom:1px solid var(--border);}
.pe-date{font-family:var(--sans);font-size:var(--label);letter-spacing:.18em;text-transform:uppercase;color:var(--muted-3);margin-bottom:var(--s1);}
.pe-body{font-family:var(--serif);font-size:var(--body);line-height:1.7;color:var(--ink);}

/* MODAL */
.modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(28,15,7,.5);display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .2s ease;padding:0;}
@media(min-width:640px){.modal-overlay{align-items:center;padding:var(--s4);}}
.modal-card{background:var(--bg);width:100%;max-width:680px;max-height:92svh;overflow-y:auto;border-radius:var(--r-xl) var(--r-xl) 0 0;padding:var(--s2) var(--s3) calc(var(--s5) + env(safe-area-inset-bottom,0px));animation:slideUp .3s cubic-bezier(.4,0,.2,1);position:relative;}
@media(min-width:640px){.modal-card{border-radius:var(--r-lg);padding:var(--s4) var(--s4) var(--s5);max-height:88vh;}}
.modal-handle{width:36px;height:4px;background:var(--border-2);border-radius:2px;margin:0 auto var(--s3);}
@media(min-width:640px){.modal-handle{display:none;}}
.modal-close{position:absolute;top:var(--s2);right:var(--s2);width:36px;height:36px;border-radius:50%;background:var(--surface-2);display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--muted);transition:all .15s;z-index:1;}
.modal-close:hover{background:var(--ink);color:var(--bg);}

/* SEARCH */
.search-overlay{position:fixed;inset:0;z-index:300;background:rgba(242,231,218,.97);backdrop-filter:blur(20px);display:flex;flex-direction:column;padding:calc(var(--s3) + env(safe-area-inset-top,0px)) var(--s3) var(--s3);animation:fadeIn .2s ease;}
.search-bar{display:flex;align-items:center;gap:var(--s2);margin-bottom:var(--s3);}
.search-input{flex:1;background:var(--surface);border:1px solid var(--border-2);border-radius:var(--r-xl);padding:12px 20px;font-family:var(--sans);font-size:var(--body);font-weight:300;color:var(--ink);outline:none;}
.search-input::placeholder{color:var(--muted-3);}
.search-input:focus{border-color:var(--ink);}
.search-close{font-family:var(--sans);font-size:var(--label);letter-spacing:.2em;text-transform:uppercase;color:var(--muted);padding:8px;}
.search-results{overflow-y:auto;flex:1;}
.sr-item{padding:var(--s2) 0;border-bottom:1px solid var(--border);cursor:pointer;transition:opacity .15s;}
.sr-item:hover{opacity:.7;}
.sr-type{font-family:var(--sans);font-size:var(--label);letter-spacing:.18em;text-transform:uppercase;color:var(--muted-2);margin-bottom:3px;}
.sr-title{font-family:var(--serif);font-size:var(--body-lg);color:var(--ink);}
.sr-meta{font-family:var(--serif);font-style:italic;font-size:var(--body);color:var(--muted);}

.hidden{display:none!important;}


/* ============================================================
   V2 COLOR LAYER — Rooted needs to be looked at
   ============================================================ */

/* WORD CARD — dominant surface, commands the home screen */
.word-block {
  background: #375A3E;
  border-radius: 20px;
  padding: 24px 20px;
  margin-bottom: var(--s3);
}
.word-block .word-label { color: rgba(242,231,218,.65); }
.word-block .word-ref   { color: #C49230; letter-spacing:.15em; }
.word-block .word-pull  { color: #F2E7DA; font-size: clamp(24px,6.5vw,38px); font-weight: 500; }
.word-block .word-verse {
  color: rgba(242,231,218,.88);
  border-left-color: rgba(196,146,48,.55);
}
.word-block .word-prompt { color: rgba(242,231,218,.82); font-size: var(--body-lg); }
.word-block .word-cta    { color: #C49230; }
.word-block .home-divider { background: rgba(242,231,218,.15); }

/* HOME QUICK TILES — 2×2 color grid below posture check */
.home-tiles {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: var(--s3);
}
.home-tile {
  border-radius: var(--r);
  padding: 18px 16px;
  cursor: pointer;
  transition: transform .15s, box-shadow .15s;
  -webkit-tap-highlight-color: transparent;
}
.home-tile:hover { transform: translateY(-2px); box-shadow: var(--shadow-2); }
.home-tile-label {
  font-family: var(--sans);
  font-size: 9px;
  letter-spacing: .22em;
  text-transform: uppercase;
  font-weight: 500;
  margin-bottom: 6px;
}
.home-tile-title {
  font-family: var(--serif);
  font-size: 19px;
  font-weight: 400;
  line-height: 1.1;
}
.ht-terra { background: #8C3520; }
.ht-terra .home-tile-label  { color: rgba(242,231,218,.55); }
.ht-terra .home-tile-title  { color: #F2E7DA; }

.ht-amber { background: #A86D1E; }
.ht-amber .home-tile-label  { color: rgba(242,231,218,.55); }
.ht-amber .home-tile-title  { color: #F2E7DA; }

.ht-sage  { background: #4B6140; }
.ht-sage  .home-tile-label  { color: rgba(242,231,218,.55); }
.ht-sage  .home-tile-title  { color: #F2E7DA; }

.ht-light { background: #FAF4EC; border: 1px solid rgba(28,15,7,.12); }
.ht-light .home-tile-label  { color: var(--terra); }
.ht-light .home-tile-title  { color: var(--ink); }

/* SECTION HEADERS — colored label strip above title */
.sh-block-terra {
  background: linear-gradient(135deg, rgba(140,53,32,.08), rgba(140,53,32,.04));
  border-left: 3px solid var(--terra);
  border-radius: 0 var(--r-sm) var(--r-sm) 0;
  padding: 14px 16px;
  margin-bottom: var(--s3);
}
.sh-block-amber {
  background: linear-gradient(135deg, rgba(168,109,30,.08), rgba(168,109,30,.04));
  border-left: 3px solid var(--amber);
  border-radius: 0 var(--r-sm) var(--r-sm) 0;
  padding: 14px 16px;
  margin-bottom: var(--s3);
}
.sh-block-sage {
  background: linear-gradient(135deg, rgba(75,97,64,.08), rgba(75,97,64,.04));
  border-left: 3px solid var(--sage);
  border-radius: 0 var(--r-sm) var(--r-sm) 0;
  padding: 14px 16px;
  margin-bottom: var(--s3);
}

/* WOMAN ROWS — left border in accent color */
.lineage-row { border-left: 2.5px solid transparent; padding-left: 12px; }
.lineage-row:hover { border-left-color: var(--terra) !important; }
.woman-row-terra { border-left: 2.5px solid rgba(140,53,32,.25); padding-left: 12px; }
.woman-row-amber { border-left: 2.5px solid rgba(168,109,30,.25); padding-left: 12px; }
.woman-row-sage  { border-left: 2.5px solid rgba(75,97,64,.25);  padding-left: 12px; }
.woman-row-terra:hover { border-left-color: var(--terra); }
.woman-row-amber:hover { border-left-color: var(--amber); }
.woman-row-sage:hover  { border-left-color: var(--sage); }

/* PRAYER CATEGORY STRIPS */
.prayer-cat {
  background: linear-gradient(to right, rgba(140,53,32,.07), transparent);
  padding: 8px 12px;
  border-left: 2.5px solid var(--terra);
  border-bottom: none;
  border-radius: 0 var(--r-xs) var(--r-xs) 0;
  margin-bottom: var(--s2);
}

/* IDENTITY ROWS — amber accent on hover */
.id-row:hover { background: rgba(168,109,30,.05); border-radius: var(--r-xs); }
.id-row:first-child { border-top: 1px solid var(--border); }

/* POSTURE PILLS — match state colors */
.posture-pill[data-state="tired"]:hover    { background: #5A6880; }
.posture-pill[data-state="anxious"]:hover  { background: var(--amber); }
.posture-pill[data-state="carrying"]:hover { background: #7A5A72; }
.posture-pill[data-state="afraid"]:hover   { background: var(--terra); }
.posture-pill[data-state="hopeful"]:hover  { background: var(--sage); }
.posture-pill[data-state="thirsty"]:hover   { background: #8B6010; }

/* TAB BAR — richer warm tone */
.tab-bar {
  background: rgba(242,231,218,.98) !important;
  border-top: 1px solid rgba(28,15,7,.14) !important;
}
.tb-item.active { color: var(--terra) !important; }

/* AUTHOR ROWS — amber accent */
.author-row { border-left: 2.5px solid rgba(168,109,30,.2); padding-left: 12px; }
.author-row:hover { border-left-color: var(--amber); }

/* BOOK GRID — has-study books more visible */
.book-btn.has-study { background: #FBF7EF; color: var(--ink-2); }
.book-btn.has-study:hover { background: var(--terra); color: var(--bg); }

/* STUDY VIEW — colored ref */
.sv-ref { color: var(--terra); font-size: var(--caption); letter-spacing: .22em; }
.sv-tab.active { color: var(--terra); border-bottom-color: var(--terra); }

/* HUB ROWS — richer borders */
.hub-row { border-left: 3px solid transparent; }
.hub-row:has(.terra) { border-left-color: var(--terra); }
.hub-row:has(.amber) { border-left-color: var(--amber); }
.hub-row:has(.sage)  { border-left-color: var(--sage); }

/* DESKTOP TOP NAV — warm amber dot */
.tn-rule { background: var(--amber); opacity: .8; }
.tn-link.active { color: var(--terra); }
.tn-link.active::after { background: var(--terra); }


/* ============================================================
   COLOR PRESSURE TEST — Comprehensive pass
   ============================================================ */

/* LINEAGE FLOW — vertical with connector line */
.lineage-flow { display: flex; flex-direction: column; }
.lineage-node { cursor: pointer; }
.lineage-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 4px solid var(--terra);
  border-radius: var(--r);
  padding: var(--s3);
  transition: all .18s;
  box-shadow: var(--shadow);
}
.lineage-card:hover { box-shadow: var(--shadow-2); transform: translateX(3px); }
.ln-name { font-family: var(--serif); font-size: clamp(26px,6.5vw,34px); font-weight:400; color: var(--ink); letter-spacing:-.02em; line-height:1.05; margin-bottom:4px; }
.ln-tag  { font-family: var(--serif); font-style:italic; font-size:var(--body); color:var(--muted); line-height:1.4; margin-bottom:var(--s1); }
.ln-ref  { font-family: var(--sans); font-size:var(--label); letter-spacing:.18em; text-transform:uppercase; color:var(--terra); }
.lineage-connector {
  width: 2px; height: 36px; margin: 0 auto;
  background: linear-gradient(to bottom, var(--terra), rgba(140,53,32,.2));
}
.lineage-end { text-align:center; padding: var(--s4) 0 var(--s2); }
.le-text { font-family:var(--serif); font-style:italic; font-size:var(--body); color:var(--muted); margin-bottom:4px; }
.le-ref  { font-family:var(--sans); font-size:var(--label); letter-spacing:.2em; text-transform:uppercase; color:var(--muted-3); }

/* WOMAN ROWS — colored gradient background per group */
.woman-row-terra {
  border-left: 4px solid var(--terra) !important;
  padding-left: 14px !important;
  background: linear-gradient(to right, rgba(140,53,32,.07) 0%, transparent 60%);
  border-radius: 0 var(--r-sm) var(--r-sm) 0;
  margin-bottom: 2px;
}
.woman-row-amber {
  border-left: 4px solid var(--amber) !important;
  padding-left: 14px !important;
  background: linear-gradient(to right, rgba(168,109,30,.08) 0%, transparent 60%);
  border-radius: 0 var(--r-sm) var(--r-sm) 0;
  margin-bottom: 2px;
}
.woman-row-sage {
  border-left: 4px solid var(--sage) !important;
  padding-left: 14px !important;
  background: linear-gradient(to right, rgba(75,97,64,.08) 0%, transparent 60%);
  border-radius: 0 var(--r-sm) var(--r-sm) 0;
  margin-bottom: 2px;
}
/* Remove the old border-bottom between gradient rows */
.woman-row-terra, .woman-row-amber, .woman-row-sage {
  border-bottom: 1px solid rgba(28,15,7,.06) !important;
}

/* POSTURE PILLS — color coded resting state */
.posture-pill[data-state="tired"]    { border-color: rgba(90,104,128,.35);  color: #4A5A70; }
.posture-pill[data-state="anxious"]  { border-color: rgba(168,109,30,.35);  color: var(--amber); }
.posture-pill[data-state="carrying"] { border-color: rgba(122,90,114,.35);  color: #7A5A72; }
.posture-pill[data-state="afraid"]   { border-color: rgba(140,53,32,.35);   color: var(--terra); }
.posture-pill[data-state="hopeful"]  { border-color: rgba(75,97,64,.35);    color: var(--sage); }
.posture-pill[data-state="thirsty"]   { border-color: rgba(139,96,16,.35);   color: #8B6010; }

.posture-pill[data-state="tired"]:hover    { background: #5A6880; color: var(--bg); border-color: #5A6880; }
.posture-pill[data-state="anxious"]:hover  { background: var(--amber); color: var(--bg); border-color: var(--amber); }
.posture-pill[data-state="carrying"]:hover { background: #7A5A72; color: var(--bg); border-color: #7A5A72; }
.posture-pill[data-state="afraid"]:hover   { background: var(--terra); color: var(--bg); border-color: var(--terra); }
.posture-pill[data-state="hopeful"]:hover  { background: var(--sage); color: var(--bg); border-color: var(--sage); }
.posture-pill[data-state="thirsty"]:hover   { background: #8B6010; color: var(--bg); border-color: #8B6010; }

/* PRAYER — rotate section colors across the 5 categories */
.prayer-section:nth-child(1) .prayer-cat { border-left-color: var(--terra); background: linear-gradient(to right, rgba(140,53,32,.07), transparent); }
.prayer-section:nth-child(2) .prayer-cat { border-left-color: var(--amber); background: linear-gradient(to right, rgba(168,109,30,.07), transparent); }
.prayer-section:nth-child(3) .prayer-cat { border-left-color: var(--sage); background: linear-gradient(to right, rgba(75,97,64,.07), transparent); }
.prayer-section:nth-child(4) .prayer-cat { border-left-color: var(--terra); background: linear-gradient(to right, rgba(140,53,32,.07), transparent); }
.prayer-section:nth-child(5) .prayer-cat { border-left-color: var(--amber); background: linear-gradient(to right, rgba(168,109,30,.07), transparent); }

.prayer-row:hover { background: rgba(168,109,30,.04); border-radius: var(--r-xs); }

/* IDENTITY — first 10 flagged with amber, rest with subtle terra */
.id-row:nth-child(-n+10) .id-ref { color: var(--amber); }
.id-row:hover { background: linear-gradient(to right, rgba(168,109,30,.05), transparent); border-radius: 0 var(--r-xs) var(--r-xs) 0; }
.id-row { border-left: 2px solid transparent; padding-left: 10px; }
.id-row:hover { border-left-color: var(--amber); }
.id-row:nth-child(-n+10) { border-left-color: rgba(168,109,30,.2); }

/* AUTHORS — amber row accent */
.author-row {
  border-left: 4px solid rgba(168,109,30,.2) !important;
  padding-left: 14px !important;
  background: linear-gradient(to right, rgba(168,109,30,.04), transparent);
  border-radius: 0 var(--r-sm) var(--r-sm) 0;
  border-bottom: 1px solid rgba(28,15,7,.06) !important;
  margin-bottom: 2px;
}
.author-row:hover { border-left-color: var(--amber) !important; background: linear-gradient(to right, rgba(168,109,30,.09), transparent); }

/* HUB ROWS — richer left borders */
.hub-row { border-left-width: 4px !important; }

/* WOMEN HUB tiles on home — add subtle inner glow */
.ht-terra { background: linear-gradient(135deg, #8C3520, #7A2C18); }
.ht-amber { background: linear-gradient(135deg, #A86D1E, #8F5A14); }
.ht-sage  { background: linear-gradient(135deg, #4B6140, #3A4F30); }
.ht-light { background: linear-gradient(135deg, #FAF4EC, #F3EAE0); }

/* STUDY — book grid richer */
.book-btn.has-study {
  background: linear-gradient(135deg, #FBF7EF, #F5EDE0);
  color: var(--ink-2);
  font-weight: 400;
}
.book-btn.has-study:hover { background: var(--terra); color: var(--bg); }

/* MODAL bottom accent bar per section */
.modal-card { border-top: 0; }

/* KEY TERM on home — amber script larger */

/* LINEAGE END — amber Jesus reference */
.le-text { color: var(--muted); }
.le-ref  { color: var(--amber) !important; }

.study-list { display: flex; flex-direction: column; }
.study-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--s2);
  padding: var(--s3) 0 var(--s3) 14px;
  border-bottom: 1px solid var(--border);
  border-left: 3px solid transparent;
  cursor: pointer;
  transition: all .15s;
}
.study-row:hover {
  border-left-color: var(--amber);
  background: rgba(168,109,30,.03);
  padding-left: 18px;
}
.study-row-inner { flex: 1; min-width: 0; }
.sr-ref {
  font-family: var(--sans);
  font-size: var(--label);
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--amber);
  margin-bottom: 3px;
}
.sr-title {
  font-family: var(--serif);
  font-size: var(--sub);
  font-weight: 400;
  color: var(--ink);
  line-height: 1.1;
  margin-bottom: 4px;
  overflow-wrap: break-word;
}
.sr-lede {
  font-family: var(--serif);
  font-style: italic;
  font-size: var(--body);
  color: var(--muted);
  line-height: 1.5;
  overflow-wrap: break-word;
}
.sr-arrow {
  font-family: var(--sans);
  font-size: var(--sub);
  color: var(--muted-3);
  flex-shrink: 0;
}
/* NT rows — terra ref */
#nt-list .sr-ref { color: var(--terra); }
#nt-list .study-row:hover { border-left-color: var(--terra); background: rgba(140,53,32,.03); }


/* WOMEN CARD GRID — community layout, not lineage */
.woman-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.woman-grid-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: var(--s3) var(--s2);
  cursor: pointer;
  transition: all .18s;
  box-shadow: var(--shadow);
}
.woman-grid-card:hover { box-shadow: var(--shadow-2); transform: translateY(-2px); }
.wgc-amber { border-left: 3px solid var(--amber); }
.wgc-sage  { border-left: 3px solid var(--sage); }
.wgc-name {
  font-family: var(--serif);
  font-size: clamp(18px, 4.5vw, 22px);
  font-weight: 400;
  color: var(--ink);
  line-height: 1.1;
  letter-spacing: -.01em;
  margin-bottom: 5px;
}
.wgc-tag {
  font-family: var(--serif);
  font-style: italic;
  font-size: var(--caption);
  color: var(--muted);
  line-height: 1.4;
}

/* PRAYERS — reduce overwhelm: increase row height, category spacing */
.prayer-section { margin-bottom: var(--s5); }
.prayer-cat {
  font-size: var(--body) !important;
  font-family: var(--serif) !important;
  font-style: italic !important;
  letter-spacing: 0 !important;
  text-transform: none !important;
  color: var(--ink) !important;
  padding: var(--s2) var(--s2) var(--s2) var(--s3) !important;
  margin-bottom: var(--s2) !important;
  font-weight: 400 !important;
}
.prayer-row { padding: var(--s3) 0 !important; }
.pr-title { font-size: var(--sub) !important; }
.pr-theme { display: none; }

/* IDENTITY — more space, less density */
.id-row { padding: var(--s3) var(--s2) var(--s3) 16px !important; }
.id-decl { font-size: var(--sub) !important; line-height: 1.2 !important; }
.id-ref { margin-top: 5px; }


/* ============================================================
   PAGE HERO — identical across every page, no exceptions
   ============================================================ */
.page-hero {
  padding: var(--s2) 0 var(--s3) 0;
  margin-bottom: 0;
}
.hero-label {
  font-family: var(--sans);
  font-size: var(--label);
  letter-spacing: .22em;
  text-transform: uppercase;
  font-weight: 400;
  margin-bottom: 8px;
}
.hero-label-terra { color: var(--terra); }
.hero-label-amber { color: var(--amber); }
.hero-label-sage  { color: var(--sage); }
.hero-label-ink   { color: var(--muted); }
.hero-title {
  font-family: var(--serif);
  font-size: var(--head-lg);
  font-weight: 400;
  letter-spacing: -.025em;
  line-height: 1.0;
  color: var(--ink);
}
.hero-intro {
  font-family: var(--serif);
  font-size: var(--body-lg);
  line-height: 1.75;
  color: var(--muted);
  margin-top: var(--s2);
  margin-bottom: var(--s4);
}


.posture-pill[data-state="grateful"]:hover  { background: #4B6140; color: var(--bg); border-color: #4B6140; }
.posture-pill[data-state="joyful"]:hover    { background: #8B6010; color: var(--bg); border-color: #8B6010; }
.posture-pill[data-state="expectant"]:hover { background: #A86D1E; color: var(--bg); border-color: #A86D1E; }
.posture-pill[data-state="grieving"]:hover  { background: #5A4060; color: var(--bg); border-color: #5A4060; }
.posture-pill[data-state="grateful"]  { border-color: rgba(75,97,64,.35);   color: var(--sage); }
.posture-pill[data-state="joyful"]    { border-color: rgba(139,96,16,.35);  color: #8B6010; }
.posture-pill[data-state="expectant"] { border-color: rgba(168,109,30,.35); color: var(--amber); }
.posture-pill[data-state="grieving"]  { border-color: rgba(90,64,96,.35);   color: #5A4060; }


/* ============================================================
   PRAYER LIBRARY — redesigned
   ============================================================ */
.prayer-library { display: flex; flex-direction: column; gap: 0; }
.prayer-season {
  padding: var(--s4) 0 var(--s3);
  border-bottom: 1px solid var(--border);
}
.prayer-season:last-child { border-bottom: none; }
.ps-number {
  font-family: var(--sans);
  font-size: 10px;
  letter-spacing: .3em;
  text-transform: uppercase;
  color: var(--muted-3);
  margin-bottom: var(--s1);
}
.ps-name {
  font-family: var(--serif);
  font-size: clamp(22px, 5.5vw, 28px);
  font-weight: 400;
  color: var(--ink);
  line-height: 1.05;
  letter-spacing: -.02em;
  margin-bottom: 6px;
}
.ps-desc {
  font-family: var(--serif);
  font-style: italic;
  font-size: var(--body);
  color: var(--muted);
  line-height: 1.5;
  margin-bottom: var(--s3);
}
.ps-prayers { display: flex; flex-direction: column; gap: 2px; }
.ps-prayer-item {
  font-family: var(--serif);
  font-size: var(--body-lg);
  color: var(--ink);
  padding: 12px 0 12px 16px;
  border-left: 2px solid transparent;
  cursor: pointer;
  transition: all .15s;
  line-height: 1.3;
}
.ps-prayer-item:hover { border-left-color: var(--amber); color: var(--terra); padding-left: 20px; }


/* ============================================================
   PRAYER — Two-level: season doors then prayers inside
   ============================================================ */
.season-doors { display: flex; flex-direction: column; gap: var(--s2); }
.season-door {
  display: flex; align-items: center; justify-content: space-between;
  padding: var(--s3) var(--s3);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  cursor: pointer;
  transition: all .18s;
  box-shadow: var(--shadow);
  gap: var(--s2);
}
.season-door:hover { box-shadow: var(--shadow-2); transform: translateY(-1px); }
.sd-left { flex: 1; min-width: 0; }
.sd-count {
  font-family: var(--sans); font-size: var(--label);
  letter-spacing: .2em; text-transform: uppercase;
  color: var(--muted-3); margin-bottom: 6px;
}
.sd-name {
  font-family: var(--serif);
  font-size: clamp(20px,5vw,26px);
  font-weight: 400; color: var(--ink);
  line-height: 1.05; letter-spacing: -.02em;
  margin-bottom: 5px;
}
.sd-desc {
  font-family: var(--serif); font-style: italic;
  font-size: var(--body); color: var(--muted); line-height: 1.4;
}
.sd-arrow { font-size: var(--sub); color: var(--muted-3); flex-shrink: 0; }
.season-inner-list { display: flex; flex-direction: column; }
.prayer-item-row {
  padding: var(--s3) 0;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: all .15s;
}
.prayer-item-row:hover .pir-title { color: var(--terra); }
.pir-title {
  font-family: var(--serif);
  font-size: var(--sub);
  font-weight: 400; color: var(--ink);
  line-height: 1.2; transition: color .15s;
}

/* ============================================================
   IDENTITY — Featured card + scrollable declarations
   ============================================================ */
.id-featured {
  background: var(--terra);
  border-radius: var(--r-lg);
  padding: var(--s4) var(--s3);
  margin-bottom: var(--s3);
  cursor: pointer;
  transition: opacity .15s;
}
.id-featured:hover { opacity: .92; }
.id-feat-label {
  font-family: var(--sans); font-size: var(--label);
  letter-spacing: .25em; text-transform: uppercase;
  color: rgba(242,231,218,.55); margin-bottom: var(--s2);
}
.id-feat-decl {
  font-family: var(--serif);
  font-size: clamp(22px,5.5vw,30px);
  font-weight: 400; color: #F2E7DA;
  line-height: 1.2; letter-spacing: -.02em;
  margin-bottom: var(--s2);
}
.id-feat-ref {
  font-family: var(--sans); font-size: var(--label);
  letter-spacing: .2em; text-transform: uppercase;
  color: rgba(242,231,218,.5);
}
.id-scroll-label {
  font-family: var(--sans); font-size: var(--label);
  letter-spacing: .22em; text-transform: uppercase;
  color: var(--muted-2); margin-bottom: var(--s2);
  padding-top: var(--s2);
}

/* ============================================================
   AUTHORS — Substantial rows with visual hierarchy
   ============================================================ */
.author-section-header {
  display: flex; align-items: baseline;
  justify-content: space-between;
  padding-bottom: var(--s2);
  border-bottom: 2px solid;
  margin-bottom: var(--s2);
}
.author-substantial {
  display: flex; align-items: flex-start; justify-content: space-between;
  padding: var(--s3) 0 var(--s3) 14px;
  border-bottom: 1px solid var(--border);
  border-left: 3px solid transparent;
  cursor: pointer; transition: all .15s; gap: var(--s2);
}
.author-substantial:hover { border-left-color: var(--amber); }
.as-nt:hover { border-left-color: var(--terra); }
.as-inner { flex: 1; min-width: 0; }
.as-era {
  font-family: var(--sans); font-size: var(--label);
  letter-spacing: .18em; text-transform: uppercase;
  margin-bottom: 4px;
}
.as-name {
  font-family: var(--serif);
  font-size: clamp(22px,5.5vw,28px);
  font-weight: 400; color: var(--ink);
  line-height: 1.0; letter-spacing: -.01em;
  margin-bottom: 5px;
}
.as-tag {
  font-family: var(--serif); font-style: italic;
  font-size: var(--body); color: var(--muted); line-height: 1.4;
  overflow-wrap: break-word;
}
.as-arrow { color: var(--muted-3); font-size: var(--body); flex-shrink: 0; padding-top: 6px; }


/* ============================================================
   IDENTITY — Single declaration, full focus
   ============================================================ */
.id-deck {
  display: flex;
  flex-direction: column;
  min-height: 60svh;
  justify-content: space-between;
  padding: var(--s3) 0;
}
.id-deck-card {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: var(--s4) 0;
}
.id-deck-number {
  font-family: var(--sans);
  font-size: var(--label);
  letter-spacing: .25em;
  text-transform: uppercase;
  color: var(--muted-3);
  margin-bottom: var(--s3);
}
.id-deck-decl {
  font-family: var(--serif);
  font-size: clamp(26px, 6.5vw, 38px);
  font-weight: 400;
  color: var(--ink);
  line-height: 1.15;
  letter-spacing: -.02em;
  margin-bottom: var(--s3);
}
.id-deck-ref {
  font-family: var(--sans);
  font-size: var(--label);
  letter-spacing: .2em;
  text-transform: uppercase;
  color: var(--amber);
  margin-bottom: var(--s4);
}
.id-deck-reflect {
  font-family: var(--sans);
  font-size: var(--label);
  letter-spacing: .25em;
  text-transform: uppercase;
  color: var(--ink);
  padding: 14px var(--s3);
  border: 1px solid var(--border-2);
  border-radius: var(--r-xl);
  display: inline-block;
  transition: all .15s;
  align-self: flex-start;
}
.id-deck-reflect:hover { background: var(--ink); color: var(--bg); }
.id-deck-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-top: var(--s3);
  border-top: 1px solid var(--border);
  margin-top: var(--s3);
}
.id-nav-btn {
  font-family: var(--sans);
  font-size: var(--caption);
  letter-spacing: .15em;
  text-transform: uppercase;
  color: var(--muted);
  padding: 10px 0;
  transition: color .15s;
  min-width: 80px;
}
.id-nav-btn:hover { color: var(--ink); }
.id-nav-btn.next { text-align: right; }
.id-nav-btn:disabled { opacity: .25; pointer-events: none; }
.id-progress {
  font-family: var(--sans);
  font-size: var(--label);
  letter-spacing: .15em;
  color: var(--muted-3);
}
.id-deck-all-btn {
  font-family: var(--sans);
  font-size: var(--label);
  letter-spacing: .2em;
  text-transform: uppercase;
  color: var(--muted-2);
  text-decoration: underline;
  text-underline-offset: 3px;
  margin-top: var(--s2);
  display: block;
  text-align: center;
  transition: color .15s;
}
.id-deck-all-btn:hover { color: var(--ink); }

/* ============================================================
   AUTHORS — 2-column grid, each person has a face
   ============================================================ */
.authors-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.author-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: var(--s3) var(--s2);
  cursor: pointer;
  transition: all .18s;
  box-shadow: var(--shadow);
  display: flex;
  flex-direction: column;
  gap: 4px;
  min-height: 100px;
}
.author-card:hover { box-shadow: var(--shadow-2); transform: translateY(-2px); }
.author-card-ot { border-left: 3px solid var(--amber); }
.author-card-nt { border-left: 3px solid var(--terra); }
.ac-era {
  font-family: var(--sans);
  font-size: 9px;
  letter-spacing: .2em;
  text-transform: uppercase;
  font-weight: 400;
}
.author-card-ot .ac-era { color: var(--amber); }
.author-card-nt .ac-era { color: var(--terra); }
.ac-name {
  font-family: var(--serif);
  font-size: clamp(17px, 4vw, 21px);
  font-weight: 400;
  color: var(--ink);
  line-height: 1.1;
  letter-spacing: -.01em;
}
.ac-tag {
  font-family: var(--serif);
  font-style: italic;
  font-size: var(--caption);
  color: var(--muted);
  line-height: 1.4;
}


/* ============================================================
   IDENTITY — rebuilt
   ============================================================ */
.identity-page { display: flex; flex-direction: column; }

.id-opening {
  padding: var(--s2) 0 var(--s3);
  margin-bottom: 0;
}
.id-opening-word {
  font-family: var(--serif);
  font-style: italic;
  font-size: var(--body-lg);
  color: var(--muted);
  line-height: 1.75;
}

.id-declarations { display: flex; flex-direction: column; gap: 0; margin-top: var(--s3); }

.id-declaration {
  padding: var(--s3) 0;
  border-bottom: 1px solid var(--border);
  border-top: none;
  cursor: pointer;
  display: grid;
  grid-template-columns: 28px 1fr 16px;
  gap: var(--s2);
  align-items: center;
  transition: all .15s;
}
.id-declaration:hover { background: rgba(168,109,30,.05); padding-left: 8px; padding-right: 8px; border-radius: var(--r-sm); }
.id-declaration:first-child { border-top: 1px solid var(--border); }

.id-num {
  font-family: var(--sans);
  font-size: 10px;
  font-weight: 400;
  letter-spacing: .1em;
  color: var(--muted-3);
  text-align: right;
  align-self: start;
  padding-top: 5px;
}
.id-text-block { display: flex; flex-direction: column; gap: 5px; }
.id-statement {
  font-family: var(--serif);
  font-size: var(--body-lg);
  font-weight: 400;
  color: var(--ink);
  line-height: 1.35;
  overflow-wrap: break-word;
}
.id-verse-ref {
  font-family: var(--sans);
  font-size: 10px;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--amber);
}
.id-chevron {
  color: var(--muted-3);
  font-size: var(--body);
  align-self: center;
  transition: color .15s;
}
.id-declaration:hover .id-chevron { color: var(--amber); }


/* ============================================================
   AUTHORS — Editorial byline style. Not a grid. Not a list.
   Each person is introduced the way a writer deserves.
   ============================================================ */
.authors-testament {
  margin-bottom: var(--s5);
}
.authors-testament-label {
  font-family: var(--sans);
  font-size: var(--label);
  letter-spacing: .3em;
  text-transform: uppercase;
  font-weight: 500;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 0;
  display: flex;
  align-items: baseline;
  justify-content: space-between;
}
.author-entry {
  padding: var(--s3) 0;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: all .15s;
}
.author-entry:hover { background: rgba(28,15,7,.02); padding-left: 6px; padding-right: 6px; }
.ae-byline {
  display: flex;
  align-items: baseline;
  gap: var(--s2);
  margin-bottom: 5px;
  flex-wrap: wrap;
}
.ae-name {
  font-family: var(--serif);
  font-size: clamp(20px, 5vw, 26px);
  font-weight: 400;
  color: var(--ink);
  letter-spacing: -.02em;
  line-height: 1.0;
}
.ae-era {
  font-family: var(--sans);
  font-size: 10px;
  letter-spacing: .18em;
  text-transform: uppercase;
  font-weight: 400;
  flex-shrink: 0;
}
.ae-tag {
  font-family: var(--serif);
  font-style: italic;
  font-size: var(--body);
  color: var(--muted);
  line-height: 1.4;
}


/* ============================================================
   AUTHORS — Featured profiles + full cast
   Two foundational voices get the room they earned.
   Everyone else is introduced, not catalogued.
   ============================================================ */

/* Featured profile — Moses (OT) and Paul (NT) */
.author-featured {
  background: var(--surface);
  border-radius: var(--r-lg);
  padding: var(--s4) var(--s3);
  margin-bottom: var(--s4);
  cursor: pointer;
  transition: box-shadow .18s;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  position: relative;
  overflow: hidden;
}
.author-featured:hover { box-shadow: var(--shadow-3); }
.af-testament-bar {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
}
.af-role {
  font-family: var(--sans);
  font-size: var(--label);
  letter-spacing: .25em;
  text-transform: uppercase;
  margin-bottom: var(--s2);
  font-weight: 400;
}
.af-name {
  font-family: var(--serif);
  font-size: clamp(36px, 9vw, 52px);
  font-weight: 400;
  color: var(--ink);
  letter-spacing: -.03em;
  line-height: .95;
  margin-bottom: var(--s2);
}
.af-connection {
  font-family: var(--serif);
  font-style: italic;
  font-size: var(--body-lg);
  color: var(--muted);
  line-height: 1.6;
  margin-bottom: var(--s3);
  max-width: 48ch;
}
.af-era {
  font-family: var(--sans);
  font-size: 10px;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: var(--muted-3);
}

/* Testament divider */
.authors-divider {
  display: flex;
  align-items: center;
  gap: var(--s2);
  margin: var(--s2) 0 var(--s3);
}
.authors-divider-label {
  font-family: var(--sans);
  font-size: var(--label);
  letter-spacing: .28em;
  text-transform: uppercase;
  font-weight: 500;
  white-space: nowrap;
}
.authors-divider-line {
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* Supporting cast entries */
.author-cast {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  padding: var(--s3) 0;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  gap: var(--s2);
  transition: all .15s;
}
.author-cast:first-of-type { border-top: 1px solid var(--border); }
.author-cast:hover { padding-left: 6px; }
.ac-body { flex: 1; min-width: 0; }
.ac-name {
  font-family: var(--serif);
  font-size: clamp(20px, 5vw, 25px);
  font-weight: 400;
  color: var(--ink);
  letter-spacing: -.015em;
  line-height: 1.05;
  margin-bottom: 5px;
}
.ac-desc {
  font-family: var(--serif);
  font-style: italic;
  font-size: var(--body);
  color: var(--muted);
  line-height: 1.4;
  overflow-wrap: break-word;
}
.ac-era-badge {
  font-family: var(--sans);
  font-size: 9px;
  letter-spacing: .18em;
  text-transform: uppercase;
  padding: 3px 8px;
  border-radius: 20px;
  border: 1px solid;
  white-space: nowrap;
  flex-shrink: 0;
  margin-top: 4px;
}


.af-bridge {

/* MORE SHEET — slides up from bottom, authors + pen */
.more-overlay {
  position: fixed; inset: 0; z-index: 150;
  background: rgba(28,15,7,.45);
  animation: fadeIn .2s ease;
}
.more-sheet {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: var(--bg);
  border-radius: var(--r-xl) var(--r-xl) 0 0;
  padding: var(--s2) var(--s3) calc(var(--s4) + env(safe-area-inset-bottom,0px));

}
.more-handle {
  width: 36px; height: 4px; background: var(--border-2);
  border-radius: 2px; margin: 0 auto var(--s3);
}
.more-item {
  display: flex; align-items: center; gap: var(--s2);

  cursor: pointer; transition: opacity .15s;
}
.more-item:last-child { border-bottom: none; }
.more-item:hover { opacity: .7; }
.more-icon {
  width: 40px; height: 40px; border-radius: var(--r-sm);
  background: var(--surface); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.more-icon svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
.more-item-label {
  font-family: var(--serif);
  font-size: var(--sub); font-weight: 400; color: var(--ink);
  margin-bottom: 2px;
}
.more-item-sub {
  font-family: var(--serif); font-style: italic;
  font-size: var(--body); color: var(--muted);
}


/* ============================================================
   RESPONSIVE FIXES — mobile, tablet, laptop
   ============================================================ */

/* Tab bar — remove letter-spacing on very small screens */
@media (max-width: 360px) {
  .tb-item {
    letter-spacing: 0;
    font-size: 8px;
    padding: 6px 2px;
    gap: 2px;
  }
  .tb-icon { width: 18px; height: 18px; }
}

/* Identity deck — reduce min-height on landscape/short viewports */
@media (max-height: 600px) {
  .id-deck { min-height: 40svh; }
  .id-deck-card { padding: var(--s2) 0; }
}

/* Woman grid — single column on very narrow screens */
@media (max-width: 360px) {
  .woman-grid { grid-template-columns: 1fr; }

}

/* Authors grid — single column on very narrow screens */

}

/* Modal — full height on tablet landscape */
@media (min-width: 640px) and (max-height: 700px) {

}

/* Study rows — prevent sr-title overflow on narrow screens */
@media (max-width: 380px) {

/* View padding — tighter on very small screens */

  .modal-card { padding-left: var(--s2); padding-right: var(--s2); }
}

/* Desktop / laptop — max content width, comfortable reading */
@media (min-width: 1024px) {
  .view { max-width: 860px; }
  .modal-card { max-width: 720px; }
}

/* Large desktop */
@media (min-width: 1280px) {
  .view { max-width: 960px; }
}

/* Tablet portrait (768-1023px) — already handled by 768 breakpoint */
/* Tablet landscape — ensure topnav shows and content fits */
@media (min-width: 768px) and (max-width: 1023px) {
  .view { max-width: 680px; }
  .home-tiles { grid-template-columns: repeat(4, 1fr); }
  .woman-grid { grid-template-columns: repeat(3, 1fr); }
  .authors-grid { grid-template-columns: repeat(3, 1fr); }
}

/* Ensure no horizontal scroll on any viewport */
html, body { max-width: 100%; overflow-x: hidden; }

/* Touch targets — minimum 44px on all interactive elements */
.lineage-card, .woman-grid-card, .author-card,
.author-featured, .author-entry,
.season-door, .prayer-item-row,
.id-declaration, .study-row { min-height: 44px; }


/* SVH fallbacks for older browsers */
@supports not (height: 100svh) {
  .entry { min-height: 100vh; }
  .app { height: 100vh; }
  .modal-card { max-height: 92vh; }
  .id-deck { min-height: 60vh; }
}
