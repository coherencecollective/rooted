<script>
const TODAY = {
  ref: "Romans 8:18",
  pull: "For I consider that the sufferings of this present time are not worth comparing",
  scripture: "For I consider that the sufferings of this present time are not worth comparing with the glory that will be revealed to us. For the creation waits with eager expectation for the children of God to be revealed.",
  context: "Paul wrote this from Corinth around 57 CE, near the end of his third missionary journey. He was not writing about suffering as abstraction, he had been beaten, imprisoned, shipwrecked. When he says I consider, he means this is something worked out through experience, not theory.",
  termScript: "δόξα", termWord: "doxa", termLang: "Greek",
  termGloss: "glory, honor, radiance, the visible weight of God's presence",
  termNote: "In the Septuagint, doxa translates the Hebrew kavod. When Paul says glory will be revealed, he is not talking about a feeling. He means the tangible, heavy, real presence of God made visible in you.",
  prompt: "What would you hold right now if you knew what was being prepared?",
  prayer: "God, I ask that you help me dig down and pull out the gifts, talents, ideas, wisdom, and discipline that honestly does not come naturally because you have called me and given me an opportunity to see increase. God I lift my hands in surrender. Search me. Help me reveal miracles I have left behind because I was too afraid to challenge myself. Yes, I am doing okay, but God I want to die empty. I want to live on the edge of grace and meet you each and every day. Do not let me get so comfortable that I miss being desperate for you. Feed me so that I may feed others. Let those with whom I am connected be better because of me. Break open the windows of heaven right now in the name of Jesus. I make a demand on the anointing inside of me and I say overflow. I rebuke insecurity. I rebuke inadequacy. I rebuke anything that would make me believe I am anything other than caught up for you. Fill me with your glory and let me go from this level of glory to the next. I want to die empty. Thank you for making all my weaknesses victorious. Order my steps. Amen."
};

const GRANDMOTHERS = [
  { id:"tamar", num:"I", name:"Tamar", tag:"The one who refused to disappear", book:"Genesis 38", ref:"Matthew 1:3",
    context:"Canaan, roughly 1800 BCE",
    story:"Tamar was a Canaanite woman given in marriage to Er, firstborn son of Judah. Er died. She was passed to his brother Onan, who also died. Judah sent her back to her father's house under pretense of waiting for Shelah. She waited years. Shelah grew up. Judah never came. So Tamar took matters into her own hands. She dressed as a veiled woman on the road to Timnah. Judah lay with her and did not recognize her. She asked for his seal and staff as a pledge. When her pregnancy was discovered, Judah ordered her burned. She produced the pledge. He said: she is more righteous than I. She bore twins. One of them, Perez, is in the direct line of Jesus.",
    hebrew:"צֶדֶק", termWord:"tzedeq", termGloss:"righteousness, what is due, what is owed by covenant",
    termNote:"When Judah says she is more righteous, he uses this word. Her act was not transgression. It was demand, the claiming of what was owed to her by the covenant already made.",
    relatable:"You have been patient long enough. You did everything right and the door still has not opened. The person responsible is sleeping on you and calling it caution. Tamar teaches you there is a moment when waiting and acting are not opposites.",
    passedForward:"Tamar passed forward the refusal to accept erasure. Her son Perez is in the bloodline of Jesus. The woman who was told to wait indefinitely in her father's house, who could have simply disappeared from the story, is in the first chapter of the New Testament. You carry her tenacity. When you refuse to accept a verdict that was never God's verdict, when you find the door that was supposed to stay closed, when you sit at your own crossroads and insist on what is yours, you are walking in a lineage that God himself honored enough to run the Messiah through.",
    forYou:"Tamar dressed herself, sat at the crossroads, and claimed what was legally hers when the man with power refused to give it. She was not supposed to have leverage. She found it anyway. You have been in rooms where the door was closed and the person holding the key had no intention of opening it. What Tamar knew, what God validated when he called her more righteous than Judah, is that your persistence in the face of that injustice is not defiance. It is faithfulness to a covenant that the other person already broke. You are not required to shrink. You are required to stay truthful. God sees the crossroads you are sitting at right now." },
  { id:"rahab", num:"II", name:"Rahab", tag:"The outsider who saw Him first", book:"Joshua 2", ref:"Matthew 1:5",
    context:"Jericho, roughly 1400 BCE",
    story:"Rahab was a woman of Jericho who ran an inn on the city wall. When two Israelite spies entered, she hid them under stalks of flax on her roof. The king's soldiers came. She lied and sent them the wrong way. She told the spies the whole city was afraid of Israel's God, she had heard what He did at the Red Sea. She asked for a scarlet cord to hang from her window so her household would be spared when the walls fell. The walls fell. The cord held. Her son was Boaz.",
    hebrew:"אֱמוּנָה", termWord:"emunah", termGloss:"faithfulness, trust, holding on before the evidence is complete",
    termNote:"Rahab did not have full information. She had heard one story about one God and acted on it. That is emunah.",
    relatable:"You know more about God's power than you have personally experienced it. You are holding a scarlet cord given by someone whose God you have come to believe in. That is enough. It was enough for Rahab.",
    passedForward:"Rahab passed forward the courage to act on what you know to be true before you have seen the outcome. She had heard about what God had done for Israel, the Red Sea, the Jordan, the victories. She believed based on testimony. Her faith was not based on personal encounter. It was based on the record. And she acted on it. You have a record too. You have testimony in your family line and in your own life of what God has done. Rahab says: that is enough to act on. That is enough to tie the cord and trust the agreement.",
    forYou:"Rahab was a Canaanite woman in a profession the world uses to define women permanently. She hid two Israelite spies on her roof, tied a scarlet cord in her window, and asked for her family to be saved. God honored every word of that agreement. The church has always wanted to put the asterisk next to her name. God put it in the genealogy of Jesus with no asterisk, no qualifier, no explanation. What does that tell you about what God thinks of the identity the world assigned you? The scarlet cord meant she was known to be set apart. You are known. You are set apart. Whatever your before is, it is not your name." },
  { id:"ruth", num:"III", name:"Ruth", tag:"The one who chose her own family", book:"Ruth 1-4", ref:"Matthew 1:5",
    context:"Bethlehem, roughly 1100 BCE",
    story:"Ruth was a Moabite woman who married into a Hebrew family during a famine. Her husband died. Her father-in-law died. Naomi told her to go home. Ruth said: where you go I will go, where you die I will die, your people will be my people and your God will be my God. She walked from Moab to Bethlehem with nothing but Naomi. She gleaned in the fields of Boaz. Naomi made a plan. Ruth followed it. She went to Boaz at night and asked him to spread his covering over her. He understood. He married her. She bore Obed. Obed fathered Jesse. Jesse fathered David.",
    hebrew:"חֶסֶד", termWord:"hesed", termGloss:"covenant loyalty, the love that stays when it could leave",
    termNote:"Boaz says Ruth has shown more hesed than in the beginning. This word is the one the Old Testament uses most often for the love of God Himself.",
    relatable:"You have stayed somewhere when leaving was justified. You have loved someone who had nothing to offer in return. Your faithfulness in an ordinary field is being written into something you cannot see yet.",
    passedForward:"Ruth passed forward the theology of chesed, covenant love that stays. Not performance. Not transaction. Not love that is conditional on what the other person can give back. The same word used for God's love for Israel is used for Ruth's love for Naomi. You carry that word. When you choose to stay faithful to someone or something when walking away would be easier and more logical, you are practicing the same kind of love that God practices toward you. And it changed the lineage of the world.",
    forYou:"Ruth chose Naomi when Naomi had nothing to offer her. No security, no future, no resources, no home, no husband to provide. Ruth chose her anyway, not out of obligation but out of love and covenant. Where you go I will go. God saw that commitment and responded with Boaz, with land, with a son named Obed, whose grandson became David, whose line became Jesus. The love you give that gets no immediate return is not wasted. Ruth had no idea what her loyalty would produce. Neither do you. But God is watching what you do when there is no visible reward for doing it." },
  { id:"bathsheba", num:"IV", name:"Bathsheba", tag:"The one who survived and kept moving", book:"2 Samuel 11-12", ref:"Matthew 1:6",
    context:"Jerusalem, roughly 1000 BCE",
    story:"Bathsheba was the wife of Uriah the Hittite. David saw her, sent for her, and lay with her. She became pregnant. David arranged for Uriah to be placed where he would be killed. He was. David married Bathsheba. Their first child died. She bore Solomon. When David was dying and Adonijah moved to take the throne, Bathsheba went before David and secured Solomon's anointing. When Solomon became king, she was given a throne to his right. Matthew names her not by her own name but as the wife of Uriah, an indictment of David, not a judgment on her.",
    hebrew:"שָׁלוֹם", termWord:"shalom", termGloss:"wholeness, completeness, the peace that is more than absence",
    termNote:"What was taken from Bathsheba was her shalom. What God restored over time was not just safety but position, voice, and the honor of having her son carry the covenant forward.",
    relatable:"Something was done to you. Not by you. Done to you. You have watched people rehabilitate the responsible party or ask you to move on. Bathsheba did not disappear. She stayed present. She raised Solomon. She sat on a throne.",
    passedForward:"Bathsheba passed forward the survival and the wisdom that comes through surviving. She did not disappear after what was done to her. She built something from inside the situation she had not chosen. Matthew named her as the mother of Solomon in the genealogy of Jesus. Not David's victim. Solomon's mother. The way history names you is not always the way God records you. You are not who the worst thing that happened to you made you. You are who you have become in spite of it and sometimes because of it.",
    forYou:"Bathsheba had no power in the story of what happened to her. A king sent for her. She had no real choice. Her husband was murdered to cover what the king had done. She grieved her child. She outlived the scandal that was never hers. And then she raised Solomon. She tutored a king. She was wise enough that Proverbs records what she taught her son. The woman who was reduced to a footnote in David's story raised the man who wrote about wisdom for the rest of human history. What has been done to you is real. And it is not the end of what God can do through you." },
  { id:"mary", num:"V", name:"Mary", tag:"The one who said yes before she understood", book:"Luke 1-2", ref:"Matthew 1:16",
    context:"Nazareth, roughly 4 BCE",
    story:"Mary was a young woman in Nazareth, engaged to Joseph, when Gabriel came. He told her she would conceive by the Holy Spirit and bear the Son of God. She asked one question: how can this be since I have not known a man? He explained. She said: let it be to me as you have said. She went to visit Elizabeth, whose baby leaped. Mary sang what we call the Magnificat, a song of revolution about the powerful brought low and the humble lifted. She gave birth in a stable, wrapped him in cloth, raised him, and stood at the foot of the cross.",
    hebrew:"χάρις", termWord:"charis", termGloss:"grace, unearned favor, the gift God decided to give",
    termNote:"Gabriel says Mary has found charis. The same word Paul uses throughout his letters for grace. She did not earn what she was given. She was chosen. The only question was what she would do with the choosing.",
    relatable:"You have been asked to carry something you did not plan for. The cost is real. Mary had one question, got an answer, and said yes, not because it would be easy but because she recognized who was asking.",
    passedForward:"Mary passed forward the yes that costs everything and trusts God with the bill. She carried Jesus in her body. She stood at the cross. She was in the upper room when the Holy Spirit fell. The arc of her life is the arc of full surrender, not once, but continuously, through every stage of what God asked. What she passed forward is not compliance. It is the faith that says: I do not need to understand the whole plan. I trust the one who has the plan. That faith is in your lineage. You carry it.",
    forYou:"Mary said yes before she knew the cost. The angel told her she would conceive by the Holy Spirit and she said: be it done to me according to your word. She was a teenager in an occupied country with no husband yet and no way to explain what had happened. She said yes anyway. And then she sang. My soul magnifies the Lord. He has done great things for me. Before the birth. Before the ministry. Before the resurrection. While she was still carrying the impossibility. Her praise was not a response to the outcome. It was a declaration in the middle of the unknowing. You can praise from there. She did." }
];

const AUNTIES = [
  { id:"hagar", name:"Hagar", tag:"Who named God in the wilderness", book:"Genesis 16, 21", context:"Egypt and the desert of Beersheba",
    story:"Hagar was an Egyptian slave in Abraham and Sarah's household. When Sarah had not conceived, she gave Hagar to Abraham to produce an heir. Hagar conceived and despised her mistress. Sarah treated her harshly. Hagar fled. An angel found her and told her to return, that her son would be named Ishmael, God hears. Years later, after Sarah bore Isaac, she demanded Hagar and Ishmael be cast out. Abraham gave her bread and water and sent her into the wilderness. When the water ran out, Hagar placed her child under a bush and walked away. She could not watch him die. God heard the boy crying. An angel called to her. She opened her eyes and saw a well.",
    hebrew:"אֵל רֳאִי", termWord:"El Roi", termGloss:"The God Who Sees",
    termNote:"Hagar is the only person in Scripture to give God a name. She said this alone in the wilderness, enslaved, twice cast out. The God who sees is not a comfortable concept. It is what a woman says when she has been ignored by everyone who was supposed to care for her and finds the universe was not empty.",
    passedForward:"Hagar named God. That is an extraordinary act of theological agency for a woman with no legal standing, no community, no power. She looked at her experience of being found by God in a place where everyone else had abandoned her, and she gave that experience a name: You are the God who sees me. Black women have been naming God from the wilderness for centuries. Testifying in the places where testimony is most costly. Hagar is the mother of that tradition. When you bear witness to what God did in your hardest place, you are doing what she did. You are naming El Roi.",
    forYou:"God sent an angel to find Hagar in the wilderness, not Abraham's wilderness, her wilderness. The place she had run to alone. And then he asked her a question: where have you come from and where are you going? He already knew. He was giving her the space to say it out loud. You are seen in the wilderness. Not later when you get yourself together, not after you return to the situation you ran from. Right there, in the running, in the exile, in the place that feels like nobody knows your address. He called her by name. El Roi, the God who sees me. He sees you by name in whatever wilderness you are in right now." },
  { id:"hannah", name:"Hannah", tag:"Who prayed until something moved", book:"1 Samuel 1-2", context:"Shiloh, roughly 1100 BCE",
    story:"Hannah was one of two wives of Elkanah. The other wife, Peninnah, had children. Hannah did not. Every year at the annual sacrifice, Peninnah provoked her bitterly. Every year Hannah wept and would not eat. One year at Shiloh she prayed in the temple, weeping, lips moving, no sound. Eli the priest accused her of being drunk. She told him she was pouring out her soul before the Lord. He said go in peace. She went. She ate. Her face was no longer sad. She bore Samuel, gave him to the temple as promised, and then sang. Her song is the direct forerunner of Mary's Magnificat.",
    hebrew:"בָּכָה", termWord:"bakah", termGloss:"to weep hard, to cry out, not polite tears",
    termNote:"Hannah's prayer is described with this word. God did not rebuke the loudness of her need. He answered it.",
    passedForward:"Hannah passed forward the practice of radical honesty before God. Her prayer in 1 Samuel 2, which became the template for Mary's Magnificat, is a revolutionary declaration: God raises the poor from the dust. He brings down the arrogant. He reverses what the world has decided. She sang that from her own experience of being counted as nothing and then given everything. Black women have been singing that song in their own voices ever since. Your honest prayer, the one that sounds too raw, too specific, too much, is in the tradition of the woman whose son became the prophet who anointed the king through whom Jesus came.",
    forYou:"Hannah prayed until the priest thought she was drunk. She wept until she had no more tears. She was in that temple year after year carrying the same unanswered longing while the people around her, including her own family, could not give her what she needed. And then something shifted. Not her circumstances. Her face. She got up from prayer and her face was no longer sad, before Samuel was conceived, before anything had changed that she could see. God met her in the asking. You are allowed to be that honest in prayer. You are allowed to want that badly. He is not put off by the intensity of your need. He is moved by it." },
  { id:"naomi", name:"Naomi", tag:"Who returned empty and was filled", book:"Ruth 1-4", context:"Bethlehem and Moab",
    story:"Naomi left Bethlehem with a husband and two sons during a famine. By the time she returned, all three were dead. She told the women not to call her Naomi, which means pleasant, but Mara, which means bitter. She said: I went out full and the Lord brought me back empty. She did not perform a recovery she did not have. She named what was true. Then she looked at what she actually had: Ruth, loyalty, Boaz, a field. She began to make a plan.",
    hebrew:"מָרָה", termWord:"marah", termGloss:"bitter, the name of a woman who has been through too much",
    termNote:"Naomi named herself with this word and was not corrected. The Bible records her grief without softening it. And then records what grew inside that grief.",
    passedForward:"Naomi passed forward the understanding that God works with the real version of you, not the composed version, not the grateful-in-advance version, not the version that has it together. The Naomi who returned to Bethlehem calling herself empty is the same Naomi God restored. He did not require her to be further along before he moved. He worked with exactly where she was. When you feel emptied out, when you are not sure you have the faith for what you used to believe, that is not a disqualification. That is the starting place Naomi was at when the restoration began.",
    forYou:"Naomi told people to call her Mara, bitter, because she left full and came back empty. She said so plainly. She did not perform gratitude she did not feel. She did not pretend the loss was not real. And God did not correct her. He let her have her grief, her honest naming of what had happened to her. And then he provided Ruth, and Boaz, and a grandson named Obed, and she became a nurse to the child she thought she would never have. The bitterness was not the end of her story. But she was allowed to live in it while it was true. You are allowed to name where you are right now. Calling it what it is does not lock you there." },
  { id:"esther", name:"Esther", tag:"Who came to the kingdom for such a time as this", book:"Esther", context:"Persia, roughly 480 BCE",
    story:"Esther was a Jewish woman raised by Mordecai after her parents died. She was taken into the king's harem and chosen as queen. He did not know she was Jewish. When Haman secured a decree to kill all Jews in the empire, Mordecai came to Esther and said: who knows if you have come to the kingdom for such a time as this? Esther asked the Jews to fast for her, then said: I will go to the king though it is against the law, and if I perish, I perish. She entered. The king held out his scepter. She planned carefully, two banquets, choosing her moment. At the second, she named Haman. The decree was reversed.",
    hebrew:"עֵת", termWord:"et", termGloss:"a specific time, the appointed moment, the right season",
    termNote:"Mordecai's question uses this word. Not an accident of timing but a specific placement. The question was not whether she would be brave. It was whether she could recognize what her position was always for.",
    passedForward:"Esther passed forward the theology of positioned courage, the understanding that where you are has been arranged for a reason that is larger than your comfort. Your access, your relationships, your visibility, your platform, your specific position in the specific rooms you are in, none of it is accidental. The question Mordecai asked Esther is still the question: who knows whether you have not come to the kingdom for such a time as this? You are in your kingdom for such a time as this. What you do with the access you have will matter beyond what you can currently see.",
    forYou:"Esther fasted three days before she walked into the king's presence. She did not rush toward the courageous act. She prepared. She gathered her community and asked them to fast with her. And then she went. If I perish, I perish, this is not resignation. This is the settled resolve of someone who has done everything she knows to do and has decided that the assignment is worth more than the safety. There is something in your life right now that requires that same decision. Not recklessness. Not performance. The settled, prepared, prayed-up decision to walk toward what you have been avoiding because someone else's life may depend on it." },
  { id:"hezarephath", name:"The Widow of Zarephath", tag:"Who gave from her last", book:"1 Kings 17", context:"Zarephath, during the drought under Ahab",
    story:"During a severe drought, God told Elijah to go to Zarephath and that a widow would feed him. He found her gathering sticks. She said she had only a handful of flour and a little oil, she was making a last meal for herself and her son before they died. Elijah told her not to fear, to make his small bread first, and that the flour and oil would not run out. She did it. The flour did not run out. Later her son died. She confronted Elijah. He prayed over the boy three times. The child lived.",
    hebrew:"אַל-תִּירְאִי", termWord:"al tiree", termGloss:"do not fear, the specific command before impossible obedience",
    termNote:"Elijah's first words to her. He is asking her to give from her last before she has any reason to trust. She does it anyway. The miracle does not precede the obedience.",
    passedForward:"The widow of Zarephath passed forward the testimony that God's provision works in reverse of how logic says it should. You give first from what you cannot afford to give and then the supply appears. This is not a prosperity formula. It is a theological pattern of a God who asks you to trust him with your last thing to prove that he is the actual source. Black women who have given when they could not afford to, who have shown up when they were running on empty, who have fed someone else when they were hungry themselves, you are walking in her tradition. And the jar has not run out.",
    forYou:"The widow of Zarephath told Elijah: I am gathering two sticks, that I may prepare for myself and my son, that we may eat it and die. That is not dramatic speech. That is a woman who has run the numbers and reached the end of the column. God sent Elijah to her anyway, not to a woman of abundance, to the woman with nothing left. And he asked her to give from that nothing first. The jar of flour did not run out and the jug of oil did not run dry. God is not waiting for you to have enough before he moves. He is the source the arithmetic cannot account for." },
  { id:"bleeding-woman", name:"The Woman with an Issue of Blood", tag:"Who reached through the crowd", book:"Mark 5:25-34", context:"A crowd around Jesus, Galilee",
    story:"She had been bleeding for twelve years. She had spent everything on physicians and was worse. By the law her bleeding made her ritually unclean, she was someone others were supposed to avoid. She was in a crowd. Jesus was moving through the same crowd. She thought: if I just touch the fringe of his garment I will be healed. She pushed through and touched it. The bleeding stopped immediately. Jesus stopped and asked who touched him. The disciples were confused, the crowd was thick. But Jesus felt power leave him. She came forward, fell before him, and told him everything. He said: daughter, your faith has made you well.",
    hebrew:"δύναμις", termWord:"dunamis", termGloss:"power, force, the specific energy that moves through, where we get dynamite",
    termNote:"Jesus felt dunamis leave him. Real, physical, directional power. And it moved toward her because she reached. She did not wait for permission.",
    passedForward:"This woman passed forward the courage of the reach. She had every reason not to try. Twelve years of failure. No resources left. Ceremonial uncleanness that said she had no right to be in that crowd. She reached anyway. The healing began with a reach that broke every rule she had been told applied to her. When you are exhausted by the reaching, when you have tried everything and been made worse, when the rules say you do not belong in the room where healing happens, her story says reach anyway. He stopped for her. He called her daughter. You are also his daughter.",
    forYou:"She had been bleeding for twelve years. She had spent everything on doctors who made her worse. She was ceremonially unclean, untouchable, excluded, isolated. She reached through a crowd and touched the hem of Jesus's garment. He felt the power go and stopped. In a crowd. He stopped and asked who touched him. He could have let her go healed and anonymous. He called her forward. He made her testify. He called her daughter. He wanted her healing to be public, not to expose her but to restore her. He declared her whole in front of everyone who had watched her suffer. What he declares publicly over you cannot be quietly taken back." },
  { id:"lydia", name:"Lydia", tag:"Who opened her house and changed a continent", book:"Acts 16:11-15", context:"Philippi, Macedonia, roughly 50 CE",
    story:"Lydia was a dealer in purple cloth from Thyatira. Purple cloth was a luxury trade, which means Lydia had money and relationships with people of means. She was already a worshiper of God before Paul arrived. On the Sabbath, Paul went outside the city gate to the river where people would be praying. A group of women was there. Paul spoke. The Lord opened Lydia's heart to pay attention to what he was saying. She was baptized along with her entire household. She urged Paul and his companions to stay at her house. She started the first church in Europe out of her home.",
    hebrew:"προσευχή", termWord:"proseuchē", termGloss:"prayer, a place of prayer, where the first European church began",
    termNote:"The women were already gathered at a prayer meeting when Paul arrived. The first European convert was a businesswoman who was already praying. God started his European church at a gathering that was already underway.",
    passedForward:"Lydia passed forward the gift of the open house, the literal and spiritual practice of making your home and your resources available for the work of God. She was a woman of business and means who understood that her prosperity was not for her private comfort. The Philippian church started in her house. Paul wrote Philippians, the letter about peace and joy that has sustained believers for two thousand years, to people who first heard the gospel sitting in Lydia's home. What you open your life to, what you make available, what you fund and house and shelter, it produces fruit you will not live to see all of.",
    forYou:"Lydia was a dealer in purple cloth, a businesswoman of means in Philippi, a city that was a Roman colony. She was already a worshipper of God before Paul arrived. She had not heard about Jesus but she was already oriented toward God, already at the river with other women on the Sabbath, already seeking. The Lord opened her heart to respond to what Paul said. Then she opened her home. She became the foundation of the Philippian church, the church Paul later wrote to from prison about joy. Lydia is proof that God is already working in you before the moment of encounter. Your seeking is not accidental. He was already moving in the direction of your hunger before you knew where to look." },
  { id:"anna", name:"Anna", tag:"Who prayed for eighty-four years and was ready when He arrived", book:"Luke 2:36-38", context:"Jerusalem, roughly 4 BCE",
    story:"Anna was a prophetess, the daughter of Penuel of the tribe of Asher. She had been married for seven years before her husband died. Then she stayed. She did not leave the temple, worshiping with fasting and prayer night and day. She was eighty-four years old when Mary and Joseph came to present the infant Jesus at the temple. Simeon had just spoken over him when Anna came up, not summoned, not invited, but present as she always was, and gave thanks to God and began to speak about the child to all who were waiting for the redemption of Jerusalem. She had been waiting her whole adult life for this moment and she did not miss it. She had not become bitter or exhausted. She had become ready.",
    hebrew:"אָנָה", termWord:"anah", termLang:"Hebrew", termGloss:"to respond, to answer, to be present and available when the moment comes",
    termNote:"The name Anna comes from Hannah, both meaning grace or favor. She was Hanna in the fullness of time, present and available when the answer to every prayer she had ever prayed walked into the room.",
    passedForward:"Anna passed forward the practice of prophetic faithfulness in the waiting, the discipline of remaining oriented toward God across decades when nothing visible is happening. She spoke about the child to all who were looking for the redemption of Jerusalem. Her testimony matters. What you have been faithful in privately, what you have carried in prayer through the long seasons when nothing appeared to be moving, that faithfulness is not invisible to God. It is the preparation for the moment you will recognize before anyone else does. Anna saw Jesus when he was eight days old. She was ready because she had never stopped looking.",
    forYou:"Anna had been a widow for most of her adult life. She was 84 years old and she had not left the temple. She fasted and prayed night and day. She had been doing this for decades in a specific kind of faithfulness that is invisible to the world, the faithfulness of the woman who shows up consistently, who tends the interior life, who does not require a platform or a visible result to keep going. And then the day came. Mary and Joseph walked in with the baby. And Anna, who had been faithful in the unseen for decades, was the one who was there. The faithfulness that looks like nothing is often the faithfulness that is present for the moment everything changes." },
  { id:"jochebed", name:"Jochebed", tag:"Who hid what God gave her and then trusted the river", book:"Exodus 2:1-10", context:"Egypt, roughly 1500 BCE",
    story:"Jochebed was a Hebrew slave woman in Egypt during the time when Pharaoh had ordered every Hebrew boy thrown into the Nile. She gave birth to a son. The text says she saw that he was a beautiful child and hid him for three months. When she could no longer hide him, she made a basket of papyrus, waterproofed it with tar and pitch, placed her son inside, and set it among the reeds at the edge of the river. Then she stationed his sister nearby to watch. The daughter of Pharaoh came to the river to bathe, saw the basket, sent her servant for it, and when she opened it the baby cried. She had compassion on him. The sister stepped forward and offered to find a Hebrew nurse. Pharaoh's daughter said yes. The sister went and got their mother. Pharaoh's daughter paid Jochebed to nurse her own son.",
    hebrew:"יוֹכֶבֶד", termWord:"Yocheved", termGloss:"God is glory, the name of the woman who trusted God with what she could not carry alone",
    termNote:"Jochebed is the first person in Scripture whose name contains the divine name Yahweh, YHWH. Her name meant God is glory before most of Israel knew God's personal name. She embodied what she was named.",
    passedForward:"Jochebed passed forward her son Moses and through him, the liberation of a nation. But the theology of what she did is as important as the outcome. She believed her son's life had value in a moment when the empire had decreed otherwise. She acted on that belief with what she had, reeds and pitch and her daughter standing at a distance. Black mothers have been placing their children in the water and trusting God with the current since before this country existed. Jochebed is their ancestor in faith. The act of trusting God with what you cannot protect is one of the most profound acts of faith available to a mother.",
    forYou:"Jochebed hid her son for three months because he was beautiful and she refused to believe that his life was expendable. When she could no longer hide him, she made a basket, waterproofed it, placed her child in it, and put it in the Nile, then sent his sister to watch from a distance. There is a specific kind of trust in that act that is almost impossible to describe. She could not go with him. She could not guarantee the outcome. She placed what she loved most in the water and let God be responsible for what happened next. The thing you love most that you cannot protect, God can hold what you cannot hold." }

const HOMEGIRLS = [
  { id:"deborah", name:"Deborah", tag:"Who did not wait to be asked", book:"Judges 4-5", context:"Israel, roughly 1200 BCE",
    story:"Deborah was a prophetess and the only female judge in Israel. She held court under a palm tree and the Israelites came to her for judgment. She summoned the military commander Barak and told him God had commanded him to fight Sisera. Barak said: if you will go with me, I will go, but if you will not go, I will not go. Deborah said: I will surely go with you. She went. Israel won.",
    forYou:"Deborah was already functioning as prophet and judge when Barak came to her. She was sitting under a palm tree and the people were coming to her for decisions. She did not apply for the position. She was not appointed by a committee. She was doing the work and the work was recognized. When Barak said he would not go to war without her, she went. And she sang afterward, one of the oldest songs in the Bible, a song she co-wrote with Barak about what God had done through them. The women who lead, who go, who sing afterward, you are in a lineage that the text itself honored. Deborah is in the Bible. Her song is in the Bible. Her authority was never questioned by the people who needed it.",
    forYou:"Deborah was already functioning as prophet and judge when Barak came to her. She was sitting under a palm tree and the people were coming to her for decisions. She did not apply for the position. She was doing the work and the work was recognized. When Barak said he would not go to war without her, she went. And she sang afterward. The women who lead, who go, who sing afterward, you are in a lineage that the text itself honored. The authority God gives does not require institutional sanction before it is real.",
    passedForward:"Deborah passed forward the freedom from the need for permission. She sat under the palm tree and judged. When the moment required a general, she was already positioned. The calling God places on your life is not contingent on whether the institution around you validates it. Deborah's authority was exercised fully before anyone official recognized it. Yours already is too." },
  { id:"mary-magdalene", name:"Mary Magdalene", tag:"Who was first to the tomb", book:"Luke 8, John 20", context:"Galilee and Jerusalem, roughly 30 CE",
    story:"Mary Magdalene appears first in Luke 8 as one of the women who traveled with Jesus and the twelve and supported them from her own means. She had had seven demons cast out. She was at the crucifixion when most of the male disciples had fled. She was at the tomb early, before sunrise, and found the stone rolled away. She stayed. She stood at the tomb weeping when everyone else went home. She saw angels. She turned and saw someone she thought was the gardener. He asked why she was weeping. She said: if you have carried him away, tell me where. He said her name: Mary. She recognized him. He told her to go and tell. She went. She said: I have seen the Lord.",
    forYou:"Mary Magdalene was at the tomb before the sun came up. She ran to tell the disciples and they did not believe her. She is described as having had seven demons, which means she had been through something that most people do not survive. Jesus cast them out and she followed him. She was at the crucifixion. She was at the burial. She was the first person at the tomb. She was the first person to see the risen Christ. She was the first person given the assignment to go and tell. The first evangelist in human history had a testimony that the room dismissed. And Jesus chose her anyway. The woman the room doubted, he chose first.",
    forYou:"Mary Magdalene is described as having had seven demons, she had been through something most people do not survive. Jesus cast them out and she followed him from Galilee to the cross to the tomb. She was there for all of it. And on the most important morning in history, Jesus stopped everything to call her by name. Mary. He chose the woman the room doubted to carry the first resurrection testimony. When you feel disqualified by what you have been through, he is calling your name specifically.",
    passedForward:"Mary Magdalene passed forward the testimony that what you have come out of does not determine whether you are qualified for what God is about to give you. Seven demons and first witness to the resurrection in the same life. Jesus chose someone the establishment would reject to carry the most important message in human history. The woman everyone was avoiding became the first evangelist. That is not accidental. That is the pattern of who Jesus chooses." },
  { id:"samaritan-woman", name:"The Woman at the Well", tag:"Who ran to tell the city", book:"John 4", context:"Sychar, Samaria, roughly 30 CE",
    story:"She came to the well at noon, not the morning, not in groups. She came alone, which means something about her life had made the morning crowd unbearable. Jesus was sitting at the well, tired. He asked for water. She said: you are a Jew and I am a Samaritan woman. He offered her living water. She asked where he would get a bucket. He said: whoever drinks the water he gives will never thirst again. She said: sir, give me this water. He told her to call her husband. She said she had no husband. He said she was right, she had had five. She said: I perceive you are a prophet. She left her water jar and ran to the city and said: come see a man who told me everything I ever did. Many believed because of her word.",
    forYou:"The thing you came to the well carrying, he is not counting it. He is offering you water. Take it. Then go tell.",
    forYou:"Jesus went through Samaria on purpose. He sat at the well at noon waiting for the woman who came alone. He asked her for a drink. He made her the theologian. He told her he was the Messiah. A woman with five marriages and no current husband, from a people Jews called unclean, in a conversation she was never supposed to be having, and Jesus chose it as the place to make his most direct declaration. You are not too complicated for him. The more complicated your story, the more specifically he seems to seek you out.",
    passedForward:"The woman at the well passed forward the testimony that an encounter with Jesus changes what you do immediately. She left her water jar and ran back to her city: come see a man who told me everything I ever did. Not after she resolved her history. From inside it. She became the first evangelist in Samaria in the time it took to walk back from the well. Your encounter with God is not diminished by the circumstances you are in when it happens." },
  { id:"abigail", name:"Abigail", tag:"Who rode toward what everyone else ran from", book:"1 Samuel 25", context:"Carmel, Israel, roughly 1020 BCE",
    story:"Abigail was the wife of Nabal, a wealthy and foolish man. David had protected Nabal's shepherds and sent messengers to ask for provisions. Nabal refused and insulted David. David armed four hundred men and rode toward Nabal's household. One of the servants told Abigail what had happened. She did not tell her husband. She loaded donkeys with food and rode out to meet David. She fell at his feet and said: let the guilt be on me. She made the argument that his cause was righteous and that bloodshed would haunt him. David turned around. When she told Nabal, his heart died within him. Ten days later he died. David sent for Abigail and she became his wife.",
    forYou:"Abigail was married to a man the Bible describes as harsh and badly behaved. When her husband insulted David and David was coming with 400 men to kill everyone in the household, Abigail acted without telling her husband. She loaded donkeys with provisions, rode to meet David, and talked him out of bloodshed with such clarity and wisdom that David blessed her and credited her with saving him from sin. Her husband died ten days later, not by David's hand, but by God's. Then David sent for her and she became his wife. She moved from a harsh man's house to a king's household in the span of one act of wisdom. Wisdom that serves justice and prevents harm is not small. It is the move that changes everything.",
    forYou:"Abigail was married to a harsh man. When he insulted David and 400 armed men were coming, Abigail moved without permission. She loaded donkeys, rode to meet David, and talked him out of bloodshed with precision and wisdom. David blessed her and said she had saved him from sin. Ten days later her husband died. Then David sent for her. She moved from a harsh man's house to a king's household in the span of one act of wisdom. God sees the wisdom you use to hold impossible situations together. He does not let it go unrecorded.",
    passedForward:"Abigail passed forward the courage of the woman who sees clearly when everyone around her is either raging or hiding. She did not wait for conditions to be favorable. She saw what was about to happen, she knew what she had, and she moved. Black women who have prevented disasters that no one ever knew they prevented, who have held things together when no one else could see straight, Abigail is your ancestor. What you do when no one is watching is exactly what God is watching." },
  { id:"miriam", name:"Miriam", tag:"Who led the first praise", book:"Exodus 2, 15", context:"Egypt and the wilderness",
    story:"Miriam first appears as the sister who watched Moses in the basket, who went to Pharaoh's daughter and offered to find a Hebrew nurse, and brought the baby's own mother back to nurse him. After the crossing of the Red Sea, Miriam took a tambourine and all the women followed her and she led them in song and dance: sing to the Lord for he is highly exalted, the horse and its rider he has hurled into the sea. The text describes her as a prophetess. She was the first woman to lead worship in the Bible.",
    forYou:"Miriam picked up her tambourine on the far shore of the sea and led the women in singing and dancing. Not after a moment of reflection. Not after someone organized a celebration. She led from the moment of arrival into praise that was already in her hands, she was carrying the instrument, which means she believed something worth celebrating was coming before it came. She is also the woman who watched her baby brother float down the Nile and kept watch from the shore. She lived long enough to see that same brother lead the Exodus. Whatever you have been keeping watch over, whatever you have been carrying the instrument for before you could see the outcome, Miriam says keep it in your hands.",
    forYou:"Miriam was already carrying her tambourine before the sea parted. She believed something worth celebrating was coming before it came. She also watched her baby brother float down the Nile and kept watch from the shore, she was the one who stepped forward to suggest their mother as wet nurse when Pharaoh's daughter pulled him out. She watched over the promise before she saw it. She danced after she witnessed it. Whatever you have been carrying the tambourine for before the breakthrough, do not put it down.",
    passedForward:"Miriam passed forward the practice of celebrating what God did with your whole body, immediately. The song she sang is one of the oldest poems in the human record. She named what God had done while standing on the shore where it happened. Black women who sing, who testify, who throw the party when God comes through, who refuse to let a miracle pass without a tambourine, you are in her lineage. The praise that happens immediately, while the evidence is still fresh, is the praise that becomes testimony for someone else." },
  { id:"martha", name:"Martha", tag:"Who told Jesus exactly what she expected of him", book:"Luke 10, John 11", context:"Bethany, roughly 30 CE",
    story:"Martha appears twice. First, frustrated that Mary is sitting at Jesus' feet while she does the work of hospitality. She asks Jesus to tell Mary to help. He says Mary has chosen the good part. The second time is after her brother Lazarus has died. Jesus arrived four days after the burial. Martha went out to meet him. She said: Lord, if you had been here, my brother would not have died. But even now I know that whatever you ask from God, God will give you. Jesus told her: I am the resurrection and the life. He asked: do you believe this? She said: yes, Lord. I believe that you are the Christ, the Son of God. This confession is the theological equivalent of Peter's great confession. It is Martha who says it.",
    forYou:"Martha said to Jesus: Lord, if you had been here, my brother would not have died. She said this to his face, directly, with the grief and the accusation that was in it. Jesus did not rebuke her for the directness. He answered her. And then he wept, not because he could not help, but because she was grieving and grief moved him. Then he raised Lazarus. Martha's faith was not the quiet, composed kind. It was the kind that says: I know what you could have done and I do not understand why you did not do it. And Jesus engaged with that faith. He raised her brother. Your honest grief is not a failure of faith. Martha's grief and faith existed in the same sentence and Jesus answered both.",
    forYou:"Martha said to Jesus: Lord, if you had been here, my brother would not have died. She said it to his face with all the grief and accusation in it. Jesus did not rebuke her for the directness. He answered her. He wept with her. Then he raised her brother. It was Martha who made the great confession before the tomb: I believe that you are the Messiah, the Son of God. The woman the tradition has used as a warning about being too busy made the most important theological declaration in the gospels. Your directness, your grief, your working faith, none of it disqualifies you. Martha did all of it and Jesus answered all of it.",
    passedForward:"Martha passed forward the active, grief-honest faith that still confesses. She ran to meet Jesus before Mary did. She said what she actually felt. She held nothing back. Then she said I believe. Then she watched her brother walk out. You are allowed to grieve loudly and believe deeply at the same time. You are allowed to be the one who works and the one who sits at his feet. Martha was both. Jesus engaged every version of her. He engages every version of you." },
  { id:"priscilla", name:"Priscilla", tag:"Who taught the teacher", book:"Acts 18, Romans 16", context:"Corinth and Ephesus, roughly 50 CE",
    story:"Priscilla and her husband Aquila were tentmakers when Paul arrived in Corinth. He stayed with them and they worked together. When Paul left, they went with him to Ephesus. An eloquent man named Apollos came to Ephesus, speaking accurately about Jesus but knowing only the baptism of John. Priscilla and Aquila heard him, took him aside, and explained to him the way of God more accurately. Priscilla is named first in this account, in the conventions of the time, the one named first held primary significance. Paul calls her a fellow worker in Christ Jesus.",
    forYou:"Priscilla and her husband Aquila are mentioned six times in the New Testament, and Priscilla is named first in four of them. This is not accidental in a culture where men were listed first. She was recognized as the primary teacher in their pair. When Apollos came to Ephesus preaching about Jesus but with incomplete theology, Priscilla and Aquila took him aside and explained the way of God more accurately. She corrected a gifted man's theology privately, without humiliating him, with precision and care. She ran a church in her home. She was Paul's coworker, his word, apostolic. Black women who have been doing the theological heavy lifting while others got the credit, Priscilla's name was recorded first.",
    forYou:"Priscilla is named before her husband in four of the six New Testament references to them. In a culture where men were listed first, this was intentional. When Apollos came preaching with incomplete theology, Priscilla took him aside and explained the way of God more accurately. She corrected a gifted man's theology, privately, with care. She ran a church in her home. Paul called her his coworker. Black women who have been doing the theological heavy lifting while others got the credit, Priscilla's name was recorded first and it stays first.",
    passedForward:"Priscilla passed forward the model of theological leadership that does not require a stage. She taught in her home, through relationship and precision. The church at Ephesus was shaped by what she taught. What you teach in your home, what you correct in private conversations, what you build through relationship rather than platform, it shapes the church for generations. Priscilla never held a title. She shaped doctrine. Your faithfulness in the small and private spaces is doing the same." },
  { id:"mary-bethany", name:"Mary of Bethany", tag:"Who chose the better thing and was not corrected for it", book:"Luke 10, John 11-12", context:"Bethany, roughly 30 CE",
    story:"Mary of Bethany appears three times. First, sitting at the feet of Jesus listening while her sister Martha worked, and when Martha complained, Jesus said Mary had chosen the better thing, which would not be taken from her. Second, at the death of her brother Lazarus, falling at the feet of Jesus weeping, saying: Lord, if you had been here, my brother would not have died. Third, six days before the Passover, taking a pint of very expensive perfume, pure nard, and pouring it on Jesus' feet, wiping them with her hair. The house was filled with the fragrance. Judas objected: why was this not sold and the money given to the poor? Jesus said: leave her alone. She had kept it for the day of my burial. He said: wherever the gospel is proclaimed in the whole world, what she has done will be told in memory of her.",
    forYou:"Mary sat at Jesus's feet in the position of a disciple when that position was not available to women. She chose the better part and Jesus defended her choice to her sister who was asking her to come back into the role that was expected of her. Then she anointed Jesus with expensive perfume before his death, a gift the disciples called wasteful, that Jesus called beautiful, that he said would be told wherever the gospel was preached as a memorial to her. The extravagant, uncalculating devotion that the room called excessive, Jesus called it memorial-worthy. What you have poured out that people called too much, that God called beautiful, it has been recorded.",
    forYou:"Mary sat at Jesus's feet in the position of a disciple when that position was not available to women. Then she anointed him before his death with perfume so expensive the disciples said it was wasteful. Jesus said it was beautiful. He said it would be told wherever the gospel was preached as a memorial to her. The extravagant devotion the room called too much, Jesus called permanent. What you have poured out that people called excessive, that God called beautiful, it has been recorded and it will be remembered.",
    passedForward:"Mary of Bethany passed forward the right to choose the better part when the room wants you in a different position. She chose to sit. She chose to pour. Both times the room objected. Both times Jesus said she had chosen rightly. In a world that measures women by their output and their usefulness, Mary's choice to sit and receive is theological resistance. And she still poured extravagantly when the moment came. You get to do both. Receive and give. Sit and move. Be filled and then pour." },
  { id:"phoebe", name:"Phoebe", tag:"Who carried the most important letter in history", book:"Romans 16:1-2", context:"Cenchreae, roughly 57 CE",
    story:"Paul ends the book of Romans with a request: I commend to you our sister Phoebe, a deacon of the church at Cenchreae. I ask you to receive her in the Lord in a way worthy of his people and to give her any help she may need from you, for she has been the benefactor of many people, including me. That is the entire mention. But what she was carrying matters enormously. Phoebe carried the letter to the Romans from Corinth to Rome, the letter that contains Romans 1 through 16, the most comprehensive theological statement Paul ever wrote. Not only did she carry it but she was the one who read it aloud to the Roman church and answered questions about it. The person who delivered a letter in the ancient world was expected to interpret it. Phoebe was Paul's chosen interpreter for the letter that shaped Western theology.",
    forYou:"Paul's letter to the Romans opens sixteen chapters of the most developed theology in the New Testament. Then Paul closes by asking the Roman church to receive Phoebe, a deacon, a patron, a woman he is literally trusting with the delivery of the most important letter he ever wrote. She carried Romans. In her hands. Across the Mediterranean. She delivered the document that became the foundation of Western theology to the church in Rome. Her name is the first name in the greetings at the end of Romans. She was not an afterthought. She was the carrier. Whatever you have been trusted to carry, the document, the word, the vision, the children, the prayer, you are in her tradition." }
];

const HEART_POSTURES = {
  tired: { label:"Tired", sub:"All the way through.", steps:[
    { n:"01", action:"Stop.", do:"Sit. Or lie down. Stop everything for sixty seconds.", why:"Tired is information, not weakness. Sabbath is in the top ten.",
    forYou:"Paul closed the most theologically significant letter he ever wrote by asking the church to receive Phoebe, a deacon and patron he was trusting with its delivery. She carried Romans. In her hands, across the Mediterranean, to the church in Rome. Paul's first instruction about her: give her whatever she needs because she has been a patron to many, including me. The woman who carried the letter that shaped Western theology for two thousand years is the first name in Paul's greetings. Whatever you have been trusted to carry, you are in her tradition.",
    passedForward:"Phoebe passed forward the ministry of the carrier. Not the one who writes the letter. The one who makes sure it arrives. The deacons, the administrators, the women who make everything function and whose names rarely appear on the program, Phoebe is your ancestor. Her work was essential to Paul's mission. The letter she carried changed the world. You do not have to be the author to change what happens. You have to be faithful to carry what you were given." },
    { n:"02", action:"Confess what you have been carrying.", do:"Tell Him plainly what you have been carrying that He never asked you to carry.", why:"Some of what is exhausting you is not your assignment." },
    { n:"03", action:"Take His yoke.", do:"Matthew 11. He says: my yoke is easy and my burden is light.", why:"He did not promise no yoke. He promised His one fits." },
    { n:"04", action:"Ask for renewal.", do:"Isaiah 40. Those who hope in the Lord will renew their strength.", why:"Renewal is exchange. Bring Him the empty and He gives back full." },
    { n:"05", action:"Read short.", do:"One verse. Maybe two. Sit with Him.", why:"He is not measuring your output today." }
  ], prayer:"God, I ask that you would meet me right where I am, in transparency, in vulnerability, and in authenticity. Meet me in this moment and do not leave me the same. Do not pacify my dysfunction and do not bring people in my life who will do the same. Call me up. Elevate my perspective and my thinking that I become all that you have called me to be. Make me sensitive so that you would have your way. Have your way in my life. Let there be seed in the ground so that it multiplies. Let there be fruit upon fruit upon fruit. God take my seed, cover it, nourish it, protect it. Amen." },
  anxious: { label:"Anxious", sub:"Chest tight. Mind racing.", steps:[
    { n:"01", action:"Hand on your chest.", do:"Three breaths. Slower than feels normal.", why:"Anxiety speeds the breath and the thoughts together. Slowing one slows the other." },
    { n:"02", action:"Name what is loud.", do:"Out loud. Just the headline.", why:"Anxiety thrives on vagueness. Name it and it becomes something you can hand over." },
    { n:"03", action:"Cast it.", do:"Peter says cast. Throw it over to Him.", why:"1 Peter 5:7. He cares specifically. You are not bothering Him." },
    { n:"04", action:"Receive the guard.", do:"Philippians 4:7. Ask for peace that does not make sense.", why:"His peace is described as a guard standing watch over your mind." },
    { n:"05", action:"Read slowly.", do:"Underline the first phrase that lands.", why:"Anxiety wants you to skim. The Spirit wants you to linger." }
  ], prayer:"God, I do not know how to put this down. But you said to cast my anxiety on you because you care for me. I am doing that right now. I am handing you what my body has been holding. Guard my mind. Stand watch over the thoughts that are circling. Give me peace that does not require understanding because I do not have understanding right now. I have only you. Let that be enough. Amen." },
  carrying: { label:"Carrying grief", sub:"Holding what is heavy.", steps:[
    { n:"01", action:"Do not pretend.", do:"Sit down. Tell Him plainly what hurts.", why:"Psalm 34:18. He is near to the brokenhearted. Near. Not impressed by composure." },
    { n:"02", action:"Lament is allowed.", do:"If you need to say my God why, you can. David did. Jesus did.", why:"Lament is in the Bible because lament is part of faith." },
    { n:"03", action:"Remember.", do:"Name one time He came through before. One.", why:"Asaph did this in Psalm 77 when he could not feel God in the present." },
    { n:"04", action:"Receive comfort.", do:"Out loud. Holy Spirit, comfort me.", why:"He is called the Comforter. The one called alongside." },
    { n:"05", action:"Be with Him.", do:"You do not have to feel something today.", why:"Some days the win is showing up. He counts that." }
  ], prayer:"God I do not have words for this. I have only the weight of it. You said you are near to the brokenhearted and I am counting on that because I cannot feel you right now. I am choosing to believe it anyway. Comfort me the way only you can. Not the way that removes the grief but the way that says you are with me inside it. I do not need this to be resolved today. I need to know I am not alone in it. Amen." },
  afraid: { label:"Afraid", sub:"The fear is real.", steps:[
    { n:"01", action:"Say it out loud.", do:"I am afraid of ___. Name it.", why:"Naming the fear cuts its size in half." },
    { n:"02", action:"Hear His do not fear.", do:"Isaiah 41:10. Do not fear, for I am with you.", why:"He says do not fear over three hundred times in Scripture." },
    { n:"03", action:"Refuse the spirit.", do:"2 Timothy 1:7. He did not give you a spirit of fear.", why:"If it is not from Him, it does not belong on you." },
    { n:"04", action:"Take the right hand.", do:"I will uphold you with my righteous right hand. Take it.", why:"Faith is reaching for the hand while the fear is still in the room." },
    { n:"05", action:"Read for promise.", do:"Read like a person looking for a name to stand on.", why:"Fear shrinks under promise." }
  ], prayer:"God, the fear is real and I am not going to pretend it is not. But you said you did not give me a spirit of fear. So I am refusing it. I am handing it back. I am asking for the spirit of power and of love and of a sound mind that you actually gave me. Uphold me right now with your righteous right hand. I am reaching for it. I do not have to see clearly to hold on. I am holding on. Amen." },
  hopeful: { label:"Hopeful", sub:"Rested and ready.", steps:[
    { n:"01", action:"Breathe in thanks.", do:"Three breaths. Each exhale, name one thing you are grateful for.", why:"Gratitude is the right posture for hearing." },
    { n:"02", action:"Bless Him first.", do:"Bless the Lord, O my soul. Use Psalm 103.", why:"When you start with Him, the rest of what you bring lines up underneath." },
    { n:"03", action:"Listen.", do:"Thirty seconds of quiet before you read.", why:"Hopeful days are good listening days." },
    { n:"04", action:"Ask for vision.", do:"Lord, what do you want me to see today?", why:"Hopeful is the soil that vision grows in." },
    { n:"05", action:"Read generously.", do:"More than one chapter. Let Him saturate.", why:"Some days you only have a verse. Today you have appetite." }
  ], prayer:"God, thank you. I do not take this clarity for granted. I know what it costs and I know it is a gift. I receive it. Open my eyes today to what you are doing. I have appetite for you right now. Meet me in it. I am asking for vision for what is next. I am ready to hear it. I trust your timing even when I cannot see the plan. Give me more of you today. Amen." },
  thirsty: { label:"Thirsty", sub:"Desperate for more.", steps:[
    { n:"01", action:"Name the hunger.", do:"Say out loud: I want more. I am not satisfied with where I am.", why:"God is not offended by spiritual hunger. He called the hungry blessed." },
    { n:"02", action:"Surrender what is comfortable.", do:"Is there a comfortable place that has become a ceiling? Name it.", why:"Some of us are comfortable but not full. They are not the same." },
    { n:"03", action:"Make a demand on the anointing.", do:"Ask for what you were made for. Specifically.", why:"The gifts and calling of God are irrevocable. They are yours. Ask for activation." },
    { n:"04", action:"Die empty.", do:"Tell God plainly: I do not want to leave anything on the table.", why:"Legacy is not what you accumulated. It is what you spent yourself on." },
    { n:"05", action:"Ask to be sent.", do:"Here I am. Send me. Isaiah 6:8.", why:"God is looking for people who are desperate enough to go." }
  ], prayer:"God, I ask that you help me dig down and pull out the gifts, talents, ideas, wisdom, and discipline that honestly does not come naturally because you have called me and given me an opportunity to see increase. God I lift my hands in surrender. Search me. Help me reveal miracles I have left behind because I was too afraid to challenge myself. Yes, I am doing okay, but God I want to die empty. I want to live on the edge of grace and meet you each and every day. Do not let me get so comfortable that I miss being desperate for you. Feed me so that I may feed others. Break open the windows of heaven right now in the name of Jesus. I make a demand on the anointing inside of me and I say overflow. I rebuke insecurity. I rebuke inadequacy. Fill me with your glory Lord and let me go from this level of glory to the next. I want to die empty. Thank you for making all my weaknesses victorious. Order my steps. Amen." },
  grateful: { label:"Grateful", sub:"Something good happened and you know it came from Him.",
    steps:[
      { n:"01", action:"Name it specifically.", do:"Not 'I am blessed.' Name the exact thing, the call, the door, the person, the moment.", why:"Gratitude gets its power from specificity. Vague thankfulness is a different thing." },
      { n:"02", action:"Trace it back.", do:"Sit with how it happened. What led to it. What could have gone differently. See the hand.", why:"Gratitude deepens when you follow the thread." },
      { n:"03", action:"Say it out loud.", do:"Tell someone what God did. Not to perform it, to root it.", why:"What you testify to, you keep. What stays only inside you can be talked out of." }
    ],
    prayer:"God, you did that. I see it and I am not taking credit for it. Thank you specifically, not in general. Let this gratitude change how I move through the rest of the day. Amen." },

  joyful: { label:"Joyful", sub:"Full. Light. Like something settled.",
    steps:[
      { n:"01", action:"Receive it without guilt.", do:"Do not immediately find the problem. Do not shrink it. You are allowed to be this.", why:"Joy is not irresponsible. It is one of the fruits. It belongs to you." },

    ],

      { n:"02", action:"Check the source of the expectation.", do:"Is this something God said or something you decided? Both can be right. You need to know which one you are holding.", why:"Faith in what God said survives delay. Expectation built on your own timeline does not." },
      { n:"03", action:"Position yourself.", do:"Do whatever it is you do while you wait. Not passively, actively ready.", why:"Every person who received what they expected was already in motion." }

      { n:"02", action:"Name what was lost.", do:"Out loud or on paper. What is gone? What did you lose with it?", why:"Grief that is not named tends to show up as anger, numbness, or control. Naming it is how it starts to move." },
      { n:"03", action:"Let Him be present in it.", do:"Not to fix it. Not to explain it. Just, He is here. In the room. With you in it.", why:"He is close to the brokenhearted. Not close after. Close in the middle of." }
    ],
    prayer:"God, I am in it. I am not going to perform okayness right now. You are close to the brokenhearted and I am brokenhearted. Be here. That is all I need right now. Amen." }
