      relatable:"You shall love your neighbor as yourself. Jesus called this one of the two greatest commandments. It came from Leviticus. The book people skip. The same chapter says: love the foreigner residing among you as yourself, for you were foreigners in Egypt. The love command is not abstract. It is rooted in memory, you know what it feels like to be on the outside, to be treated as less, to be the one the system did not protect. That memory is the motivation. Not policy. Not niceness. Memory.",
      themes:"Leviticus grounds all ethical obligation in the character and commands of God. The phrase 'I am the Lord' appears over and over as the reason for each requirement. The ethics of Leviticus are not humanitarian. They are theological. You treat the vulnerable with dignity not because it is good social policy but because God is who he is. Black womanist ethics has always operated from this same foundation: the ground of obligation is not the social contract. It is the covenant.",
      prayer:"God who is holy and who made me in the image of that holiness, I receive the call of this book: be holy as I am holy. Not the performance of holiness. The actual becoming of a person who looks like you in how they treat people. Let your holiness show up in my life as justice for the vulnerable, as honest dealings in my transactions, as the love of neighbor that extends even to the foreigner who is different from me. Let your character be what shapes my ethics, not social norms, not what is convenient, not what I can get away with. I am the Lord. That is the reason given over and over again for every command. You are the reason. Let that be enough of a reason for me today. Amen.", carry:"Love your neighbor as yourself. Name your neighbor, the actual person, the one who requires something of you right now. Do one specific thing for that person today that you would want done for you." },

    "Numbers": { ref:"Numbers 6:24-26", title:"The Aaronic Blessing", lede:"The Lord bless you and keep you; the Lord make his face shine on you.",
      scripture:`<p><span class="vnum">22</span>The Lord said to Moses, <span class="vnum">23</span>"Tell Aaron and his sons, 'This is how you are to bless the Israelites. Say to them: <span class="vnum">24</span>The Lord bless you and keep you; <span class="vnum">25</span>the Lord make his face shine on you and be gracious to you; <span class="vnum">26</span>the Lord turn his face toward you and give you peace.'"</p>`,
      author:"Moses (tradition)", when:"During the wilderness wandering, roughly BC 1440-1400", where:"The wilderness", audience:"Israel in the wilderness between Egypt and the promised land",
      context:"Numbers is the book of the wilderness. Forty years of wandering, faithlessness, complaint, plague, and provision. In the middle of it: this blessing. God gave Moses a specific verbal formula for Aaron and his sons to speak over the people. Three lines. Each one doubles: bless/keep, face shine/be gracious, face toward/peace. The priestly blessing has been spoken in Jewish and Christian communities continuously for three thousand years.",
      keyTerms:[{script:"שָׁלוֹם",word:"shalom",lang:"Hebrew",gloss:"peace, wholeness, completeness, the full flourishing of a life",note:"Give you shalom. Not the absence of conflict. The presence of everything that makes a life whole. This is the third and deepest element of the blessing: the Lord's face turned toward you, and your life made whole."}],
      relatable:"The Lord bless you and keep you. The Lord make his face shine on you and be gracious to you. The Lord turn his face toward you and give you peace. This blessing was given by God to Moses to give to Aaron to speak over the people, in the wilderness. Not after they arrived. Not after they proved their faithfulness. In the middle of the wandering, God gave them specific words to speak over each other. The blessing was designed for the in-between place. It is still operative there.",
      themes:"The Aaronic blessing in Numbers 6 is one of the oldest continuous liturgical texts in human history. It has been spoken over Jewish communities for three thousand years. It was spoken over Jesus at his dedication. It has been spoken in Black churches, in hospital rooms, over caskets, at graduations, in kitchens. The blessing is threefold: protection, grace, and peace. Each one is an expression of God's face turned toward you. The face of God is not turned away. It is turned toward you. That is what the blessing declares.",
      prayer:"God who blessed your people in the wilderness with these specific words, I receive the Aaronic blessing over my life today. The Lord bless me and keep me. Keep what has been trying to get away from me. Keep my health. Keep my peace. Keep my family. Keep my calling. The Lord make his face shine on me and be gracious to me. I need that grace today specifically. The Lord turn his face toward me and give me shalom. Not just the absence of conflict. The full wholeness of a life where nothing is missing and nothing is broken. I receive this blessing in the wilderness, not after I arrive, not after things improve. In the middle of the wandering. You blessed them here. You bless me here. I receive it. Amen.", carry:"Speak the Aaronic blessing over someone today. Your child, your friend, your mother, yourself in the mirror. The Lord bless you and keep you. The Lord make his face shine on you. The Lord give you peace. This is the blessing given in the wilderness. It works there." },

    "1 Thessalonians": { ref:"1 Thessalonians 5:16-18", title:"Rejoice Always", lede:"Rejoice always. Pray without ceasing. Give thanks in all circumstances.",
      scripture:`<p><span class="vnum">14</span>And we urge you, brothers and sisters, warn those who are idle and disruptive, encourage the disheartened, help the weak, be patient with everyone. <span class="vnum">16</span>Rejoice always, <span class="vnum">17</span>pray without ceasing, <span class="vnum">18</span>give thanks in all circumstances; for this is God's will for you in Christ Jesus.</p>`,
      author:"Paul, Silas, and Timothy", when:"Roughly 50-51 CE, possibly Paul's earliest letter", where:"Written from Corinth", audience:"The church at Thessalonica, a young church under pressure",
      context:"First Thessalonians may be the earliest document in the New Testament. The church at Thessalonica was young, Paul had been with them only a few weeks before being forced to leave. He wrote to check on them, encourage them, and address their questions. The end of the letter compresses the daily life of faith into three lines: rejoice always, pray without ceasing, give thanks in all circumstances. This is God's will. Not a specific location or relationship or career. This orientation is the will of God.",
      keyTerms:[{script:"ἀδιαλείπτως",word:"adialeiptos",lang:"Greek",gloss:"without ceasing, without interruption, continuously",note:"Pray adialeiptos. This does not mean constant formal prayer. It means a life lived in ongoing conversation with God, awareness of his presence and orientation toward him throughout every activity."}],
      relatable:"Rejoice always. Pray without ceasing. Give thanks in all circumstances. Paul said this is God's will for you in Christ Jesus. Not the specific decision you are agonizing over. This orientation, these three postures maintained across all circumstances, is the will of God. When you do not know what God wants for your specific situation, you know what he wants for your posture inside the situation. That is not a small thing. That is the entire framework for how to live in seasons of uncertainty.",
      themes:"First Thessalonians may be the earliest document in the New Testament. Paul was writing to a very young church, weeks old, that had already started suffering for its faith. He told them: this was always part of it. He told them about the resurrection. He told them to encourage each other with these words. The community that carries each other through grief and uncertainty with the word of God is the specific community Paul was calling into being. Black churches at their best have always been that community.",
      prayer:"God who is not slow but patient, I receive the three instructions of this letter as the shape of my today. Rejoice. I choose it now, not because the circumstances warrant it but because you are consistent when the circumstances are not. Pray without ceasing. I make this conversation with you continuous, not a scheduled meeting I attend and leave. Give thanks in all circumstances. In this one. In the hard season. In the waiting. In the confusion. I give thanks for what is specifically true today, not in general but in particular. This is your will for me. Not the answer to the question I am agonizing over. This. This orientation. I receive it as enough for today. Amen.", carry:"Rejoice always. Pray without ceasing. Give thanks in all circumstances. Do all three once today, not as a practice, as a single integrated moment. Rejoice, then pray, then give thanks. One moment where all three are true at the same time." },

    "2 Thessalonians": { ref:"2 Thessalonians 3:3", title:"The Lord Is Faithful", lede:"The Lord is faithful, and he will strengthen you and protect you.",
      scripture:`<p><span class="vnum">2</span>Pray that we may be delivered from wicked and evil people, for not everyone has faith. <span class="vnum">3</span>But the Lord is faithful, and he will strengthen you and protect you from the evil one. <span class="vnum">16</span>Now may the Lord of peace himself give you peace at all times and in every way. The Lord be with all of you.</p>`,
      author:"Paul, Silas, and Timothy", when:"Roughly 51-52 CE", where:"Written from Corinth", audience:"The church at Thessalonica, dealing with false teaching and idleness",
      context:"Second Thessalonians was written shortly after the first letter to address two new problems: false teaching about the day of the Lord (some thought it had already come) and idleness among church members who had stopped working while waiting for Jesus to return. Paul's response to both is the same orientation: be faithful in what you have been given to do. The Lord is faithful and will strengthen you.",
      keyTerms:[{script:"πιστός",word:"pistos",lang:"Greek",gloss:"faithful, trustworthy, one who keeps their word",note:"The Lord is pistos. The faithfulness of God is offered as the ground of confidence when dealing with the unfaithfulness of people. Not everyone has faith, but God does."}],
      relatable:"The Lord is faithful, and he will strengthen you and protect you. Paul said this immediately after noting that not everyone has faith, that there are people around you who are unreliable, who will oppose, who cannot be trusted. He did not say: find better people. He said: the Lord is faithful. The divine faithfulness is the anchor when human faithfulness fails. Black women navigating institutions, relationships, and systems that have consistently failed them, the faithfulness of God is the ground that does not shift.",
      themes:"Second Thessalonians corrects the community's eschatology, they thought the day of the Lord had already come, which led some to stop working and start waiting passively. Paul's correction is practical and theological: do not grow weary in doing good. The waiting is active. The faithfulness expected while waiting is the same faithfulness required while building. God's delay is not absence. It is patience. And his faithfulness to protect and strengthen you through the waiting is the same faithfulness that will bring the completion.",
      prayer:"God who is faithful when I am not, whose faithfulness does not depend on the faithfulness of the people around me, I come to you from the disappointment of human unreliability. The person who did not show up. The institution that did not follow through. The promise that was not kept. And I hold it against the faithfulness of God, which has not wavered in any season I have been through. You will strengthen me. You will protect me. Not maybe. You will. I stand on that today. Not on what the people around me can provide but on what you have already declared. And I receive the peace you promised, at all times, in every way. The Lord of peace himself. Not a peace that comes through resolution of circumstances. The Lord of peace giving the peace directly. I receive it directly. Amen.", carry:"The Lord is faithful. Name one place where human faithfulness has failed you recently. Then name one evidence of God's faithfulness in the same season. He has been there. Name it specifically." },

    "1 Timothy": { ref:"1 Timothy 4:12", title:"Set an Example", lede:"Don't let anyone look down on you because you are young.",
      scripture:`<p><span class="vnum">12</span>Don't let anyone look down on you because you are young, but set an example for the believers in speech, in conduct, in love, in faith and in purity. <span class="vnum">13</span>Until I come, devote yourself to the public reading of Scripture, to preaching and to teaching. <span class="vnum">14</span>Do not neglect your gift.</p><p><span class="vnum">6:6</span>But godliness with contentment is great gain. <span class="vnum">7</span>For we brought nothing into the world, and we can take nothing out of it. <span class="vnum">8</span>But if we have food and clothing, we will be content with that.</p>`,
      author:"Paul", when:"Roughly 62-64 CE", where:"Macedonia or Rome", audience:"Timothy, Paul's son in the faith and leader of the church at Ephesus",
      context:"First Timothy is a pastoral letter from Paul to his protégé, dealing with church leadership, false teaching, and personal conduct. The instruction not to let anyone look down on your youth was given to a leader who was possibly in his thirties, young for his responsibility but capable. The antidote to being dismissed was not demanding respect. It was setting an example in five specific areas: speech, conduct, love, faith, purity.",
      keyTerms:[{script:"τύπος",word:"typos",lang:"Greek",gloss:"a pattern, a model, an example that can be followed",note:"Be a typos for the believers. Not just a leader who makes decisions. A model whose life is itself the instruction. The way you live teaches something."}],
      relatable:"Do not let anyone look down on you because you are young. Timothy was probably in his thirties, young for the responsibility he had been given. He was leading a complex church in a city that did not take him seriously. Paul's instruction was not: earn their respect. It was: set an example in speech, in conduct, in love, in faith, in purity. The response to being dismissed is not to demand credibility, it is to embody it. Black women who have been dismissed in rooms where they were the most qualified person present know this assignment.",
      themes:"First Timothy is Paul's instruction for church leadership that consistently centers character over credential. The qualifications for leadership in chapters 2 and 3 are entirely about who you are in your daily life, your marriage, your household, your reputation in the community, your freedom from particular sins. Not your education. Not your network. Not your platform. This is a corrective to every system, including church systems, that evaluate leaders by metrics that have nothing to do with character.",
      prayer:"God who calls the young and the overlooked and the one the room did not take seriously, I receive the charge to set an example. Not in the grand gestures. In speech. In what I say about myself and others and my situation. In conduct. In how I actually move through the day when no one is watching. In love. In the quality of attention I give to the people in front of me. In faith. In the settled trust I carry even in the uncertain season. In purity. In the integration of what I believe and what I do. Let the example I set today be the kind that gives someone else permission to believe that faithfulness is possible in a body that looks like mine, in a life that has looked like mine. I will not neglect the gift. It was given on purpose. Amen.", carry:"Set an example in speech today. Before you speak in the next difficult conversation, ask: is this true, is this necessary, is this kind, does this build? Say only what passes that test." },

    "Titus": { ref:"Titus 2:11-12", title:"The Grace That Trains Us", lede:"The grace of God has appeared, training us to live godly lives.",
      scripture:`<p><span class="vnum">11</span>For the grace of God has appeared that offers salvation to all people. <span class="vnum">12</span>It teaches us to say "No" to ungodliness and worldly passions, and to live self-controlled, upright and godly lives in this present age, <span class="vnum">13</span>while we wait for the blessed hope, the appearing of the glory of our great God and Savior, Jesus Christ, <span class="vnum">14</span>who gave himself for us to redeem us from all wickedness and to purify for himself a people that are his very own, eager to do what is good.</p>`,
      author:"Paul", when:"Roughly 62-64 CE", where:"Macedonia or Rome", audience:"Titus, Paul's delegate leading the churches in Crete",
      context:"Crete had a reputation, Paul quotes one of their own prophets: Cretans are always liars, evil brutes, lazy gluttons. He agreed the testimony was true. He sent Titus to organize churches there anyway. The letter is practical: appoint leaders, teach different age groups, confront false teaching. But its theological center is stunning: grace does not just save. It trains. The grace of God is itself the instructor in what a new life looks like.",
      keyTerms:[{script:"παιδεύω",word:"paideuo",lang:"Greek",gloss:"to train, to educate, to discipline, the word for how a parent forms a child",note:"Grace paideuo us. Grace is not just the entry point. It is the ongoing educator. The same grace that brought you in is the thing that forms you into someone new."}],
      relatable:"The grace of God has appeared that offers salvation to all people. It teaches us to say no to ungodliness and worldly passions, and to live self-controlled, upright, and godly lives in this present age. Grace is the teacher. Not shame. Not fear. Not performance pressure. The thing that forms you into a new person is the same thing that saved you. Grace is not the door you walked through to get to the real work. Grace is the work. It is doing the forming. You are in the classroom of grace and it is not gentle, it teaches you to say no.",
      themes:"Titus argues that the grace of God is both the source of salvation and the ongoing agent of transformation. This is a direct counter to performance-based theology, the idea that you prove your salvation by your behavior. Paul says grace produces the behavior. Naturally. Automatically. As the fruit of the tree, not the payment for the tree. For Black women who have been told in religious spaces that their worth depends on their righteousness, Titus is the answer: you are already purchased, and grace is teaching you to live like it.",
      prayer:"God whose grace appeared and is still teaching me, I receive today's lesson. Grace is not just the door I walked through to get to the real Christian life. Grace is the teacher. Grace is what forms me into someone who can say no to ungodliness. Grace is what gives me the self-control I could not generate on my own. I stop trying to earn through performance what grace has already supplied freely. I receive the formation. I open myself to what grace is trying to teach me today about living self-controlled and upright and godly in the present age, not in the age I am waiting for, in this one. The blessed hope is coming. While I wait for it I will live from the grace that is already here and the life it is already producing in me. Amen.", carry:"Grace is teaching you to say no. Name one thing you need to say no to today, one ungodliness, one worldly passion, one thing that is pulling you away from who God says you are. Then say no to it." },

    "Philemon": { ref:"Philemon 1:15-17", title:"No Longer a Slave", lede:"Perhaps the reason he was separated from you for a little while was that you might have him back forever.",
      scripture:`<p><span class="vnum">10</span>I appeal to you for my son Onesimus, who became my son while I was in chains. <span class="vnum">11</span>Formerly he was useless to you, but now he has become useful both to you and to me. <span class="vnum">15</span>Perhaps the reason he was separated from you for a little while was that you might have him back forever, <span class="vnum">16</span>no longer as a slave, but better than a slave, as a dear brother. He is very dear to me but even dearer to you, both as a fellow man and as a brother in the Lord. <span class="vnum">17</span>So if you consider me a partner, welcome him as you would welcome me.</span></p>`,
      author:"Paul", when:"Roughly 60-62 CE", where:"Written from prison", audience:"Philemon, a slave owner and member of the church at Colossae",
      context:"Philemon is the shortest of Paul's letters, one chapter, 25 verses. Onesimus was a slave who had apparently run away from his owner, Philemon, and ended up with Paul in prison, where he became a Christian. Paul is sending him back. But he is asking Philemon to receive him not as a slave but as a dear brother. He offers to pay any debt himself. He says: I am not commanding you, but I am confident you will do even more than I ask. The letter is a masterclass in persuasion, relationship, and the social disruption of the gospel.",
      keyTerms:[{script:"ἀδελφός",word:"adelphos",lang:"Greek",gloss:"brother, a relational bond based not on blood but on shared life in Christ",note:"No longer as a slave, but as a dear adelphos. The gospel did not immediately abolish the institution of slavery in Rome. But it created a category, brother, that made the institution untenable from the inside."}],
      relatable:"Paul sent Onesimus back to Philemon with this letter: receive him no longer as a slave, but better than a slave, as a dear brother. He did not command Philemon. He appealed. He trusted the relationship. He offered to pay any debt himself. He said: I am confident you will do even more than I ask. The gospel creates categories that make the old arrangements impossible to maintain. Brother. The word cuts through every legal and social structure. You cannot legally enslave your brother. Paul knew what he was doing.",
      themes:"Philemon is the shortest text in the New Testament with the largest social implication. Paul did not confront the institution of slavery directly. He created a theological category, brother in Christ, that made it untenable from the inside. Womanist and liberation theologians have debated this approach for decades: is it enough to work within the system toward its transformation, or does the system require direct confrontation? Both questions are alive and relevant. The letter plants the seed. The community waters it.",
      prayer:"God who through the gospel creates the category of brother and sister that makes the old arrangements impossible to maintain, I come to you with the relationship that needs the gospel applied to it. The one where the power dynamics have been arranged in ways that the gospel disrupts. I receive the instruction of this letter: welcome the one who returns as you would welcome me. Not as what the law allows. As a dear brother. As a dear sister. Give me the willingness to do more than is required, to do what grace makes possible rather than what obligation demands. Let the gospel change the specific relationship I have been navigating by a different set of rules. Amen.", carry:"Receive whoever needs to be received today. Not the easy one. The one who cost you something, who came back different, who you have been holding at distance. Receive them as a dear brother or sister. Just once. Today." },

    "2 Peter": { ref:"2 Peter 1:3-4", title:"Everything We Need", lede:"His divine power has given us everything we need for a godly life.",
      scripture:`<p><span class="vnum">3</span>His divine power has given us everything we need for a godly life through our knowledge of him who called us by his own glory and goodness. <span class="vnum">4</span>Through these he has given us his very great and precious promises, so that through them you may participate in the divine nature, having escaped the corruption in the world caused by evil desires.</p><p><span class="vnum">3:9</span>The Lord is not slow in keeping his promise, as some understand slowness. Instead he is patient with you, not wanting anyone to perish, but everyone to come to repentance.</p>`,
      author:"Peter, or written in Peter's name after his death", when:"Roughly 64-68 CE", where:"Rome", audience:"Christians facing false teaching and questions about the delayed return of Jesus",
      context:"Second Peter is one of the last letters in the New Testament. It addresses two urgent concerns: false teachers who are distorting the gospel, and people growing skeptical about the return of Jesus because time is passing. Peter's response to both: God's divine power has given you everything you need. And God is not slow, he is patient. The delay is mercy.",
      keyTerms:[{script:"δύναμις",word:"dunamis",lang:"Greek",gloss:"power, capacity, ability, the root of dynamite",note:"His divine dunamis has given us everything. Not some things. Everything needed for a godly life has already been supplied. The question is not whether it is available. It is whether you have accessed what is already yours."}],
      relatable:"His divine power has given us everything we need for a godly life. Everything. Already given. Not being gathered. Not in transit. Already placed inside you through the knowledge of Christ. You are not waiting for the resource to arrive. You are waiting to access what is already present. The practical implication of this is enormous: whatever you are trying to do that God has called you to do, the power for it is already in you. The question is not will God give it to you. The question is will you access what is already there.",
      themes:"Second Peter is the epistle of sufficiency. Sufficient power. Sufficient promises. Sufficient provision for the long wait. The Lord is not slow, he is patient. That patience is merciful. The delay is not indifference. It is the space in which more people can come to repentance, in which more of God's purposes can unfold, in which your character is being formed for what is coming. Black women who have been waiting, for healing, for recognition, for justice, for the fulfillment of the promise, second Peter is the word for the long middle.",
      prayer:"God whose divine power has given me everything I need for a godly life, I receive what you have already supplied. I stop asking for what is already inside me. The power is there. The promises are there. The capacity to participate in the divine nature is there. I access what has already been given rather than waiting for a future provision of something that is already present. You are not slow to keep your promises. You are patient. The delay is not absence. The waiting is not abandonment. You are working in the space of the waiting with purposes I cannot fully see. I trust the purposes. I access the power. I hold onto the promises. And I grow in grace and in the knowledge of you, who are my Lord and Savior, today and always. Amen.", carry:"His divine power has given you everything you need for a godly life. Today. Already inside you. What have you been asking God to give you that he has already given? Access it. Stop asking for what has already been provided." },

    "2 John": { ref:"2 John 1:6", title:"Walk in Love", lede:"This is love, that we walk according to his commands.",
      scripture:`<p><span class="vnum">4</span>It has given me great joy to find some of your children walking in the truth, just as the Father commanded us. <span class="vnum">5</span>And now, dear lady, I am not writing you a new command but one we have had from the beginning. I ask that we love one another. <span class="vnum">6</span>And this is love: that we walk in obedience to his commands. As you have heard from the beginning, his command is that you walk in love.</p>`,
      author:"John the Apostle, writing as 'the Elder'", when:"Roughly 85-95 CE", where:"Ephesus", audience:"A specific church community addressed as 'the chosen lady'",
      context:"Second John is thirteen verses. It is addressed to a church (personified as a lady and her children) with one main message: walk in love, and do not receive teachers who deny that Jesus came in the flesh. The two instructions are not contradictory, love operates within truth. Walking in love does not mean welcoming every teaching. It means living in obedience to what was given from the beginning.",
      keyTerms:[{script:"περιπατέω",word:"peripateo",lang:"Greek",gloss:"to walk, to order your life, to move through the world in a particular way",note:"Walk in love. The word is peripateo, it means more than feeling love. It means ordering your daily movement, your daily choices, according to love. It is a lifestyle verb."}],
      relatable:"Walk in love. This is John's entire instruction in two chapters, the practical expression of the theology he built in his gospel and his first letter. Walking is a daily practice. It is not a feeling. It is the ordering of your movement, your choices, your words, your priorities, all of it structured around love as God defines it. For Black women navigating a world that consumes love and rarely returns it, John's instruction is both simple and demanding: you walk in love as a practice, not as a response to being loved first.",
      themes:"Second John holds love and discernment together without tension. Love is commanded. Truth is also commanded. They are not in conflict, genuine love operates within truth. The woman who loves without discernment is not loving more fully. She is loving without wisdom. Black women who have been told that their boundaries are unloving, that their discernment is unfair, that their protection of themselves is a failure of love, John's letter says love and truth are the same instruction.",
      prayer:"God who is both love and truth, I receive the integration of those two things that John keeps insisting are not in conflict. I will walk in love today as a practice, not as a feeling, not as a response to being loved first. And I will walk in truth, which means I will not call things good that are not good and I will not protect relationships by being dishonest inside them. Let me love with enough wisdom to be truthful. Let me be truthful with enough warmth to actually reach the person I am speaking to. You are the model of both. Every interaction Jesus had was both. Let mine be both today. Amen.", carry:"Walk in love today as a practice, not a feeling. In one interaction where love will cost you something, do the loving thing deliberately. Not because you feel it. Because it is the command. Then notice what happens." },

    "3 John": { ref:"3 John 1:4", title:"My Greatest Joy", lede:"I have no greater joy than to hear that my children are walking in the truth.",
      scripture:`<p><span class="vnum">2</span>Dear friend, I pray that you may enjoy good health and that all may go well with you, even as your soul is getting along well. <span class="vnum">3</span>It gave me great joy when some believers came and testified about your faithfulness to the truth, telling how you continue to walk in it. <span class="vnum">4</span>I have no greater joy than to hear that my children are walking in the truth.</p><p><span class="vnum">11</span>Dear friend, do not imitate what is evil but what is good. Anyone who does what is good is from God.</p>`,
      author:"John the Apostle, writing as 'the Elder'", when:"Roughly 85-95 CE", where:"Ephesus", audience:"Gaius, a faithful leader in a local church",
      context:"Third John is fourteen verses, the shortest book in the New Testament by word count. It is addressed to Gaius, a faithful man who was showing hospitality to traveling missionaries. Another leader, Diotrephes, was refusing to do the same and was gossiping about John. John commends Gaius, warns about Diotrephes, and introduces a third person, Demetrius, who has a good reputation. The entire letter is a case study in the power of faithfulness and the damage of pride.",
      keyTerms:[{script:"ἀλήθεια",word:"aletheia",lang:"Greek",gloss:"truth, reality as it actually is, not as it appears or is claimed to be",note:"Walking in the aletheia. John's greatest joy is not accomplishment or growth. It is faithfulness to what is real, children who are living in alignment with what is actually true about God."}],
      relatable:"I have no greater joy than to hear that my children are walking in the truth. John wrote this to Gaius, who was showing hospitality to traveling teachers when the official church leader was refusing to do so. Gaius was faithful in a small thing, opening his home, and John named it as the source of great joy. The grand gestures get the attention. The consistent faithfulness in unglamorous places is what builds the kingdom. Black women who have been the church in the small ways, the invisible ways, the uncelebrated ways, John sees it. It is the source of great joy.",
      themes:"Third John is a case study in two kinds of leadership: Gaius, who served quietly with generosity, and Diotrephes, who loved preeminence and refused hospitality to protect his position. John named both of them. He commended Gaius and he named Diotrephes's behavior as evil. Leadership that centers itself, that withholds resources to maintain control, that slanders those who work outside its sanction, this is not a modern church problem. It was documented in the first century. And John called it what it was.",
      prayer:"God who takes joy in watching your children walk in truth, I come to you grateful for the people who have shown me what faithfulness looks like. The ones who kept giving when they had reasons to stop. The ones who kept their doors open when they could have closed them. The Gaius in my life. And I ask to be that for someone else. Let me be the one whose faithfulness gives someone else joy. Let me be the one who makes room for the traveler, who provides for the person doing the work, who shows up in the ways that no one announces but everyone notices is missing when it stops. Let my name be synonymous with trustworthy. Let the testimony be: she walked in truth. Amen.", carry:"I have no greater joy than to hear that my children are walking in the truth. Who needs to hear that from you today? Name them. Tell them. The testimony of someone watching you walk faithfully is a gift. Give it." },

    "Jude": { ref:"Jude 1:24-25", title:"To Him Who Is Able", lede:"To him who is able to keep you from stumbling, glory and majesty.",
      scripture:`<p><span class="vnum">3</span>Dear friends, although I was very eager to write to you about the salvation we share, I felt compelled to write and urge you to contend for the faith that was once for all entrusted to God's holy people. <span class="vnum">20</span>But you, dear friends, by building yourselves up in your most holy faith and praying in the Holy Spirit, <span class="vnum">21</span>keep yourselves in God's love as you wait for the mercy of our Lord Jesus Christ to bring you to eternal life.</p><p><span class="vnum">24</span>To him who is able to keep you from stumbling and to present you before his glorious presence without fault and with great joy, <span class="vnum">25</span>to the only God our Savior be glory, majesty, power and authority, through Jesus Christ our Lord, before all ages, now and forevermore! Amen.</p>`,
      author:"Jude, brother of Jesus and James", when:"Roughly 60-80 CE", where:"Unknown", audience:"A church community facing false teaching from within",
      context:"Jude wanted to write about salvation. Instead he felt compelled to write about the faith being under threat. False teachers had crept in who were using grace as a license for immorality and denying Jesus as Lord. His letter is dense, urgent, and unusual, he quotes from Enoch and references an argument between Michael and the devil over Moses' body. But he ends with one of the most beautiful doxologies in Scripture: to the God who is able to keep you from stumbling. Unable to stumble is not the same as unable to fall. Jude is not promising perfection. He is declaring a guardian.",
      keyTerms:[{script:"φυλάσσω",word:"phylasso",lang:"Greek",gloss:"to guard, to watch over, to keep safe, military language for protecting what is valuable",note:"To him who is able to phylasso you from stumbling. God does not just forgive stumbling after it happens. He guards against it in advance. He is stationed at the places where you could fall."}],
      relatable:"To him who is able to keep you from stumbling and to present you before his glorious presence without fault and with great joy. Jude wrote this doxology to a community being destabilized from inside, by people who used grace as a license, who denied Jesus as Lord, who were doing damage in the name of the same God they were misrepresenting. His answer was not more rules or better gatekeeping. It was worship, directed to the God who keeps. God's keeping power is greater than the damage done by those who misused his name. That is the specific promise Black women who have experienced church hurt need to hear.",
      themes:"Jude is the epistle written for people who have been hurt by the church and need to know that God is not the church. The behavior being condemned in Jude, the manipulation, the greed, the abuse of spiritual authority, the turning of grace into license for harm, is the behavior of leaders who were inside the community. Jude says: God sees it. He named it. He has addressed it. And to him who is able to keep you despite what was done to you in his name, be glory and majesty, power and authority, before all ages, now and forevermore.",
      prayer:"God who is able to keep me from stumbling and to present me faultless before your glorious presence with great joy, I receive your keeping power today. Not as a concept I agree with. As a present reality I am depending on. The road I am walking is not easy and I cannot guarantee I will not stumble. But you can. And you are the one making that guarantee, not me. To you who are able. You are able. I rest in that ability today. You will present me. Faultless. With great joy. What the enemy intended for my destruction, what was done to me in your name, what I have done to myself, none of it is the final word about my condition before you. Your keeping is the final word. Be the glory and majesty and power and authority that you are. Before all ages, now, and forevermore. Amen.", carry:"To him who is able to keep you from stumbling, give him glory today. Not for the big things. For the small keeps. The moment you did not fall. The door that did not open. The thing he held together that you did not know was about to break." },

    "Amos": { ref:"Amos 5:24", title:"Let Justice Roll", lede:"Let justice roll on like a river, righteousness like a never-failing stream.",
      scripture:`<p><span class="vnum">21</span>"I hate, I despise your religious festivals; your assemblies are a stench to me. <span class="vnum">22</span>Even though you bring me burnt offerings and grain offerings, I will not accept them. Though you bring choice fellowship offerings, I will have no regard for them. <span class="vnum">23</span>Away with the noise of your songs! I will not listen to the music of your harps. <span class="vnum">24</span>But let justice roll on like a river, righteousness like a never-failing stream!"</p>`,
      author:"Amos of Tekoa, a farmer, not a professional prophet", when:"BC 760-750", where:"Bethel, the royal sanctuary of the northern kingdom", audience:"A prosperous Israel whose worship had become disconnected from justice",
      context:"Amos was a sheep breeder and fig farmer from Tekoa who received a vision and went to Bethel, the official royal sanctuary, to prophesy during a season of national prosperity. The people were going to church, celebrating festivals, singing worship songs. Amos interrupted the service. He said: God despises your religious activity. Not because worship is wrong, but because worship that does not change how you treat people is not worship. It is noise.",
      keyTerms:[{script:"מִשְׁפָּט",word:"mishpat",lang:"Hebrew",gloss:"justice, the right ordering of relationships, especially toward the vulnerable",note:"Let mishpat roll on like a river. Not a trickle. Not a seasonal stream. A river, constant, powerful, impossible to ignore. This is the standard."}],
      relatable:"Amos walked into the national sanctuary during a season of national prosperity and said: God hates your worship. Not because worship is wrong. Because the people worshipping were exploiting the poor in the marketplace on Monday. He said: your offerings are noise. Let justice roll down like waters instead. This was not a popular message. He was not invited back. He was a farmer who had a word and he said it without institutional backing. That is a tradition Black women know well, speaking truth in spaces that did not send for them.",
      themes:"The Black church has always understood Amos. His cry for justice was the cry of the civil rights movement, the cry of liberation theology, the cry of every community that has had to worship in spaces that ignored their suffering. The worship God rejects in Amos is the worship that has made peace with injustice. The worship God accepts is the one that flows into action, that cannot be separated from how you treat the vulnerable Monday through Saturday. Worship and justice are not two different things in Amos. They are one.",
      prayer:"God of justice who cannot be worshipped in a room disconnected from the world outside it, I bring you my whole life. Not just the Sunday portion. Not just the devotional minutes. The Monday portion too. The meeting where I have power over someone else's outcome. The budget decision. The platform I use and how I use it. The relationships where I have been taking more than I give. Let justice roll down like waters in every room I enter today. Not the performative version. The actual reorientation of my priorities around what you value. You are not impressed by my worship if my marketplace is unjust. Let them be one. Let the worship produce the justice and the justice deepen the worship. Amen.", carry:"Name one place in your week where justice and worship are not yet connected, where you leave church and Monday looks like it had nothing to do with Sunday. Identify one action that bridges them." },

    "Micah": { ref:"Micah 6:8", title:"What the Lord Requires", lede:"To act justly and to love mercy and to walk humbly with your God.",
      scripture:`<p><span class="vnum">6</span>"With what shall I come before the Lord and bow down before the exalted God? Shall I come before him with burnt offerings, with calves a year old? <span class="vnum">7</span>Will the Lord be pleased with thousands of rams, with ten thousand rivers of olive oil? Shall I offer my firstborn for my transgression, the fruit of my body for the sin of my soul?" <span class="vnum">8</span>He has shown you, O mortal, what is good. And what does the Lord require of you? To act justly and to love mercy and to walk humbly with your God.</p>`,
      author:"Micah of Moresheth, a contemporary of Isaiah", when:"BC 735-700", where:"Judah, a small town outsider prophesying to Jerusalem", audience:"Both the northern and southern kingdoms",
      context:"Micah asked the question his audience was already asking, how much worship is enough? He escalated it deliberately: thousands of rams? Ten thousand rivers of oil? His own firstborn? And then answered it as simply as anything in the OT: he has already told you. Act justly. Love mercy. Walk humbly. Three verbs. The whole law in a single verse. Jesus would later confirm this compression, the prophets had always been saying this.",
      keyTerms:[{script:"מִשְׁפָּט",word:"mishpat",lang:"Hebrew",gloss:"justice, the right ordering of relationships, especially care for the vulnerable",note:"Act justly. Mishpat. Not feel justice or agree with justice but do it. The verb is active. It requires movement."}],
      relatable:"Micah 6:8 was not written for people who had power and needed a reminder to use it well. It was written for people living under the thumb of an unjust system who needed to know what faithfulness looked like when the structure around them was corrupt. Act justly. Love mercy. Walk humbly with your God. These three things are not a checklist. They are a posture. A way of moving through the world that is rooted in relationship with God and expressed in how you treat people. Black women have been living that theology under impossible conditions since before this country existed.",
      themes:"Micah is the prophet who compressed the entire Law and Prophets into three requirements that Jesus later confirmed: justice, mercy, and humble partnership with God. This compression is not simplification. It is distillation. The entire covenant reduced to its essential shape. Womanist ethics has always operated from this distillation, not complex theory disconnected from life but embodied practice rooted in the character of God. Do justly. Love mercy. Walk with God. Everything else is commentary.",
      prayer:"God who reduced the whole law to three things, I bring you my compliance record and ask instead for the three things. Not the performance. Not the accumulation of religious activity. Act justly. Love mercy. Walk humbly with you. Let me do those three things today in their most specific, real, costly versions. The justice that costs me something. The mercy that I extend to the person I have a right to withhold it from. The humility that is not self-erasure but genuine acknowledgment that you are larger than my understanding of you. Three things. Everything else flows from them. Let me do them today. Amen.", carry:"Act justly. Love mercy. Walk humbly. Pick the one that is hardest for you right now. Not the one you do well. The hard one. Do one specific version of that today." },

    "Nahum": { ref:"Nahum 1:7", title:"A Stronghold in Trouble", lede:"The Lord is good, a stronghold in the day of trouble.",
      scripture:`<p><span class="vnum">2</span>The Lord is a jealous and avenging God; the Lord takes vengeance and is filled with wrath. The Lord takes vengeance on his foes and vents his wrath against his enemies. <span class="vnum">3</span>The Lord is slow to anger but great in power; the Lord will not leave the guilty unpunished. <span class="vnum">7</span>The Lord is good, a refuge in times of trouble. He cares for those who trust in him.</p>`,
      author:"Nahum the Elkoshite, hometown unknown", when:"BC 663-612", where:"Judah, prophesying the fall of Nineveh", audience:"Judah under Assyrian oppression",
      context:"Nahum prophesied the destruction of Nineveh, the same city Jonah had warned a century and a half earlier. After Jonah, Nineveh repented and was spared. They returned to their old ways. Nahum delivered the verdict. The book opens with a hymn about God's character: slow to anger but great in power. And then, embedded in this declaration of coming judgment, one of the most intimate verses in the minor prophets: the Lord is good. A stronghold. He knows the ones who take refuge in him. The comfort is for the people Nineveh had terrorized.",
      keyTerms:[{script:"מָעוֹז",word:"maoz",lang:"Hebrew",gloss:"stronghold, fortress, a place of protection that holds when everything outside it fails",note:"The Lord is a maoz in the day of trouble. Not a shelter you find by accident. A fortified position you run to deliberately."}],
      relatable:"Nahum 1:7 sits inside a book about the fall of an empire that had terrorized God's people for generations. Right in the middle of that judgment oracle: the Lord is good, a stronghold in the day of trouble. He cares for those who take refuge in him. That declaration was for the people who had been under Nineveh's boot. Not a platitude, a promise made while the empire was still standing. God's goodness and God's justice are not two separate attributes. The fall of what oppresses you is an expression of his goodness toward you.",
      themes:"The theological genius of Nahum is the way it holds divine wrath and divine tenderness in the same text without contradiction. The God who destroys what destroys his people is the same God who is a stronghold for the vulnerable. Black liberation theology has always insisted on this both/and: a God of love who is also fiercely protective, who does not remain neutral in the face of oppression, whose goodness has teeth. The fall of empire is not separate from the good news. In Nahum, it is the good news.",
      prayer:"God who is a stronghold in the day of trouble, I run to you. Not as a last resort. As a first response. You are good. Right now in the middle of what is threatening me, you are good. You care for those who take refuge in you and I am taking refuge in you. Not in the plan, not in the outcome I am trying to control, not in the people I have been depending on to hold things together. In you. You are the stronghold. The walls are yours and they hold. I stop trying to be my own defense and I receive the protection you are. I am inside the walls today. Amen." },

    "Zephaniah": { ref:"Zephaniah 3:17", title:"He Rejoices Over You With Singing", lede:"The Lord your God is in your midst, a Mighty One who will save.",
      scripture:`<p><span class="vnum">14</span>Sing aloud, O daughter of Zion; shout, O Israel! Rejoice and exult with all your heart, O daughter of Jerusalem! <span class="vnum">15</span>The Lord has taken away the judgments against you; he has cleared away your enemies. The King of Israel, the Lord, is in your midst; you shall never again fear evil. <span class="vnum">17</span>The Lord your God is in your midst, a mighty one who will save; he will rejoice over you with gladness; he will quiet you by his love; he will exult over you with loud singing.</p>`,
      author:"Zephaniah, a royal descendant, prophet during Josiah's reign", when:"BC 640-609", where:"Jerusalem", audience:"Judah before the Babylonian exile",
      context:"Zephaniah opens with some of the most comprehensive judgment language in the OT, I will sweep away everything from the face of the earth. Then he narrows: Judah, Jerusalem, specific officials, specific corrupt practices. The first two chapters are darkness. Then chapter 3 turns without warning. Suddenly: sing aloud. He has cleared your enemies. The King is in your midst. And then the most startling image in the minor prophets, God singing. Not instructing, not judging. Singing over you.",
      keyTerms:[{script:"יָגִיל",word:"yagil",lang:"Hebrew",gloss:"to rejoice, to exult with great joy, the same word used for Israel's commanded joy",note:"He will yagil over you with singing. God's joy over his people is described with the same verb used to command Israel to rejoice. What he commands in you, he also feels toward you."}],
      relatable:"He will rejoice over you with gladness. He will quiet you by his love. He will exult over you with loud singing. The image of God singing over you is the most intimate image in the prophets. Not God giving instructions. Not God assigning tasks. God singing, with gladness, with loud voice, over you. This was written for a community that had every reason to feel abandoned. For the Black woman who has carried everyone else's weight and never been the one someone showed up for, God is singing. Over you. Specifically. With gladness.",
      themes:"Zephaniah 3:17 has become a foundational text in Black women's theology precisely because of its specificity. The mighty one who will save is in the midst of a community the world wrote off. The gladness and the singing are not conditional on the community having gotten everything right. They come after the judgment has passed and the restoration has come. This is the image of a God who is not merely tolerated or feared, who is joyful about his people. That theological claim is not small. It is revolutionary for anyone who has been taught that God merely endures them.",
      prayer:"God who rejoices over me with gladness, I receive that today in the place where I have felt least worth rejoicing over. The part of my life I would hide if you asked to look. The season I have been ashamed of. The version of me that has been in the wilderness. You are already there rejoicing. Not performatively. Not as a theological exercise. With gladness. You quiet me with your love in the exact place where the noise has been loudest. I stop the noise for a moment and let the love be louder. And you exult over me with singing. I let that be true. Not argued with. Not diminished. Just received. You are singing over me. Amen.", carry:"He is singing over you right now. Not will sing. Is singing. Sit for two minutes and let that be true. No agenda. No request. Just receive the song." },

    "Zechariah": { ref:"Zechariah 4:6", title:"Not by Might", lede:"Not by might nor by power, but by my Spirit, says the Lord Almighty.",
      scripture:`<p><span class="vnum">4</span>"What are these, my lord?" I asked the angel who talked with me. He answered me, "Do you not know what these are?" "No, my lord," I said. <span class="vnum">6</span>So he said to me, "This is the word of the Lord to Zerubbabel: 'Not by might, nor by power, but by my Spirit,' says the Lord of hosts. <span class="vnum">7</span>'Who are you, O great mountain? Before Zerubbabel you shall become a plain. And he shall bring forward the top stone amid shouts of "Grace, grace to it!"'"</p>`,
      author:"Zechariah son of Berechiah, priest and prophet", when:"BC 520-480", where:"Jerusalem, post-exile rebuilding period", audience:"The returned exiles rebuilding the temple under Zerubbabel",
      context:"Zechariah was given eight night visions in a single night and then a series of oracles. The verse in chapter 4 came specifically for Zerubbabel, the governor responsible for rebuilding the temple. The mountain in verse 7 is the obstacle, whatever is standing in the way of what God has called him to build. The answer to the mountain is not strategy or force. It is the Spirit of God. The capstone goes in with shouts of grace.",
      keyTerms:[{script:"רוּחַ",word:"ruach",lang:"Hebrew",gloss:"Spirit, breath, wind, the animating power of God that accomplishes what human effort cannot",note:"Not by might, not by power, but by my ruach. The word ruach connects this verse to creation, to Pentecost, to every moment in Scripture where God's breath is the agent of the impossible."}],
      relatable:"Not by might, nor by power, but by my Spirit. Zechariah gave this word to a man named Zerubbabel who was trying to rebuild something that looked too broken to be saved. The mountain in front of him, whatever was standing between him and the completion of the assignment, would become a plain. Not by force. Not by resource. Not by strategy alone. By the Spirit. Black women who have been trying to move mountains through sheer willpower and running out of strength, this word is the redirection. You were not designed to move it alone. The Spirit moves it.",
      themes:"Zechariah is a vision-saturated book that ends with the capstone going in with shouts of grace, grace to it. The shout is not triumph. It is acknowledgment, that what was built was built by grace, through the Spirit, not through human power. The Black church has always shouted from this posture: not pride of achievement but awe at what God did through vessels that should not have been able to carry it. Grace, grace to it is the theology of every Black woman who finished something that should have finished her first.",
      prayer:"God whose Spirit accomplishes what might and power cannot, I stand before the mountain in my life and I give it to you. I have been trying to move it by force of will and personal determination and the mountain has not moved. Not by my might. Not by my power. By your Spirit. I release the mechanism. I trust the Spirit. And I receive the vision: the top stone goes in. What was started gets finished. There will be shouts of grace, grace to it, because it was grace that started it and grace that sustained it and grace that brought it to completion. I participate in what you are doing. I do not generate what only you can generate. Move the mountain. Let me help build what you are building after it moves. Amen.", carry:"Not by might, nor by power, but by my Spirit. Name the thing you have been trying to move by force. Then release it to the Spirit, specifically, in prayer, with words. Ask him to move it." },

    "Malachi": { ref:"Malachi 3:10", title:"Test Me in This", lede:"Test me in this, says the Lord. See if I will not open the windows of heaven.",
      scripture:`<p><span class="vnum">7</span>"Return to me, and I will return to you," says the Lord of Hosts. "But you ask, 'How shall we return?' <span class="vnum">8</span>Will a man rob God? Yet you are robbing me. But you say, 'How have we robbed you?' In your tithes and contributions. <span class="vnum">10</span>Bring the full tithe into the storehouse, that there may be food in my house. And thereby put me to the test, says the Lord of hosts, if I will not open the windows of heaven for you and pour down for you a blessing until there is no more need."</p>`,
      author:"Malachi, no other information known, the name means 'my messenger'", when:"BC 450-430", where:"Post-exile Jerusalem", audience:"A community whose worship had become corrupt and mechanical",
      context:"Malachi is the last book of the Old Testament. He was writing to a community that had returned from exile, rebuilt the temple, and resumed religious practice, but whose practice had become hollow. The priests were offering blind and lame animals. The people had stopped tithing. Marriages were treated carelessly. Malachi's confrontation is intimate: return to me and I will return to you. Then, in one of the only places in Scripture where God invites being tested: try it. Open the storehouse. See what I do. After Malachi, four hundred years of prophetic silence. The next voice is John the Baptist.",
      keyTerms:[{script:"בָּחַן",word:"bachan",lang:"Hebrew",gloss:"to test, to prove by trial, an invitation to verify what God is claiming by doing the thing",note:"Put me to the bachan. God is not asking for blind faith here. He is asking for an experiment. Try it. Do the thing and see what I do."}],
      relatable:"Return to me and I will return to you. God said this to a community that had resumed all the external forms of religion while the internal orientation had drifted. They were doing the motions. The offerings. The fasts. The temple attendance. God said: you have robbed me. Not in their absence. In their partial presence. The last prophet before four hundred years of silence is asking for the whole heart, not the performance of devotion. And he ends with a challenge: test me. Try returning all the way and see what I do.",
      themes:"Malachi is the last word of the Old Testament prophets before four centuries of silence. It ends not with condemnation but with an invitation. Return. Test me. The windows of heaven. This is a God who is still offering the covenant even at the last page of the Old Testament. The next voice will be John the Baptist in a desert. But Malachi's final word is not closure, it is an open door. Black women who have walked away from faith, who have been hurt by the institution, who have not been able to find their way back, Malachi says the door is still there.",
      prayer:"God who says return to me and I will return to you, I return. All the way. Not the partial return where I bring you the respectable portion and keep the rest at a safe distance. The full return. The financial area I have been managing without you. The relationship I have been navigating on my own terms. The calling I have been pursuing at my own pace on my own conditions. I bring it all. And I stand on your promise: test me in this. See if I will not throw open the floodgates of heaven. See if there will not be more blessing than I have room to contain. I am not testing you to prove a point. I am taking you at your word because you are the one who offered the test. Here I am. Returned. Fully. Amen.", carry:"Return to me and I will return to you. Name one place you have pulled back from God, one practice, one posture, one area of your life you have been keeping separate. Take one step back toward him today. He is already moving toward you." }
  };
  if (studies[book]) return studies[book];

  // Every remaining book gets a real key verse + graceful stub
  const stubs = {
    "Leviticus": { kv:"Leviticus 19:18", kvt:"You shall love your neighbor as yourself: I am the Lord." },
    "Numbers": { kv:"Numbers 6:24-26", kvt:"The Lord bless you and keep you; the Lord make his face shine on you and be gracious to you." },
    "Deuteronomy": { kv:"Deuteronomy 6:4-5", kvt:"Hear, O Israel: The Lord our God, the Lord is one. Love the Lord your God with all your heart and with all your soul and with all your strength." },
    "Judges": { kv:"Judges 6:12", kvt:"The Lord is with you, mighty warrior." },
    "1 Samuel": { kv:"1 Samuel 16:7", kvt:"The Lord does not look at the things people look at. People look at the outward appearance, but the Lord looks at the heart." },
    "2 Samuel": { kv:"2 Samuel 22:2-3", kvt:"The Lord is my rock and my fortress and my deliverer, my God, my rock, in whom I take refuge." },
    "1 Kings": { kv:"1 Kings 19:12", kvt:"After the fire came a still small voice." },
    "2 Kings": { kv:"2 Kings 20:5", kvt:"I have heard your prayer and seen your tears. I will heal you." },
    "1 Chronicles": { kv:"1 Chronicles 16:11", kvt:"Seek the Lord and his strength; seek his face always." },
    "2 Chronicles": { kv:"2 Chronicles 7:14", kvt:"If my people, who are called by my name, will humble themselves and pray and seek my face and turn from their wicked ways, then I will hear from heaven." },
    "Esther": { kv:"Esther 4:14", kvt:"And who knows but that you have come to your royal position for such a time as this?" },
    "Job": { kv:"Job 19:25", kvt:"I know that my redeemer lives, and that in the end he will stand on the earth." },
    "Song of Solomon": { kv:"Song of Solomon 2:4", kvt:"He has brought me to his banquet hall, and his banner over me is love." },
    "Lamentations": { kv:"Lamentations 3:22-23", kvt:"Because of the Lord's great love we are not consumed, for his compassions never fail. They are new every morning." },
    "Obadiah": { kv:"Obadiah 1:3-4", kvt:"The pride of your heart has deceived you." },
    "Micah": { kv:"Micah 6:8", kvt:"He has shown you, O mortal, what is good. And what does the Lord require of you? To act justly and to love mercy and to walk humbly with your God." },
    "Nahum": { kv:"Nahum 1:7", kvt:"The Lord is good, a stronghold in the day of trouble; and he knows those who take refuge in him." },
    "Zephaniah": { kv:"Zephaniah 3:17", kvt:"The Lord your God is in your midst, a Mighty One who will save. He will rejoice over you with singing." },
    "Haggai": { kv:"Haggai 2:4", kvt:"Be strong, all you people of the land, and work. For I am with you, declares the Lord Almighty." },
    "Zechariah": { kv:"Zechariah 4:6", kvt:"Not by might nor by power, but by my Spirit, says the Lord Almighty." },
    "Malachi": { kv:"Malachi 3:10", kvt:"Test me now in this, says the Lord of Armies, if I will not open you the windows of heaven and pour out a blessing." },
    "1 Thessalonians": { kv:"1 Thessalonians 5:16-18", kvt:"Rejoice always, pray without ceasing, give thanks in all circumstances; for this is the will of God in Christ Jesus for you." },
    "2 Thessalonians": { kv:"2 Thessalonians 3:3", kvt:"But the Lord is faithful, and he will strengthen you and protect you from the evil one." },
    "1 Timothy": { kv:"1 Timothy 4:12", kvt:"Don't let anyone look down on you because you are young, but set an example in speech, in conduct, in love, in faith and in purity." },
    "Titus": { kv:"Titus 2:7", kvt:"In everything set them an example by doing what is good." },
    "Philemon": { kv:"Philemon 1:7", kvt:"Your love has given me great joy and encouragement, because you, brother, have refreshed the hearts of the Lord's people." },
    "2 Peter": { kv:"2 Peter 1:3", kvt:"His divine power has given us everything we need for a godly life through our knowledge of him." },
    "2 John": { kv:"2 John 1:6", kvt:"And this is love: that we walk in obedience to his commands." },
    "3 John": { kv:"3 John 1:4", kvt:"I have no greater joy than to hear that my children are walking in the truth." },
    "Joel": { kv:"Joel 2:28", kvt:"I will pour out my Spirit on all flesh; your sons and your daughters shall prophesy." }
  };

  const s = stubs[book];
  const kv = s ? s.kv : `${book} 1:1`;
  const kvt = s ? s.kvt : `Open your Bible to ${book} and read.`;

  return {
    ref: kv, title: book, lede: kvt,
    scripture: `<div style="padding:var(--s5) 0">
      <blockquote style="font-family:var(--serif);font-style:italic;font-size:clamp(20px,2.5vw,28px);line-height:1.55;color:var(--ink);font-weight:400;padding:var(--s4);border-left:3px solid var(--amber);margin:0 0 var(--s4)">

    themes:`Full thematic study for ${book} coming.`,
    prayer:`God, open ${book} to me. Let me not just read the words but receive what you are saying through them. Amen.`
  };
}

function openMoreSheet() {
  document.getElementById('more-overlay').classList.remove('hidden');
}
function closeMoreSheet() {
  document.getElementById('more-overlay').classList.add('hidden');
}

function enterApp() {
  document.getElementById('entry').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  goTo('home');
}

function goTo(route) {
  // Update desktop nav
  document.querySelectorAll('[data-nav]').forEach(el => {
    el.classList.toggle('active', el.dataset.nav === route);
  });
  // Update mobile tab bar
  const tabMap = {
    home:'home', study:'study',
    women:'women', grandmothers:'women', aunties:'women', homegirls:'women',
    prayers:'prayers', identity:'identity',
    pen:'home', authors:'home', about:'home', posture:'prayers'
  };
  document.querySelectorAll('[data-tb]').forEach(el => {
    el.classList.toggle('active', el.dataset.tb === (tabMap[route]||route));
  });
  const main = document.getElementById('main');
  main.innerHTML = '';
  const page = document.createElement('div');
  page.className = 'page';
  const renders = {
    home:renderHome, study:renderStudy, women:renderWomen,
    grandmothers:renderGrandmothers, aunties:renderAunties, homegirls:renderHomegirls,
    prayers:renderPrayers, identity:renderIdentity, pen:renderPen,
    authors:renderAuthors, about:renderAbout
  };
  (renders[route]||renderHome)(page);
  main.appendChild(page);
  document.querySelector('.scroll-view').scrollTop = 0;
}

function openModal(html) {
  const card = document.getElementById('modal-card');
  card.innerHTML = '<div class="modal-handle"></div><button class="modal-close" onclick="closeModal()">&times;</button>' + html;
  document.getElementById('modal').classList.remove('hidden');
}
function closeModal() { document.getElementById('modal').classList.add('hidden'); }
function handleModalClick(e) { if (e.target === document.getElementById('modal')) closeModal(); }

function openSearch() { document.getElementById('search-overlay').classList.remove('hidden'); document.getElementById('search-input').focus(); }
function closeSearch() { document.getElementById('search-overlay').classList.add('hidden'); document.getElementById('search-input').value = ''; document.getElementById('search-results').innerHTML = ''; }

function runSearch(q) {
  q = q.trim().toLowerCase();
  const res = document.getElementById('search-results');
  if (!q) { res.innerHTML = ''; return; }
  const hits = [];
  [...GRANDMOTHERS,...AUNTIES,...HOMEGIRLS].forEach(w => {
    if ((w.name||'').toLowerCase().includes(q)||(w.tag||'').toLowerCase().includes(q)) {
      const grp = GRANDMOTHERS.find(g=>g.id===w.id)?'grandmother':AUNTIES.find(a=>a.id===w.id)?'auntie':'homegirl';
      hits.push({type:'Woman',title:w.name,meta:w.tag,fn:`closeSearch();openWomanModal('${grp}','${w.id}')`});
    }
  });
  PRAYERS.forEach(p => {
    if ((p.title||'').toLowerCase().includes(q)||(p.theme||'').toLowerCase().includes(q))
      hits.push({type:'Prayer',title:p.title,meta:p.theme,fn:`closeSearch();openPrayerView('${p.id}')`});
  });
  IDENTITY.forEach(i => {
    if ((i.decl||'').toLowerCase().includes(q))
      hits.push({type:'Identity',title:i.decl,meta:i.ref,fn:`closeSearch();openIdentityModal('${i.n}')`});
  });
  AUTHORS.forEach(a => {
    if ((a.name||'').toLowerCase().includes(q))
      hits.push({type:'Author',title:a.name,meta:a.tag,fn:`closeSearch();openAuthorModal('${a.id}')`});
  });
  res.innerHTML = hits.slice(0,12).map(h=>`
    <div class="sr-item" onclick="${h.fn}">
      <div class="sr-type">${h.type}</div>
      <div class="sr-title">${h.title}</div>
      <div class="sr-meta">${h.meta||''}</div>
    </div>`).join('') || '<div style="padding:24px 0;font-family:var(--serif);font-style:italic;color:var(--muted)">Nothing found.</div>';
}

  function studyRows(books) {

function filterStudies(q) {
  q = q.toLowerCase();
  document.querySelectorAll('.study-row').forEach(row => {
    const text = row.textContent.toLowerCase();
    row.style.display = text.includes(q) ? '' : 'none';
  });
  document.querySelectorAll('.study-testament').forEach(section => {
    const visible = section.querySelectorAll('.study-row:not([style*="none"])');
    section.style.display = visible.length ? '' : 'none';
  });
}

function switchTab(btn, panelId) {
  btn.closest('.page').querySelectorAll('.sv-tab').forEach(t=>t.classList.remove('active'));

}

  page.innerHTML = `
    <div class="page-hero">
      <div class="hero-label hero-label-amber">The Writers</div>
      <h1 class="hero-title">Authors</h1>
    </div>
    <p class="hero-intro">None of them had institutional permission to speak for God. Several actively argued against the assignment. God called them anyway, not because of their credentials but because of their access to specific pain, specific joy, specific truth. That is still how it works.</p>

    <div class="authors-divider">
      <span class="authors-divider-label" style="color:var(--amber)">Old Testament</span>
      <div class="authors-divider-line"></div>
      <span style="font-family:var(--sans);font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted-3)">${ot.length} Writers</span>
    </div>

    ${moses ? featured(
      moses,
      'var(--amber)',
      'Foundation · Law · Covenant',
      'God spoke to Moses face to face, the way a person speaks to a friend. He did not start as a leader. He started as a man with a criminal record and a stutter who had been running from his own identity for forty years.',
      'His story is the story of every Black woman who has been told she is too broken, too much, too disqualified, and then called anyway. The burning bush did not ask him to get himself together first.'
    ) : ''}

    ${otRest.map(a=>cast(a,'var(--amber)','rgba(168,109,30,.3)')).join('')}

    <div class="authors-divider" style="margin-top:var(--s5)">
      <span class="authors-divider-label" style="color:var(--terra)">New Testament</span>
      <div class="authors-divider-line"></div>
      <span style="font-family:var(--sans);font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted-3)">${nt.length} Writers</span>
    </div>

    ${paul ? featured(
      paul,
      'var(--terra)',
      'Apostle · Theologian · Letter Writer',
      'Paul wrote thirteen books of the New Testament from inside prison cells, under house arrest, and in chains. He wrote about freedom. He wrote about joy. He wrote about peace that passes understanding while the empire was deciding what to do with him.',
      'The Black church was built on those letters. Women who had every reason to abandon hope memorized them, sang them, and passed them to their daughters. He wrote in captivity for people in captivity. That is not a coincidence.'
    ) : ''}

    ${ntRest.map(a=>cast(a,'var(--terra)','rgba(140,53,32,.3)')).join('')}
  `;
}

function openAuthorModal(id) {
  const a = AUTHORS.find(x=>x.id===id);
  if (!a) return;
  const ntIds = ['jesus-entry','matthew','mark','luke','john','peter','james','paul','jude'];
  const accent = ntIds.includes(a.id) ? 'var(--terra)' : 'var(--amber)';
  const story = (a.story||'').split('\n\n').map(p=>`<p style="margin-bottom:var(--s2)">${p}</p>`).join('');
  openModal(`
    <div style="border-top:3px solid ${accent}">
      <div style="padding-top:var(--s3)">
        <div style="font-family:var(--sans);font-size:var(--label);letter-spacing:.22em;text-transform:uppercase;color:${accent};margin-bottom:var(--s2)">${a.era||''}</div>
        <div style="font-family:var(--serif);font-size:clamp(38px,9vw,56px);font-weight:400;line-height:.97;letter-spacing:-.025em;color:var(--ink);margin-bottom:4px">${a.name}</div>
        <div style="font-family:var(--serif);font-style:italic;font-size:var(--body-lg);color:var(--muted);margin-bottom:var(--s3)">${a.tag}</div>
        ${a.connection?`<div style="font-family:var(--sans);font-size:var(--label);letter-spacing:.15em;text-transform:uppercase;color:var(--muted-2);margin-bottom:var(--s3)">${a.connection}</div>`:''}
        <div style="height:1px;background:var(--border);margin-bottom:var(--s3)"></div>
        <div style="font-family:var(--serif);font-size:var(--body-lg);line-height:1.8;color:var(--ink);margin-bottom:var(--s3)">${story}</div>
        ${a.bridge?`
        <div style="background:var(--surface);border-left:3px solid ${accent};border-radius:0 var(--r-sm) var(--r-sm) 0;padding:var(--s3);margin-top:var(--s3)">
          <div style="font-family:var(--sans);font-size:var(--label);letter-spacing:.22em;text-transform:uppercase;color:${accent};margin-bottom:var(--s2)">Why This Matters Now</div>
          <div style="font-family:var(--serif);font-size:var(--body-lg);line-height:1.8;color:var(--ink);overflow-wrap:break-word">${a.bridge}</div>
        </div>`:''}
        ${a.keyVerse?`<div style="margin-top:var(--s3);padding:var(--s3);background:var(--surface);border:1px solid ${accent}33;border-left:3px solid ${accent};border-radius:var(--r)">
          <div style="font-family:var(--sans);font-size:var(--label);letter-spacing:.2em;text-transform:uppercase;color:${accent};margin-bottom:var(--s1)">${a.keyVerse}</div>
          <div style="font-family:var(--serif);font-style:italic;font-size:var(--body-lg);color:var(--ink);line-height:1.7;overflow-wrap:break-word">${a.keyVerseText||''}</div>
        </div>`:''}
      </div>
    </div>
  `);
}

function renderPen(page) {
  let entries = []; try { entries = JSON.parse(localStorage.getItem('rooted_v2_pen')||'[]'); } catch(e) {}
  page.innerHTML = `
    <div class="sh-label">Writing</div>
    <h1 class="sh-title">The Pen</h1>
    <p class="sh-lede">This is your space. Saved on this device.</p>
    <div class="pen-tabs">
      <button class="pen-tab active" onclick="switchPenTab(this,'pen-write')">Write</button>
      <button class="pen-tab" onclick="switchPenTab(this,'pen-saved')">Saved</button>
    </div>
    <div id="pen-write">
      <textarea class="pen-area" id="pen-text" placeholder="What are you carrying today?"></textarea>
      <button class="pen-save" onclick="savePenEntry()">Save →</button>
    </div>
    <div id="pen-saved" style="display:none">
      <div class="pen-entries">
        ${entries.length===0?'<div style="font-family:var(--serif);font-style:italic;color:var(--muted-3);padding:var(--s3) 0">Nothing saved yet.</div>':entries.map(e=>`<div class="pen-entry"><div class="pe-date">${e.date}</div><div class="pe-body">${e.text}</div></div>`).join('')}
      </div>
    </div>
  `;
}

function switchPenTab(btn, panelId) {
  btn.closest('.page').querySelectorAll('.pen-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  ['pen-write','pen-saved'].forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById(panelId).style.display='block';
}

function savePenEntry() {
  const text = document.getElementById('pen-text').value.trim();
  if (!text) return;
  try {
    let entries = []; try { entries = JSON.parse(localStorage.getItem('rooted_v2_pen')||'[]'); } catch(e) {}
    entries.unshift({date: new Date().toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric'}), text});
    localStorage.setItem('rooted_v2_pen', JSON.stringify(entries.slice(0,100)));
  } catch(e) { /* localStorage unavailable */ }
  document.getElementById('pen-text').value = '';
  goTo('pen');
}

/* ============================================================
   ABOUT
   ============================================================ */
function renderAbout(page) {
  page.innerHTML = `
    <div class="sh-label">About</div>
    <h1 class="sh-title">Rooted</h1>
    <div class="sh-intro">
      <p>A Bible study companion for Black women who take the Word seriously and bring their whole selves to it. Ratchet and righteous. Holy and fully themselves.</p>
    </div>
    <div style="font-family:var(--serif);font-size:var(--body-lg);line-height:1.8;color:var(--ink)">
      <p style="margin-bottom:var(--s2)">Today is your daily anchor. Study opens every book of the Bible. The Grandmothers are the five women Matthew named in the genealogy of Jesus. The Aunties survived their way to wisdom and passed something irreplaceable forward. The Homegirls were already moving.</p>
      <p>Prayers is a library of thirty prayers organized by what you are carrying. Identity is fifty declarations grounded in Scripture. The Pen is your private writing space.</p>
    </div>
  `;
}

  // Auto-enter on desktop for easier testing
  if (window.innerWidth >= 768) enterApp();
});
