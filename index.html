const PRAYERS = [
  { id:"surrender", theme:"Surrender", title:"The Prayer of Open Hands",
    opening:"God, I ask that you would meet me right where I am, in transparency...",
    full:"God, I ask that you would meet me right where I am, in transparency, in vulnerability, and in authenticity, that you would meet me in this moment and that you would not leave me the same. Do not pacify my dysfunction and do not bring people in my life who will do the same. Instead call me up. Call me higher so that you would elevate my perspective and elevate my thinking that I become all that you have called me to be. Make me sensitive so that you would have your way. Have your way in my life. Let this not just be a moment that took place, but let there be seed in the ground so that it multiplies in my life. Let there be fruit upon fruit upon fruit. God take my seed, cover it, nourish it, protect it. This is the blessing that you have given me that I almost gave up on, but because of your word, I put it back in the ground and I covered it with your love, with your blood, and I pray for it to prosper. Amen." },
  { id:"increase", theme:"Increase", title:"The Prayer of Die Empty",
    opening:"God, I ask that you help me dig down and pull out the gifts, talents, ideas...",
    full:"God, I ask that you help me dig down and pull out the gifts, talents, ideas, wisdom, and discipline that honestly does not come naturally because you have called me and given me an opportunity to see increase. God I lift my hands in surrender and I say search me Lord. Search me and help me reveal miracles I have left behind because I was too afraid to challenge myself. Help me see miracles left laying dormant because I was not actually sure I could lay hold of your unnecessary miracles. Yes, I am doing okay, but God I want to die empty. I want to live on the edge of grace and I want to live meeting you each and every day. God, do not let me get so comfortable in my life that I miss being desperate for you. Lord, for my purpose to which you have called, feed me so that I may feed others. Let those with whom I am connected be better because of me. I am asking that you break open the windows of heaven to create it right now in the name of Jesus. I make a demand on the anointing that is inside of me and I say overflow in the name of Jesus. I rebuke insecurity. I rebuke inadequacy. I rebuke loneliness. I rebuke hurt. I rebuke and refute anything that would make me believe that I am anything other than caught up for you. I bind it up and I send it back so that the only thing that stands is your righteousness, your purpose, your glory. Fill me with your glory Lord and let me go from this level of glory to another level of glory and from that level of glory to the next. I want to die empty. Thank you for making all my weaknesses, all of my fears, all of me victorious. Order my steps. Give me wisdom and focus me to feed everything connected to me. Amen." },
  { id:"protection", theme:"Protection", title:"The Prayer of Covering",
    opening:"God, I ask you to cover every threshold of my life...",
    full:"God, I ask you to cover every threshold of my life. Every door I walk through. Every room I sit in. Every conversation I enter. Cover my mind from what is not for me. Cover my spirit from what is trying to attach to what you have placed on the inside of me. I ask that you post angels around what you have given me. Not because I earned it, but because you declared it. I am not asking for a life without opposition. I am asking for protection strong enough to outlast whatever is coming against me. Let no weapon formed against me prosper. Let every tongue that rises against me in judgment be shown as a liar. This is my inheritance. This is what you promised. I am standing on it. Cover me. Cover mine. Let what you have assigned to me be safe in your hands while I am doing the work. And let the work be protected too. In the name of Jesus. Amen." },
  { id:"grief", theme:"Grief", title:"The Prayer from the Broken Place",
    opening:"God, I am not okay. I need you to know that first...",
    full:"God, I am not okay. I need you to know that first. I am not performing recovery. I am not presenting the version of me that has it together. I am bringing you the version that is sitting on the floor because standing is too much right now. You said you are near to the brokenhearted. I am counting on that. I cannot feel you right now but I am choosing to believe it anyway because your word says it and your word does not lie. Comfort me the way only you can. Not the way that makes the grief go away before I am ready. The way that says I am with you inside it. I am not alone. Even here. Even in this. Even with this much weight in my chest. You are near. You see me. You are not looking away. That is enough to keep moving. Amen." },
  { id:"identity-prayer", theme:"Identity", title:"The Prayer of Who I Am",
    opening:"God, tell me again who I am. Because the world has a different version...",
    full:"God, tell me again who I am. Because the world has a different version. And some days I am tired of fighting to hold onto yours. Tell me again that I am not a mistake, that I was not an accident, that what I carry is not too heavy for the assignment you gave it to. Tell me again that the way I love, the way I think, the way I was made, that all of it is intentional. That nothing about me is extra and nothing about me needs to be hidden. I renounce the agreement I have been making with the voices that said otherwise. I come out of agreement with every word that told me I was too much or not enough or that the door was not for me. I receive what you say. I am fearfully and wonderfully made. I am chosen. I am called. I am covered. I am not defined by what happened to me or what I did or what was done in my name without my consent. I am defined by what you say. Say it again today. I am listening. Amen." },
  { id:"purpose", theme:"Purpose", title:"The Prayer of Send Me",
    opening:"God, I have been waiting for the plan. I have been asking you to show me...",
    full:"God, I have been waiting for the plan. I have been asking you to show me the full picture before I moved. And I think I have been confusing caution with faithfulness. So today I am saying: here I am. Send me. I do not need to see where the road goes before I take the first step. I trust you enough to move. Activate what you have placed inside me. What has been lying dormant because I was afraid, wake it up. What I have been making excuses about, cut through the excuses. I do not want to get to the end of my life and discover that I played it safe when you were asking me to play it surrendered. Give me the courage that is not the absence of fear but the decision to move anyway. Let the work I do outlast me. Let my children have fruit from this seed. Let what I build be for more than just me. I am available. I am ready. I am yours. Send me. Amen." },
  { id:"healing", theme:"Healing", title:"The Prayer for What My Body Is Carrying",
    opening:"God, I am bringing you what medicine has not fixed and what my own will cannot force...",
    full:"God, I am bringing you what medicine has not fixed and what my own will cannot force into order. You said you are the Lord who heals. I am asking for that now, not just for my body but for what this has done to my spirit, to my sense of what is possible, to my relationship with my own flesh. I am asking for healing that is complete, not just managed. I know you are not intimidated by the complexity of what I am carrying. You made every cell that is working against me right now, and you can speak to it. I am not asking because I have earned a miracle. I am asking because you are good and because your word says by his wounds we are healed. I stand on that. I receive that. Do what only you can do. I trust you with the how and the timing. I trust that you see what I cannot see. Heal me. Wholly. In the name of Jesus. Amen." },
  { id:"wisdom", theme:"Wisdom", title:"The Prayer of James 1:5",
    opening:"God, I need to know what to do. Not eventually. Now...",
    full:"God, I need to know what to do. Not eventually. Now. You said if any of us lacks wisdom, ask, and you give generously to all without finding fault. So I am asking. Not for a sign. Not for a feeling. For clarity. For the specific wisdom that applies to this specific situation I am in. I do not need general wisdom right now, I need the answer to the question I am actually holding. You know what it is. You know the stakes. You know what I have already tried. I am not here because I have exhausted all my options. I am here because you are the only one who actually knows. Give me wisdom. The kind that is from above, pure, peaceable, gentle, willing to yield. Give me wisdom without the cost of my dignity or my peace. I will act on what you show me. I will not wait for certainty I was never promised. I will move when you move. Show me the way. Amen." },
  { id:"peace", theme:"Peace", title:"The Prayer of Philippians 4",
    opening:"God, my mind will not settle. I have been rehearsing this over and over...",
    full:"God, my mind will not settle. I have been rehearsing this over and over, the scenario, the conversation, the outcome, the worst case, the next version of the worst case. You said be anxious about nothing and I want to receive that. I am asking for the peace that transcends understanding. Not the peace that comes when I figure it out. The peace that stands watch while I still do not have the answer. Guard my heart. Guard my mind. The word you used is military, a garrison. I need that kind of protection over my thoughts right now. I am choosing to bring this to you instead of carrying it further by myself. I lay it down. I present it to you. I hand you what my hands were never designed to hold. And I ask for the peace that proves you are here. Let my mind settle. Let my body follow. Let me sleep tonight knowing you have not looked away. Amen." },
  { id:"provision", theme:"Provision", title:"The Prayer for What I Cannot See From Here",
    opening:"God, the numbers do not add up from where I am standing...",
    full:"God, the numbers do not add up from where I am standing. What I have does not meet what I need and I have done everything I know to do and it is still not enough. I am bringing you the gap. You said you would supply all my needs according to your riches in glory by Christ Jesus. You said seek first the kingdom and all these things will be added. I am seeking. I am trusting. I am asking you to show up in the gap in a way that is unmistakably you. I do not want just enough to survive. I want the overflow that lets me be generous, that lets me be free, that lets me live without the constant pressure of scarcity. Open windows of heaven. Release what has been held back. Make a way in the wilderness and rivers in the desert. You have done it before and you are the same God. I trust your provision over my plan. Come through. Amen." },
  { id:"strength", theme:"Strength", title:"The Prayer for the Long Season",
    opening:"God, I am tired in a way that sleep does not fix...",
    full:"God, I am tired in a way that sleep does not fix. This season has gone longer than I expected and I have been faithful but I am running on fumes. You said they who wait on the Lord will renew their strength. They will soar on wings like eagles. They will run and not grow weary. I am asking for that renewal right now, not at the end of this but in the middle of it. I do not have the luxury of waiting until I feel strong to keep going. I need strength for today and then again for tomorrow and then again for the day after that. Do not let me burn out on work that you assigned. Sustain me. Replenish what this season has drawn from me. Let my serving be sustainable, not self-destructive. And let me know the difference between the tiredness that means I need rest and the resistance that means I need to press through. Give me the discernment to know which this is and the grace to respond accordingly. Renew me. Amen." },
  { id:"waiting", theme:"Waiting", title:"The Prayer of the In-Between",
    opening:"God, you have not moved yet and I do not fully understand why...",
    full:"God, you have not moved yet and I do not fully understand why. I have prayed. I have waited. I have tried to be faithful. And the answer is still not here. I am asking for the grace to trust you in the in-between. Not the grace to stop asking, I will keep asking. But the grace to not become bitter while I wait. The grace to not build a life around the gap where the answer should be. The grace to stay open to how you might be working in ways I cannot currently see. Habakkuk said: even if it does not come, yet I will rejoice in the Lord. I want to mean that. I want to hold my hope without clenching it so hard it cuts me. I want to live forward into what you said while waiting for the thing you have not yet done. Help me wait well. Help me hope without despair. And when the time comes, let me recognize it. Amen." },
  { id:"forgiveness", theme:"Forgiveness", title:"The Prayer of Starting Over",
    opening:"God, I did something I cannot take back. Or someone did something to me I cannot excuse away...",
    full:"God, I did something I cannot take back. Or someone did something to me I cannot excuse away. Either way, I am in the middle of something that requires forgiveness and I do not have it in me to manufacture it on my own. For myself: I ask that you would help me receive what Christ already did. Not to minimize what happened but to stop paying a debt that has already been cleared. I cannot keep living under the weight of this. I ask for the genuine release that only comes from you. For others: I ask for the specific grace to forgive something that does not deserve forgiveness, because that is what forgiveness is. Not the feeling first. The decision to release. Help me make the decision even when the feeling has not arrived yet. And if what was done to me requires consequence for someone else, I leave that with you. You are the just judge. I release the outcome. I release the right to make them pay. I keep my peace. Amen." },
  { id:"morning", theme:"Morning", title:"The Prayer Before the Day Begins",
    opening:"God, this is the day you have made. I am choosing to rejoice in it even before I know what it holds...",
    full:"God, this is the day you have made. I am choosing to rejoice in it even before I know what it holds. Before the notifications. Before the responsibilities. Before the meetings and the demands and the inevitable surprises. I am giving you the first of today. Order my steps. Let the work I do today matter. Let what I say today build and not destroy. Let the people I encounter today leave better than they found me. I am asking for clarity of mind and steadiness of spirit. I am asking for the discernment to know what is urgent and what is important and how to tell the difference. Guard me from distraction and from my own capacity to undermine what you are building. This day belongs to you. I will work in it as someone who believes that. Cover me. Go before me. I will follow your lead. Amen." },
  { id:"intercession", theme:"Intercession", title:"The Prayer for the Ones I Love",
    opening:"God, there are people I love that I cannot protect, cannot fix, cannot reach...",
    full:"God, there are people I love that I cannot protect, cannot fix, cannot reach. I have said everything I know how to say. I have done everything I know how to do. And they are still in the middle of something I cannot pull them out of. So I am coming to you. I am placing them in front of you by name: the ones who are lost, the ones who are hurting, the ones who are sick, the ones who have drifted, the ones who do not know you yet. You know what each of them needs in a way I cannot access. You can reach places I cannot. You can do in them what I have no power to do. I am asking you to move. Go after them. Do not let them go. Let your goodness and mercy follow them relentlessly. And where I am tempted to give up on them, remind me that you have not. Hold them until they can hold on for themselves. In the name of Jesus. Amen." },
  { id:"courage", theme:"Courage", title:"The Prayer for What Scares Me",
    opening:"God, there is something I am supposed to do that I am afraid to do...",
    full:"God, there is something I am supposed to do that I am afraid to do. I know what it is. You know what it is. I am not pretending not to know. I have been circling it for a while, sometimes coming close and then pulling back. Today I am asking you to give me the specific courage for the specific thing that is in front of me. Not general bravery. The specific grace to do this specific hard thing. You did not give me a spirit of fear. What is standing between me and obedience does not come from you. I am refusing it. I am asking for the courage that is not the absence of fear but the presence of your voice louder than the fear. Let me hear you clearly. Let what you say be stronger than what I feel. And when I take the step, let me know I am not taking it alone. You go before me. You stand behind me. There is nowhere I go that you have not already been. I can do this. You said I could. Amen." },
  { id:"clarity", theme:"Clarity", title:"The Prayer for the Fog",
    opening:"God, I have been trying to see and I cannot see...",
    full:"God, I have been trying to see and I cannot see. The options all look the same. The path is not clear. I do not know which direction is yours and which is just mine in disguise. I am asking for the specific clarity I need for the specific decision I am holding. Not everything at once. Not the whole plan. Just the next step. Your word is a lamp for my feet, not a floodlight for the whole road. I can work with that. One step. Show me one true thing and I will move. And while I wait for clarity, help me be still without being paralyzed. Help me trust that you are working on the answer even when I cannot see the work. You are not withholding clarity to punish me. You are preparing me for what the clarity will require. I receive that. I wait on your timing. Clear my mind so I can hear you. Amen." },
  { id:"relationships", theme:"Relationships", title:"The Prayer for What I Cannot Fix Between Us",
    opening:"God, this relationship is broken and I have done everything I know to do...",
    full:"God, this relationship is broken and I have done everything I know to do and it is still not right. I cannot force someone else to want what I want. I cannot make them choose differently. I cannot go back and undo what was done. What I can do is come to you. I am asking for wisdom about whether to keep working on this or whether this is one that has run its course. I am asking for peace that is not dependent on the other person changing. I am asking for the grace to hold appropriate boundaries without becoming hard. And for whoever is on the other side of this, I am releasing them from my hands and placing them in yours. What I need from them, I ask you to meet another way. What they need from me, I ask you to show me if it is mine to give. Heal what can be healed. Release what needs to be released. And let me come out of this more whole, not less. Amen." },
  { id:"dry-season", theme:"Dry Season", title:"The Prayer When I Cannot Feel You",
    opening:"God, I have shown up and I cannot feel you. The word is not landing. The prayer feels like it is going nowhere...",
    full:"God, I have shown up and I cannot feel you. The word is not landing. The prayer feels like it is going nowhere. The closeness I used to have does not feel available right now and I do not know exactly what I did to get here or how to get back. I am bringing you the honesty of it. Asaph did. David did. Jeremiah did. They did not pretend the distance was not real. They named it and they kept going anyway. So I am naming it. I do not feel you. And I am choosing to believe you are here anyway because your word is more reliable than my feelings. This is not a crisis of faith. This is a season. You are not punishing me. You are not absent. You are not finished with me. I am going to stay at the table even when the feast does not feel like it is being served. You said you would never leave. I am counting on that right now more than I am counting on anything I can feel. Meet me here. Amen." },
  { id:"gratitude", theme:"Gratitude", category:"In relationship with God", title:"The Prayer of Overflow",
    opening:"God, today I come with thanksgiving and nothing else...",
    full:"God, today I come with thanksgiving and nothing else. No request. No list. No need that has to be addressed before I can get to the thank you. Just gratitude. You have been faithful when faithfulness was not the easy choice. You have been consistent when I have been anything but. You have held things together that had no business staying together. You have done it again.\n\nI do not want to be someone who only comes with a list and forgets the one who makes the list possible. I am grateful for what you have done. I am grateful for what you did not let happen. I am grateful for the prayers you answered yes and for the ones you answered differently than I asked because you could see what I could not. I am grateful for the people you put around me and the ones you removed.\n\nYou have been good to me. All the way through the hard parts. All the way through the seasons I did not understand. All the way through the moments I almost lost faith in what you were doing. You were working the whole time. I can see that now.\n\nLet my life be a thank you. Not just words but the way I carry myself, the generosity I walk in, the openness I have toward people because I know what it is to be given something I did not deserve. Let gratitude change how I live, not just how I pray.\n\nYou are worthy of all of it. Thank you. Amen." },
  { id:"transition", theme:"Transition", category:"For the long game", title:"The Prayer for the Space Between",
    opening:"God, I am in the middle of a transition and I cannot see the other side from here...",
    full:"God, I am in the middle of a transition and I cannot see the other side from here. What I was is already behind me and what I am becoming has not fully arrived yet. I am standing in the space between and it does not feel like anything I would choose.\n\nBut I know that you work in transitions. You met Abraham on the road when he did not know where he was going. You went with Israel through the wilderness, the space between Egypt and the promised land. You were present in the tomb on Saturday before the resurrection on Sunday. The in-between is not a place you abandon. It is a place you inhabit.\n\nSo I am asking you to meet me here. In the discomfort of not knowing. In the grief of what is ending. In the uncertainty of what is beginning. Help me not to rush past the transition trying to get to the other side, because you are doing something in me right now that only happens in the middle.\n\nGive me grace for the pace of this. Give me clarity when I need it. Give me the courage to let go of what I am trying to hold onto from the last season because I am afraid of what comes next. And let me arrive at what is next as someone who was formed by the crossing, not just moved through it.\n\nYou know the destination. I trust you with the route. Amen." },
  { id:"comfort", theme:"Comfort", category:"When you are hurting", title:"The Prayer for When Nothing Helps",
    opening:"God, I have tried everything that is supposed to help and I still hurt...",
    full:"God, I have tried everything that is supposed to help and I still hurt. I have talked about it. I have prayed about it. I have rested and moved my body and reached out to people. And I still hurt.\n\nSo I am not bringing you a strategy right now. I am bringing you the ache. The specific, persistent, this-will-not-lift ache that I have been carrying and pretending is getting better when it is not.\n\nYou called yourself the Father of compassion and the God of all comfort. Not some comfort. All comfort. That means there is no category of human pain that falls outside what you can meet. I am asking you to meet this one. The specific one I am holding right now that I did not name out loud but that you already know.\n\nComfort me not the way that tells me to be stronger or move faster or put it in perspective. The way that sits with me inside it. The way that is present without needing me to perform healing I have not received. The way that says: I see this. I am here. You are not alone in it.\n\nLet me feel that today. Not as a concept. As a presence. I need you to be near right now. In the name of Jesus, come close. Amen." },
  { id:"hope", theme:"Hope", category:"For the becoming", title:"The Prayer for What I Can Barely Believe",
    opening:"God, the hope is not gone but it is very small right now...",
    full:"God, the hope is not gone but it is very small right now. It is the kind of hope that has been disappointed before and is trying to protect itself by not expecting too much. I know what it felt like to believe fully and then watch the thing I believed in not happen on the timeline I expected. And it made me careful about hoping again.\n\nBut I do not want to be a person who stopped hoping. I do not want the protection from disappointment to cost me the thing that keeps me moving forward. Hope is the thing that makes the next step make sense. And I still need to take the next step.\n\nSo I am asking for a restoration of hope that is not naive but is real. Not hope based on circumstances being favorable but hope based on who you are. You said that hope does not disappoint because God's love has been poured into our hearts. The hope is grounded in your love, not in the outcome.\n\nHelp me hope again. Help me believe again that what you said is true even after the seasons that tried to talk me out of it. Help me hold the small, careful hope I have right now and tend it into something stronger. I am not pretending the disappointment did not happen. I am choosing to hope in you anyway.\n\nYou are still faithful. That has not changed. Amen." },
  { id:"grace", theme:"Grace", category:"In relationship with God", title:"The Prayer of Undeserved",
    opening:"God, I need grace today. Not generically. Specifically. For this...",
    full:"God, I need grace today. Not generically. Specifically. For this version of me that is showing up imperfect and inconsistent and still asking for access to what I have not earned.\n\nI know what grace is. I have preached it, read it, received it before. But knowing the doctrine of grace and resting in it are two different things. And today I need to rest in it. I need to stop counting up what I have done wrong this week and applying it as evidence against my standing with you. Grace does not work that way. You do not keep a running tally that subtracts from what is available to me.\n\nPaul said your grace is sufficient. Not almost sufficient. Not sufficient if I bring enough faith alongside it. Sufficient. The word means it is more than enough for what I am facing. For what I am carrying. For what I have done and what I have left undone.\n\nI receive it. Not because I have become worthy of it but because you decided to give it before I was worthy. That is what makes it grace. Unmerited. Unearned. Unchanging.\n\nLet me live today from the freedom of someone who is loved without conditions. Let grace change how I treat myself, how I forgive myself, how I approach you without the weight of everything I think disqualifies me. You said to come boldly to the throne of grace. I am coming boldly today. Thank you for receiving me. Amen." },
  { id:"slowdown", theme:"Slowing Down", category:"In relationship with God", title:"The Prayer of Sabbath",
    opening:"God, I have been moving at a pace that was never sustainable...",
    full:"God, I have been moving at a pace that was never sustainable and I have been calling it faithfulness. I have been measuring my worth by my output and calling it discipline. I have been afraid to stop because stopping feels like falling behind.\n\nBut you rested on the seventh day. Not because you were tired. You rested because rest is part of the design. And I have been living as though the design does not apply to me. As though the Sabbath was for people with more time, less to do, fewer responsibilities.\n\nI am asking you to help me slow down. Not as a failure. Not as a retreat. As an act of trust, trusting that the work you have called me to will be sustained by you even when I stop working on it. Trusting that my value is not contingent on my productivity. Trusting that rest is not laziness; it is obedience.\n\nHelp me release what I cannot control by letting it sit for a day, or an hour, or ten minutes. Help me find you in the quiet instead of only finding you in the urgent. Help me be still long enough to know that you are God, not just know it intellectually but feel it in my body, in the settling of my nervous system, in the exhale that says: He has this.\n\nTeach me to rest like someone who is not afraid of what stops while I do. You made me for more than output. You made me for presence. Let me live in both. Amen." },
  { id:"loss", theme:"Loss", category:"When you are hurting", title:"The Prayer When Someone Is Gone",
    opening:"God, there is a specific absence in my life right now that nothing fills...",
    full:"God, there is a specific absence in my life right now that nothing fills. Not distraction. Not time. Not the well-meaning words of people who do not know what to say. There is a shape in my life where someone or something used to be and I do not know how to carry the weight of that empty space.\n\nI am bringing you the grief that does not have a clean ending. The kind that comes in waves at unexpected moments. The kind that makes ordinary things feel unbearable because they are reminders. I am not performing recovery I do not have. I am not pretending this is okay because faith is supposed to mean I handle it better.\n\nYou are the God who wept at Lazarus' tomb. You wept even though you knew you were about to raise him. That means you understand that grief is real and that the reality of resurrection does not erase the reality of loss. You hold both. Help me hold both.\n\nLet me grieve well. Not endlessly, but honestly. Not without hope, but without pretending hope means I have to stop hurting. And when I am ready, in your timing, not mine, begin the slow work of teaching me to carry the absence into a full life instead of organizing my whole life around it.\n\nYou hold what I have lost. And you hold me. That is enough for today. Amen." },
  { id:"discernment", theme:"Discernment", category:"For direction", title:"The Prayer for the Still Small Voice",
    opening:"God, there is too much noise and I cannot tell what is you...",
    full:"God, there is too much noise and I cannot tell what is you and what is my own anxiety dressed up in spiritual language. There are so many voices, including my own, telling me what I should do, what I should want, what the next step is. And I cannot tell anymore which one to trust.\n\nI am asking for the same gift you gave Elijah after the wind and the fire and the earthquake: the still small voice. The sound of sheer silence where you are. Help me get quiet enough to hear it. Help me stop filling the quiet with analysis and opinion and information and just listen.\n\nGive me the discernment to know the difference between my desires and your direction. The difference between my fear and genuine caution. The difference between what I want to be true and what is actually true. These can sound the same from the inside and I need your help to tell them apart.\n\nI do not need certainty for every step. I need the specific word for this specific moment. One thing. One step. One piece of clarity I can stand on. And then I will ask for the next one.\n\nSpeak, Lord. Your servant is listening. Amen." },
  { id:"identity2", theme:"Worth", category:"For the becoming", title:"The Prayer for When I Feel Small",
    opening:"God, I have been feeling small lately. Not humble, small...",
    full:"God, I have been feeling small lately. Not humble, small. There is a difference. Humility is seeing yourself accurately. Small is believing yourself to be less than what you actually are. I have been operating under a diminished sense of who I am and what I carry and I need you to correct it.\n\nI have been apologizing for taking up space. Shrinking so other people would be comfortable. Qualifying everything I say before I say it. Not trusting my own discernment. Second-guessing what I know. Asking for permission to be what I was already made to be.\n\nYou did not make me small. You made me specific. And the specificity of who I am, the way I think, the way I love, the way I carry what I carry, is not too much. It is not excessive. It is intentional.\n\nI am asking for a restoration of dignity that does not depend on anyone else recognizing it. The kind that comes from inside, from knowing whose I am and therefore who I am. The kind that lets me walk into a room without needing the room to validate me.\n\nHelp me take up exactly the space you gave me. No more. And absolutely no less. Amen." },
  { id:"anxiety2", theme:"Overwhelm", category:"For the long game", title:"The Prayer When Everything Is Too Much",
    opening:"God, I have too many open loops and not enough of me to close them...",
    full:"God, I have too many open loops and not enough of me to close them. There are too many things competing for my attention and too many responsibilities I am trying to hold at the same time and I have reached the end of my capacity to manage any of it well.\n\nI am not asking for less of a life. I am asking for the grace to carry the one I have without it crushing me. The capacity to be fully present in what I am doing instead of half-present in everything at once. The wisdom to know what actually needs my attention today versus what I am borrowing from the future to worry about right now.\n\nYou said your yoke is easy and your burden is light. Not no yoke. Easy. Which means the weight of what you have asked me to carry is manageable in you. The weight I am feeling right now includes things you did not assign to me. Help me identify and set down everything that is not my burden to carry in this season.\n\nGive me the peace that organizes. The clarity that prioritizes. The grace to do one thing at a time and trust that what is not done today is not lost, it is just tomorrow.\n\nOrder my chaos. Quiet my mind. Let me breathe. I can do this with you. I cannot do it without you. Amen." }
];

  "In relationship with God": ["surrender","morning","gratitude","grace","slowdown"],
  "For the becoming": ["identity-prayer","increase","strength","forgiveness","hope","identity2"],
  "For the long game": ["protection","provision","waiting","intercession","peace","anxiety2"]
};

const IDENTITY = [
  { n:"01", decl:"I am a child of God.", ref:"John 1:12",
    note:"To all who received him, to those who believed in his name, he gave the right to become children of God. The word is right, a legal standing, a covenant inheritance, a name that cannot be revoked. You were not adopted as a consolation. You were chosen before the foundation of the world and the paperwork is signed in blood.",
    forYou:"Where are you still relating to God as a stranger instead of a daughter?",
    prayer:"God, I receive this standing in full. Not as a guest. Not on probation. Not conditionally. I am your child. Everything that belongs to you belongs to me because of that. I walk in that today, into every room I enter. Amen." },

  { n:"02", decl:"I am Beloved.", ref:"Romans 8:38-39",
    note:"Nothing in all creation will be able to separate us from the love of God in Christ Jesus. Paul wrote that from a Roman prison cell. He had been beaten, shipwrecked, stoned, and abandoned by people he trusted. He meant every word. The love he was describing had been tested against the worst the world could do, and it held. It will hold for you.",
    forYou:"What do you keep believing might finally be the thing that makes God stop loving you?",
    prayer:"God, I receive the love that nothing can reach. Not my history. Not my failure. Not the diagnosis, the debt, the divorce, the thing I did that I have not said out loud. Nothing. Your love is not fragile and it is not conditional and it is for me specifically. I receive it. Amen." },

  { n:"03", decl:"I am Redeemed and Forgiven.", ref:"Ephesians 1:7",
    note:"In him we have redemption through his blood, the forgiveness of sins, in accordance with the riches of his grace. Redemption means bought back, something taken, something lost, something sold, returned to its original owner at great cost. The price was paid not reluctantly but out of the riches of his grace. God did not forgive you grudgingly. He redeemed you extravagantly.",
    forYou:"What are you still carrying that has already been paid for?",
    prayer:"God, I am not what was done to me and I am not what I have done. I am redeemed. The blood that bought me back was not a transaction, it was an act of abundance. I receive forgiveness in full and I will stop trying to earn what has already been given. Amen." },

  { n:"04", decl:"I am Chosen.", ref:"Ephesians 1:4",
    note:"He chose us in him before the creation of the world to be holy and blameless in his love. Before the world existed. Before your parents met. Before your ZIP code, your GPA, your tax bracket, your diagnosis. The choosing happened outside of time and none of the conditions that made you feel unchosen had any say in it.",
    forYou:"What room are you still waiting for permission to enter that God already put your name on?",
    prayer:"God, I was chosen before I had a chance to fail. Before I had a chance to be overlooked. Before the system had a chance to exclude me. I walk into every space today knowing I was already selected, not by the institution, not by the gatekeepers, but by you. Amen." },

  { n:"05", decl:"I am a Friend of God.", ref:"John 15:15",
    note:"I no longer call you servants, because a servant does not know his master's business. Instead, I have called you friends, for everything that I learned from my Father I have made known to you. Jesus moved you out of the category of employee and into the category of intimate. He tells you things. He includes you in what he knows. That is not a metaphor.",
    forYou:"Do you actually believe God wants to be close to you, or do you only believe he tolerates you?",
    prayer:"God, you called me your friend. Not your project. Not your assignment. Your friend. I receive the intimacy that comes with that. Talk to me. I am listening like someone who belongs in the room, because you said I do. Amen." },

  { n:"06", decl:"I am Righteous.", ref:"2 Corinthians 5:21",
    note:"God made him who had no sin to be sin for us, so that in him we might become the righteousness of God. Not righteous enough. Not working toward righteousness. The righteousness of God, the full standing before the Father that belongs to Jesus, transferred to you. This is the great exchange. His perfection for your record. That trade has already been made.",
    forYou:"Where are you living beneath your legal standing in Christ?",
    prayer:"God, I stand before you in the righteousness of Christ, not my own. I am not trying to earn this. I am receiving it. And because I stand in it, I will move through the day like someone who has been fully restored, because I have been. Amen." },

  { n:"07", decl:"I am Created in His Image.", ref:"Genesis 1:27",
    note:"God created mankind in his own image, in the image of God he created them; male and female he created them. The image of God is in you. Not a reflection of it. Not a symbol of it. The actual imago Dei. Every system that has spent centuries trying to convince Black women that their bodies, their minds, and their spirits are less than, was lying against the record of creation.",
    forYou:"What do you see when you look at yourself that God does not see?",
    prayer:"God, when you made me you saw yourself. Let me see what you see. Let me stop filtering myself through lenses that were designed to distort. I am image-bearer. I carry the divine signature. That does not change based on who is in the room. Amen." },

  { n:"08", decl:"I am Set Free.", ref:"John 8:36",
    note:"If the Son sets you free, you will be free indeed. The word indeed does not mean eventually. It means truly, actually, in reality, as opposed to the appearance of freedom. The freedom Jesus gives is not contingent on external circumstances. Paul sang it in prison. Silas praised it in chains. The freedom is interior and it is permanent and it cannot be legislated away.",
    forYou:"What does freedom actually feel like in your body, and are you living in it?",
    prayer:"God, I am free in a way that no executive order, no diagnosis, no relationship, and no bank account can touch. I receive that freedom in my body today. I will not perform captivity that Christ already broke. I am free indeed. Amen." },

  { n:"09", decl:"I am the Light of the World.", ref:"Matthew 5:14",
    note:"You are the light of the world. A town built on a hill cannot be hidden. Jesus said this to ordinary people standing on a hillside, fishermen, tax collectors, women who had been healed of things the community wanted to forget. He told them they were the light of the world. He did not say you will become. He said you are. Present tense. Already.",
    forYou:"Where have you been hiding the light that was never yours to dim?",
    prayer:"God, I will not hide what you lit. The gifts, the voice, the presence, the calling, all of it carries your light and I will stop apologizing for how bright it is. This city needs what I am carrying. I will not put it under a bowl. Amen." },

  { n:"10", decl:"I am the Salt of the Earth.", ref:"Matthew 5:13",
    note:"You are the salt of the earth. Salt preserves. Salt flavors. Salt was so valuable in the ancient world it was used as currency, the word salary comes from it. Jesus was telling those people on that hillside that they were currency. That the world needed what they carried. That without them, something essential would be missing. That is still true.",
    forYou:"Do you know the specific way the world is different because you are in it?",
    prayer:"God, I carry something the earth needs. I will not let the world talk me out of my value or convince me that my presence is optional. I am salt. Necessary. Preserving. Flavorful. Irreplaceable. Let me live like it. Amen." },

  { n:"11", decl:"I am more than a conqueror.", ref:"Romans 8:37",
    note:"In all these things we are more than conquerors through him who loved us. Paul listed what he meant by all these things: trouble, hardship, persecution, famine, nakedness, danger, sword. He was not speaking hypothetically. He had been through all of them. More than conqueror does not mean you won without a fight. It means you came out of the fight with more than you had going in.",
    forYou:"What has God brought you through that you have not yet claimed as evidence of who He is in your life?",
    prayer:"God, I am not a victim of my circumstances. I am more than a conqueror through you. Every hard thing I have come through is testimony. I claim it today, not to perform strength but to remember whose I am. Amen." },

  { n:"12", decl:"I am the head and not the tail.", ref:"Deuteronomy 28:13",
    note:"The Lord will make you the head, not the tail. If you pay attention to the commands of the Lord your God that I give you this day and carefully follow them, you will always be at the top, never at the bottom. This was God's design from the beginning, abundance, not scarcity; leadership, not servitude; the top, not the bottom. Systems designed to keep you at the bottom were designed against the word of God.",
    forYou:"Where have you accepted a position that God never assigned you?",
    prayer:"God, your design for my life is the top and not the bottom, the head and not the tail. I reject every assignment that places me beneath what you ordained. I walk in the abundance you prepared, not the scarcity the world offered. Amen." },

  { n:"13", decl:"I am protected.", ref:"Psalm 91:11",
    note:"For he will command his angels concerning you to guard you in all your ways. The protection of God is not a feeling, it is an assignment. Angels commanded on your behalf. Guarding is the word, actively watching, actively covering, positioned around your life with intentionality. You are not moving through the world unprotected.",
    forYou:"What are you protecting yourself from that God has already covered?",
    prayer:"God, your angels are commanded on my behalf. I walk through every door, every appointment, every difficult conversation knowing I am not unguarded. I release the vigilance that belongs to you and receive the peace that belongs to me. Amen." },

  { n:"14", decl:"I am provided for.", ref:"Philippians 4:19",
    note:"My God will meet all your needs according to the riches of his glory in Christ Jesus. Not some of your needs. All. According to his riches, not according to your budget, not according to the economy, not according to what the market is doing. God's provision is calibrated to his abundance, not to your circumstances. The source has never been in recession.",
    forYou:"Where are you trying to provide for yourself what you need to trust God to cover?",
    prayer:"God, you are my provider. Not my job alone. Not my plan alone. You, according to your riches, not my resources. I release the stranglehold of financial anxiety and receive the provision that is already in motion on my behalf. Amen." },

  { n:"15", decl:"I am healed.", ref:"Isaiah 53:5",
    note:"By his wounds we are healed. The healing bought on the cross was not only spiritual. The word in Hebrew is shalom, wholeness, completeness, nothing missing, nothing broken. Physical healing. Emotional healing. Generational healing. The price for all of it was already paid. You are not waiting for God to decide to heal you. You are receiving what the cross already purchased.",
    forYou:"Where are you living in sickness, physical, emotional, or relational, that Christ already purchased healing for?",
    prayer:"God, by his wounds I am healed. I receive wholeness in my body, my mind, my emotions, my relationships, and my generational line. What the cross purchased I will not leave on the table. I am whole. I walk in that today. Amen." },

  { n:"16", decl:"I am anointed.", ref:"1 John 2:20",
    note:"You have an anointing from the Holy One, and all of you know the truth. The anointing is not reserved for the person on the platform. It rests on every believer who has received the Holy One. Your anointing is specific to your assignment, it equips you for exactly what you were sent to do, with exactly the authority you need to do it.",
    forYou:"Are you operating in the anointing that has been placed on your life, or are you waiting for someone else to confirm it?",
    prayer:"God, the anointing on my life is real and it is sufficient. I do not need an institution to validate what you have already placed on me. I open myself fully to the specific anointing for my specific assignment and I will not minimize it. Amen." },

  { n:"17", decl:"I walk in divine wisdom.", ref:"1 Corinthians 2:16",
    note:"We have the mind of Christ. Not partial access. Not borrowed access. We have it, present tense, full possession. The mind that created the cosmos. The mind that knew what Judas was doing at the table and washed his feet anyway. The mind that looked at a cross and called it a throne. That mind has been given to you.",
    forYou:"Where are you relying only on what you can figure out, when you have access to something greater?",
    prayer:"God, I have the mind of Christ. I access that today in every decision, every creative problem, every impossible situation. You see what I cannot see and you have given me access to what you know. I walk in that wisdom now. Amen." },

  { n:"18", decl:"I am enough for today.", ref:"Matthew 6:34",
    note:"Sufficient for the day is its own trouble. Jesus was giving his disciples permission to stop living in tomorrow's fear while standing in today's grace. You have what you need for today. Not for next year. Not for the version of the future your anxiety has already scripted. Today. And tomorrow, when it comes, will have what it needs too.",
    forYou:"What tomorrow are you spending today's strength trying to solve?",
    prayer:"God, I release tomorrow. I have what I need for today and I will not use today's grace to pay for tomorrow's anxiety. You are already there. It is already covered. I am present in the day you gave me. Amen." },

  { n:"19", decl:"I am seated in heavenly places.", ref:"Ephesians 2:6",
    note:"God raised us up with Christ and seated us with him in the heavenly realms. You are seated. Not striving. Not grasping. Not trying to earn a place at the table. Seated, which means the work of getting you there is finished. The position is not something you are working toward. It is where you currently are in the spiritual reality that supersedes what you can see.",
    forYou:"How would you move through today if you actually believed you were already positioned above the things fighting you?",
    prayer:"God, I am seated with Christ far above every principality, every power, every system, every diagnosis, every limitation. I live from that position today. I do not fight from below, I reign from above. That is where you placed me and I will not vacate the seat. Amen." },

  { n:"20", decl:"I am the righteousness of God in Christ.", ref:"2 Corinthians 5:21",
    note:"He made him who knew no sin to be sin on our behalf, so that we might become the righteousness of God in him. This is the exchange: his perfection, your record. The righteousness of God is not something you achieve, it is something you become through union with Christ. You do not just have right standing. You are, in him, the righteousness of God.",
    forYou:"What would change if you stopped seeing yourself as a sinner trying to be good and started seeing yourself as a righteous person who sometimes falls?",
    prayer:"God, I am the righteousness of God in Christ Jesus. Not working toward it. Not hoping for it. It is who I am. I will stop living beneath my identity and start standing in it. Amen." },

  { n:"21", decl:"I am an heir.", ref:"Galatians 4:7",
    note:"So you are no longer a slave, but God's child; and since you are his child, God has made you also an heir. An heir has legal access to everything the parent possesses. The inheritance is not something you wait for at death, through Christ you have been brought into present access to everything that belongs to the Father. His peace. His power. His provision. His presence. All of it is already yours.",
    forYou:"What belongs to you as a daughter of God that you have been living as though you cannot have?",
    prayer:"God, I am your heir. Not a servant hoping for crumbs. Not an outsider watching from the door. I have legal access to everything in the Father's house and I will start living like it. The inheritance is mine today. Amen." },

  { n:"22", decl:"I am freed from what used to hold me.", ref:"John 8:36",
    note:"If the Son sets you free, you will be free indeed. The freedom Christ gives is not behavioral modification, it is liberation at the root. The thing that used to have you does not own you anymore. The addiction, the pattern, the toxic relationship, the fear, the shame. The chains are off. The question is whether you are still walking like they are on.",
    forYou:"What are you still living in that Christ already broke?",
    prayer:"God, the Son has set me free and that means I am free, not eventually, not after more therapy, not when I feel differently. Now. I will stop performing captivity that has already been broken. I walk out of what used to hold me today. Amen." },

  { n:"23", decl:"I carry the peace of God.", ref:"Philippians 4:7",
    note:"The peace of God, which transcends all understanding, will guard your heart and your mind in Christ Jesus. The peace is a guard, it stands at the door of your mind and turns away what does not belong. It is not the absence of trouble. It is the presence of God in the middle of trouble. And it transcends understanding, which means it does not require your circumstances to make sense before it shows up.",
    forYou:"Where are you trying to manufacture peace through control instead of receiving it through trust?",
    prayer:"God, your peace stands guard over my heart and my mind. I receive it now, not after I figure out the situation, not after the results come back, not after the relationship stabilizes. Now. Your peace is here and I receive it fully. Amen." },

  { n:"24", decl:"I am strong in the Lord.", ref:"Ephesians 6:10",
    note:"Be strong in the Lord and in his mighty power. The instruction is not be strong in yourself. It is be strong in the Lord, which means the strength is sourced elsewhere. You are not the origin of your own endurance. You are the conduit. The power that rose Jesus from the dead lives in you and it is available for everything you are facing.",
    forYou:"Where are you exhausted from trying to be strong in yourself instead of drawing from the source?",
    prayer:"God, your mighty power is available to me. I stop trying to generate what only you can supply. I plug into the source today. The strength I need is not manufactured, it flows from you through me and it is more than enough. Amen." },

  { n:"25", decl:"I am not afraid.", ref:"2 Timothy 1:7",
    note:"For God has not given us a spirit of fear, but of power, and of love, and of a sound mind. Fear is not from God. The fear is not yours to carry, it was not given to you by the Father. What was given: power, love, a sound mind. Three things. All of them active. All of them already placed inside you. Fear is an intruder. You have the right to evict it.",
    forYou:"What decision have you been delaying because of fear that did not come from God?",
    prayer:"God, fear is not my inheritance. Power is. Love is. A sound mind is. I evict the spirit of fear from my life today, from my decisions, my relationships, my body, my future. What you gave me is more than sufficient for what I am facing. Amen." },

  { n:"26", decl:"I have access to wisdom beyond my own.", ref:"1 Corinthians 2:16",
    note:"We have the mind of Christ. The wisdom Paul is describing is not human intelligence optimized, it is access to divine understanding. The kind that sees the end from the beginning. That knows what is actually happening beneath the surface. That finds solutions in places human logic cannot reach. It is available to you right now.",
    forYou:"Where do you need to stop analyzing and start listening?",
    prayer:"God, I have the mind of Christ. I access it now for the decision in front of me, the relationship I cannot figure out, the path that is not clear. You see what I cannot see and I have access to what you see. I receive it. Amen." },

  { n:"27", decl:"I am a vessel of honor.", ref:"2 Timothy 2:21",
    note:"Those who cleanse themselves from the latter will be instruments for special purposes, made holy, useful to the Master and prepared to do any good work. Vessel of honor, consecrated, set apart, made ready for use. Not discarded. Not overlooked. Not benched. Useful to the Master and prepared for every good work. That is what you are.",
    forYou:"Do you believe you are still useful? Because God's answer has not changed.",
    prayer:"God, I am a vessel of honor in your hands. Whatever I have been through has not disqualified me from use. You have cleansed me and prepared me and I am available. Use me for the work you prepared in advance. Amen." },

  { n:"28", decl:"I am anointed for what I have been called to do.", ref:"1 John 2:20",
    note:"You have an anointing from the Holy One. The anointing is not decoration, it is functional. It equips you specifically for what you were specifically sent to do. The anointing on your life is not generic. It is precise. It covers the exact territory of your assignment and it is sufficient for everything the assignment requires.",
    forYou:"Are you walking in the fullness of the anointing on your life, or are you operating at a fraction of it?",
    prayer:"God, the anointing on my life is real, it is specific, and it is enough. I stop minimizing what you have placed on me and I open myself fully to the power available for my assignment. What you anointed me to do, I will do, with everything you gave me to do it. Amen." },

  { n:"29", decl:"I am a new creation.", ref:"2 Corinthians 5:17",
    note:"If anyone is in Christ, the new creation has come: the old has gone, the new is here. Has come. Is here. Past and present tense simultaneously, the new creation is not coming. It has arrived. The old things have passed. Everything that defined you before Christ, the shame, the patterns, the inherited wounds, has passed. You are not a repaired version of your old self. You are genuinely new.",
    forYou:"What old identity are you still letting define you that the new creation has already replaced?",
    prayer:"God, I am new. Not reformed, new. I release my attachment to who I was before you and I walk fully in who I am now. The old has gone. The new is here. I live from that reality today. Amen." },

  { n:"30", decl:"I am a living temple of the Holy Spirit.", ref:"1 Corinthians 6:19",
    note:"Do you not know that your bodies are temples of the Holy Spirit, who is in you, whom you have received from God? The temple in Jerusalem was the most sacred space in Jewish understanding, the place where God's presence dwelled. Paul said that space is now you. Your body. Your life. God does not live in a building anymore. He lives in you. That is what you are walking around in.",
    forYou:"How does knowing that the Spirit of God literally lives in your body change how you treat yourself?",
    prayer:"God, you chose my body as your home. Let me honor what you chose to inhabit. Let me stop degrading, neglecting, or apologizing for what the Holy Spirit has made his temple. I am sacred space. Amen." },

  { n:"31", decl:"I am complete in Christ.", ref:"Colossians 2:10",
    note:"In Christ you have been brought to fullness. The word in Greek is pleroo, filled to the top, complete, lacking nothing. You are not half a person waiting to be completed by a relationship, a title, an achievement, or a number in an account. You are already full. Everything you are reaching for was designed to come out of your fullness, not to create it.",
    forYou:"What are you still trying to acquire to feel complete that God has already provided?",
    prayer:"God, I am full in Christ. Not almost full. Not full enough. Full, to the brim, lacking nothing. I stop reaching for what was designed to come out of my abundance and I receive the completeness that is already mine. Amen." },

  { n:"32", decl:"I am deeply known and fully loved.", ref:"Psalm 139:1-3",
    note:"You have searched me, Lord, and you know me. You know when I sit and when I rise; you perceive my thoughts from afar. Being fully known and still fully loved is the rarest experience in human life. Most people are loved for what they show. God loves from knowledge, from having searched you completely, seen everything, and chosen love anyway. That is not tolerance. That is intimacy.",
    forYou:"What part of yourself are you still hiding from God as if he has not already seen it?",
    prayer:"God, you know everything and you love me anyway. Not despite what you have seen, you love the whole thing, the real thing, the unfiltered version. I stop performing for you and I receive the love that is for the real me. Amen." },

  { n:"33", decl:"I am the apple of God's eye.", ref:"Deuteronomy 32:10",
    note:"In a desert land he found him, in a barren and howling waste. He shielded him and cared for him; he guarded him as the apple of his eye. The apple of the eye is the pupil, the most sensitive, most protected part of the body, instinctively shielded from any threat. God guards you with the same reflexive, instinctive protection he has over his most vulnerable place. You are that precious to him.",
    forYou:"Do you actually believe you are precious to God, not valuable in a general sense, but precious to him specifically?",
    prayer:"God, I am the apple of your eye. Guarded. Precious. Shielded. I receive that level of care and I will stop moving through the world as though I am expendable. You protect what you value and you value me. Amen." },

  { n:"34", decl:"I have been given beauty for ashes.", ref:"Isaiah 61:3",
    note:"To bestow on them a crown of beauty instead of ashes, the oil of joy instead of mourning, and a garment of praise instead of a spirit of despair. The exchange God offers is not addition, it is substitution. The ashes do not stay and beauty gets added on top. The ashes are taken and beauty is given in their place. The oil of joy replaces the mourning. The garment of praise replaces the spirit of despair. This is what restoration looks like in God's economy.",
    forYou:"What ashes have you been carrying that God has been trying to exchange for a crown?",
    prayer:"God, I give you the ashes. Everything that burned, everything that was lost, everything that fell apart. I receive the beauty you have in exchange, not one day, but today. The mourning is turning. The crown is mine. Amen." },

  { n:"35", decl:"I am not defined by my past.", ref:"Isaiah 43:18-19",
    note:"Forget the former things; do not dwell on the past. See, I am doing a new thing. Now it springs up; do you not perceive it? God is not asking you to pretend the past did not happen. He is saying there is something new happening right now that requires your full attention, and your past cannot compete with what he is doing in the present. The new thing needs your eyes.",
    forYou:"What new thing is God doing that your attachment to the past is keeping you from seeing?",
    prayer:"God, I release my grip on the past, the mistakes, the wounds, the former version of who I was, the former things you yourself told me to release. I perceive the new thing. I turn toward it. It has my full attention. Amen." },

  { n:"36", decl:"I operate under open heaven.", ref:"Malachi 3:10",
    note:"Test me in this, says the Lord Almighty, and see if I will not throw open the floodgates of heaven and pour out so much blessing that there will not be room enough to store it. God issued a direct challenge: test me. He is not asking for blind faith in this passage, he is making a verifiable claim and inviting you to verify it. Open heaven is the state of full access, full flow, nothing held back.",
    forYou:"Where are you living beneath an open heaven that you have not walked under?",
    prayer:"God, the windows of heaven are open over my life. I position myself under the flow. Every blessing you prepared, every door you opened, every assignment you funded, I receive it all. There is more than enough room. Amen." },

  { n:"37", decl:"I am an overcomer.", ref:"Revelation 12:11",
    note:"They triumphed over him by the blood of the Lamb and by the word of their testimony. Two things: what Christ did, and what you say about what Christ did. Your testimony is a weapon. When you open your mouth and say what God brought you through, you are participating in the defeat of the enemy. Overcoming is not passive. It is active. It requires your voice.",
    forYou:"What testimony are you withholding that someone else needs to hear?",
    prayer:"God, I overcome by your blood and by my testimony. I will not be silent about what you have done in my life. Every hard thing I came through is evidence of your faithfulness and I will say so, out loud, with specificity, for whoever needs to hear it. Amen." },

  { n:"38", decl:"My obedience matters even when I cannot see the outcome.", ref:"1 Samuel 15:22",
    note:"To obey is better than sacrifice. Samuel said this to a king who had done 90 percent of what God asked and substituted his own judgment for the 10 percent that was inconvenient. Obedience is not about the visible result. It is about the relationship. It says: I trust you enough to do what you said even when my logic argues against it. That kind of trust moves God.",
    forYou:"Where is God asking for obedience that your logic is overriding?",
    prayer:"God, my obedience is not contingent on understanding the outcome. You said it and I will do it, even when the math does not work, even when no one else would make this choice, even when I cannot see what you are building. I trust you with the results. Amen." },

  { n:"39", decl:"I am a carrier of the glory of God.", ref:"2 Corinthians 4:7",
    note:"We have this treasure in jars of clay to show that this all-surpassing power is from God and not from us. The treasure is the glory, the all-surpassing power of God. The jar of clay is the ordinary, fragile, sometimes cracked container. The contrast is intentional: the glory is most visible when the container is not impressive enough to explain it. Your life, with all its ordinary-ness and all its cracks, is carrying something extraordinary.",
    forYou:"Are you available to carry what God wants to put in you, or are you waiting until you feel more worthy of the treasure?",
    prayer:"God, I am a jar of clay carrying your glory. I stop apologizing for the clay and I stop hiding the glory. What you have put in me is not mine to minimize. I am available to carry it fully, cracks and all. Amen." },

  { n:"40", decl:"I am sustained by the joy of the Lord.", ref:"Nehemiah 8:10",
    note:"The joy of the Lord is your strength. This was said to people who were weeping, people who had just heard the law read aloud and were undone by the gap between who God asked them to be and who they had been. Nehemiah did not minimize their grief. He said: the joy of the Lord is your strength. Not your joy, his joy. Joy that originates in God and flows into you. That is a different source and it does not dry up.",
    forYou:"Where are you trying to generate strength from a joy that has run out, instead of drawing from a joy that does not?",
    prayer:"God, your joy is my strength. Not manufactured positivity. Not pretending things are fine. Your joy, the settled, rooted, unshakeable gladness that comes from knowing who you are and whose I am. I receive it as my source of strength today. Amen." },

  { n:"41", decl:"I am covered by grace.", ref:"Romans 5:20",
    note:"Where sin increased, grace increased all the more. This is one of the most dangerous verses in the Bible, not because it licenses sin, but because it establishes that grace is never outrun. Whatever you have done, wherever you have been, however far you have gone, grace went further. Grace is not a small cover for a large wound. It is an abundance that exceeds whatever it is covering.",
    forYou:"What have you done that you still do not believe grace covers?",
    prayer:"God, your grace is not something I can exhaust. I receive it fully for the things I have done and the things that were done to me. Grace covers all of it, not barely, not reluctantly, but abundantly. I live in that abundance. Amen." },

  { n:"42", decl:"My tears have been counted. None of them were wasted.", ref:"Psalm 56:8",
    note:"You have kept count of my tossings; put my tears in your bottle. Are they not in your book? In the ancient world a lachrymatory, a small flask for collecting tears, was a gift of profound intimacy. David says God kept one for every tear he shed. Nothing was ignored. Nothing was too small. Nothing was performance. The tears were recorded because the suffering was real and the God who saw it did not look away.",
    forYou:"What grief have you been dismissing as unimportant that God has been carefully collecting?",
    prayer:"God, you kept every tear. You counted every sleepless night. You recorded everything I went through that no one else saw. None of it was invisible to you. None of it was wasted. Use every single thing I cried for something. Amen." },

  { n:"43", decl:"I am advancing. Not shrinking.", ref:"Isaiah 54:2-3",
    note:"Enlarge the place of your tent, stretch your tent curtains wide, do not hold back; lengthen your cords, strengthen your stakes. For you will spread out to the right and to the left. God's instructions to the barren woman in Isaiah 54 are all expansion language. Not survival language. Not maintenance language. Expansion. The woman who felt she had nothing was being commanded to make room for more than she could currently hold.",
    forYou:"Where are you holding back your expansion because you do not yet believe the increase is coming?",
    prayer:"God, I enlarge. I stretch. I do not hold back. You are bringing increase from directions I cannot currently see and I am making room for all of it. I will not shrink into the space my fear assigned me. I expand into the space you ordained. Amen." },

  { n:"44", decl:"I am not alone. He goes before me.", ref:"Deuteronomy 31:8",
    note:"The Lord himself goes before you and will be with you; he will never leave you nor forsake you. Do not be afraid; do not be discouraged. He goes before, present tense, active. Before you enter the room, he is already there. Before you make the call, before you sit in the waiting room, before you walk into the meeting. He is not behind you watching. He is ahead of you, clearing the way.",
    forYou:"What feels impossible to walk into right now? He is already there.",
    prayer:"God, you are ahead of me in everything I am facing. The room I am afraid to enter, the conversation I am dreading, the future I cannot see, you are already there. I follow you into what I cannot yet see and I will not be afraid. Amen." },

  { n:"45", decl:"My gifts have been given for a purpose.", ref:"Romans 12:6",
    note:"We have different gifts, according to the grace given to each of us. The gift is not the point, the grace is. Your gifts were distributed by grace, which means you did not earn them and you cannot lose them through failure. They were given with purpose attached, for the specific contexts you were sent into, for the specific people you were sent to serve. They are not accessories. They are assignments.",
    forYou:"Are you using your gifts at the level they were given, or are you operating at a fraction of your capacity?",
    prayer:"God, the gifts you gave me were not decorative. They were purposeful. I use them fully, without apology, in every space I enter. What you placed in me was placed there for someone else's breakthrough. I will not withhold it. Amen." },

  { n:"46", decl:"I speak life.", ref:"Proverbs 18:21",
    note:"The tongue has the power of life and death, and those who love it will eat its fruit. Death and life, both are in the tongue. What you say over yourself, your children, your circumstances, your future is not neutral. It is planting. What you speak, you eventually eat. This is not positive thinking. This is a theological reality about the creative power God placed in human speech because he made you in his image.",
    forYou:"What are you regularly speaking over yourself that you would not want to harvest?",
    prayer:"God, I am made in your image and you spoke the world into existence. Let my words carry that same creative weight. I speak life over my body, my family, my finances, my calling, my future. I will eat the fruit of what I plant and I am planting life. Amen." },

  { n:"47", decl:"My steps are ordered.", ref:"Psalm 37:23",
    note:"The Lord makes firm the steps of the one who delights in him. Makes firm, the word in Hebrew means established, made certain, secured. Your steps are not random. They are not accidental. The path you are on, including the detours, has been ordered by someone who can see the whole map. You do not need to see the whole road. You need to take the next step.",
    forYou:"What step are you refusing to take because you cannot see the whole road?",
    prayer:"God, my steps are ordered by you. The one I am standing on right now, the next one I cannot see, all of it is in your hands. I delight in you and I take the next step in confidence that you have made it firm. Amen." },

  { n:"48", decl:"I carry resurrection power.", ref:"Ephesians 1:19-20",
    note:"His incomparably great power for us who believe, that power is the same as the mighty strength he exerted when he raised Christ from the dead. The power available to you is not general spiritual energy. It is the specific power that moved a stone, defeated death, and raised a body. That power lives in everyone who believes. You are walking around with resurrection inside you.",
    forYou:"What in your life have you written off as dead that resurrection power could still reach?",
    prayer:"God, the power that raised Christ from the dead lives in me. I speak to what looks dead in my life, the dream, the relationship, the body, the vision, and I say: resurrection power is here. Nothing is too far gone. Amen." },

  { n:"49", decl:"I am positioned on purpose.", ref:"Esther 4:14",
    note:"Who knows whether you have not come to the kingdom for such a time as this? You are not in the wrong place. You are not late. You are not a mistake. Your ZIP code, your generation, your season, your specific set of relationships and access, all of it is intentional positioning by a God who is working a plan you can only see a piece of. Mordecai's question to Esther is God's question to you.",
    forYou:"What are you positioned to do right now that only you can do from where you are?",
    prayer:"God, I am here on purpose. The timing is not an accident. The relationships, the access, the season, all of it is intentional positioning. I will not waste the moment I was placed in. Show me what you put me here for and I will do it with everything I have. Amen." },

  { n:"50", decl:"I am who He says I am.", ref:"1 John 3:1",
    note:"See what great love the Father has lavished on us, that we should be called children of God! And that is what we are. That is what we are. Not what we are trying to become. Not what we will be after we get it together. What we are, right now, in this body, in this season, with this history, in this economy, in this political moment, after everything that has happened. Children of God. Beloved. Chosen. Redeemed. Righteous. Enough. That is what we are.",
    forYou:"After reading all fifty, which one do you still not fully believe? Start there.",
    prayer:"God, I am who you say I am. Not who the world named me. Not who my family called me. Not what my worst day made me feel like. Not what the system tried to reduce me to. You said it first and you said it most and you said it in blood. I receive all fifty. I am who you say I am. Amen." }
];

const AUTHORS = [
  { id:"moses", name:"Moses", tag:"The reluctant deliverer.", era:"BC 1500", connection:"Author of the Law · spoke to God face to face", books:["Genesis","Exodus","Leviticus","Numbers","Deuteronomy"],
    story:"Born under a death decree to a Hebrew slave family in Egypt. Pulled from the Nile by Pharaoh's daughter and raised in the palace of the same king who wanted him dead. Killed an Egyptian beating a Hebrew, ran for forty years, kept sheep in Midian. Met God at a burning bush in his eighties. Said: who am I? God said: I will be with you.\n\nLed Israel out of slavery, through the Red Sea, through forty years in the wilderness. Spoke to God face to face. Did not enter the promised land himself but climbed Mount Nebo and saw it before he died.\n\nHe wrote of a God who hears slaves cry, who introduces Himself by name, who keeps covenant for a thousand generations. Read him when you need to remember that deliverance is not earned and that God shows up in fire.",
    keyVerse:"Exodus 3:14", keyVerseText:"God said to Moses, I AM WHO I AM.",
    bridge:"His story is the story of every Black woman who has been told she is too broken, too disqualified, too far gone, and then called anyway. The burning bush did not ask him to get himself together first. God called him in the middle of his wilderness, not after he left it." },
  { id:"david", name:"David", tag:"The man after God's own heart who was also a whole mess.", era:"BC 1000", connection:"Ancestor of Jesus · author of the Psalms", books:["Psalms (many)"],
    story:"Youngest of eight sons, anointed in secret while Saul was still king. Killed Goliath with a stone. Danced before the ark in a linen ephod, undignified in the sight of his wife Michal who despised him for it. Warrior, musician, adulterer, murderer, repenter.\n\nHe wrote the lament psalms, the praise psalms, the psalms of confession. Psalm 51 was written after Nathan confronted him about Bathsheba and Uriah. The depth of his repentance matched the depth of his failure.\n\nRead him when you need to know that God does not require your performance before you approach Him. David came to God broken and came back to God broken and God called him beloved anyway. That is the whole testimony.",
    keyVerse:"Psalm 51:10", keyVerseText:"Create in me a clean heart, O God, and renew a right spirit within me.",
    bridge:"David wrote Psalm 22, the cry that begins with ’My God, my God, why have you forsaken me?’ centuries before Jesus said it on the cross. Black women have been crying that psalm in kitchens, in hospitals, in pews for generations. He knew how to hold praise and devastation in the same breath. That is not a small thing." },
  { id:"paul", name:"Paul", tag:"The one who had to be knocked down before he could be built up.", era:"AD 50-65", connection:"13 letters · primary NT theologian", books:["Romans","1 & 2 Corinthians","Galatians","Ephesians","Philippians","Colossians","1 & 2 Thessalonians","1 & 2 Timothy","Titus","Philemon"],
    story:"Originally Saul of Tarsus, a Pharisee who persecuted and oversaw the killing of Christians. Knocked to the ground on the road to Damascus, heard the voice of Jesus, and was blinded for three days. A believer named Ananias was told by God to go pray for him. He did. Paul's sight returned.\n\nHe was beaten with rods three times, shipwrecked three times, imprisoned multiple times. He wrote more of the New Testament than anyone else. He wrote Philippians, the most joyful letter in the New Testament, from prison.\n\nHis letters are the primary theological framework of Christianity after the gospels. His treatment of grace, justification, and the impossibility of separation from God's love defines Christian theology to this day. Read him especially when you need to understand that nothing you have done can separate you from what God has decided about you.",
    keyVerse:"Romans 8:38-39", keyVerseText:"Neither death nor life, neither angels nor demons, neither the present nor the future, nor any powers, neither height nor depth, nor anything else in all creation, will be able to separate us from the love of God.",
    bridge:"The Black church was built on his letters. Women who had every reason to abandon hope memorized them, sang them, and passed them to their daughters. He wrote about freedom in captivity, about joy under pressure, about peace that makes no logical sense. He wrote it for people who needed it to be true. It was." },
