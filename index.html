      relatable:"Matthew opened his gospel with a genealogy that included five women: Tamar, Rahab, Ruth, Bathsheba, and Mary. He did not have to name any of them. He chose to name all five. Every one of them had a story the institution of their day would have used to disqualify them. Tamar disguised herself to get what was legally hers. Rahab was a Canaanite sex worker. Ruth was a Moabite foreigner. Bathsheba survived a king's abuse of power. Mary was an unmarried pregnant teenager. Jesus came through all of their bodies. Matthew wanted you to know that.",
      themes:"Matthew's genealogy is a theological manifesto before the narrative begins. The God who chose these five women is the same God who chooses women today whose stories the church has used to disqualify them. Womanist theologian Renita Weems has argued that the biblical tradition of including the marginalized in the lineage of redemption is not accidental, it is the pattern. God consistently works through who the institution has written off. Matthew made sure you could not miss it.",
      prayer:"God who built the lineage of your Son through women the institution would have disqualified, I come to you carrying the parts of my story I have been told make me ineligible. Tamar found a way when she was told to disappear. Rahab chose the right side when everything around her was on the wrong one. Ruth stayed when leaving was the reasonable choice. Bathsheba survived what was done to her and raised a king. Mary said yes before she knew the cost. You chose all five. With full knowledge. I receive the same choosing for myself today. What is in my before is not larger than what is in your design. I am in the lineage of something bigger than my history. Amen.", carry:"Think about one room you have been waiting for permission to enter. Write down whose permission you have been seeking. Then remember: God already put your name on the door. The question was never whether you belonged. It was whether you would walk in."
    },
    "Jeremiah": {
      ref:"Jeremiah 29:11-13", title:"Plans to Prosper You", lede:"For I know the plans I have for you, declares the Lord.",
      scripture:`<p><span class="vnum">11</span>For I know the plans that I have for you, says the Lord, plans for welfare and not for evil, to give you a future and a hope. <span class="vnum">12</span>You shall call on me, and you will go and pray to me, and I will listen to you. <span class="vnum">13</span>You shall seek me and find me, when you search for me with all your heart.</p>`,
      author:"Jeremiah", when:"Roughly 594 BCE", where:"Jerusalem, in a letter to exiles in Babylon", audience:"Jews who had been deported to Babylon",
      context:"This is not a prosperity gospel verse. Jeremiah wrote this in a letter to people in exile, people who had lost their homes, their city, their temple. He told them to build houses in Babylon, plant gardens, marry and have children, seek the welfare of the city. Then he said: God has plans for you. He was writing to people for whom things had gone catastrophically wrong. The plans are for welfare and not for calamity. The word for welfare is shalom, wholeness, completeness, the full flourishing of a life. The plans for your shalom were not cancelled by what happened to you.",
      keyTerms:[
        {script:"שָׁלוֹם",word:"shalom",lang:"Hebrew",gloss:"welfare, wholeness, completeness, not just absence of conflict but full flourishing",note:"Plans for shalom. Not plans for your happiness, necessarily. Plans for your wholeness. Your completeness. The full, abundant version of your life."},
        {script:"תִּקְוָה",word:"tikvah",lang:"Hebrew",gloss:"hope, a cord, a thread, what you hold onto when you cannot see ahead",note:"To give you a future and a tikvah. The same word is used for the scarlet cord Rahab hung from her window. Hope is what you hold when rescue has not yet arrived."}
      ],
      relatable:"Jeremiah was told from the beginning: before I formed you in the womb I knew you. Before you were born I set you apart. He spent most of his life wishing he had never been born. He said: cursed be the day I was born. He was called the weeping prophet, a man whose grief was inseparable from his calling. He was not too emotional for ministry. His tears were the ministry. Black women who have been told they are too sensitive, too emotional, too much, Jeremiah's existence says: your capacity for grief is a prophetic gift.",
      themes:"Jeremiah's letter to the exiles in chapter 29 contains one of the most quoted and most misread promises in the Bible. The famous verse, plans to prosper you and not to harm you, was written to people who had just been told they would be in Babylon for seventy years. It was not a promise of immediate relief. It was a promise that the suffering had a shape and that God was in it with them. Plant gardens. Build houses. Pray for the city. Bloom where you are assigned, not where you want to be.",
      prayer:"God who knew me before you formed me in the womb, who appointed me before I was born, I receive the calling that preceded my awareness of it. The assignment you placed on my life that has nothing to do with whether I feel ready or qualified or like the kind of person God uses. Jeremiah was not that person either. You said: do not say I am too young. Do not say I do not know how. I will be with you. I will tell you what to say. Touch my mouth today. Put your words there. Let what comes out of me be what you would say to this moment and this person and this situation. And for the grief I am carrying, let me weep it fully. You did not penalize the weeping prophet. You used him. Use me too. Amen.",carry:"Write Jeremiah 29:11 but replace every occurrence of you with your actual name. Read it with your name in it. God wrote this plan for your name specifically."
    },
    "1 Corinthians": {
      ref:"1 Corinthians 13", title:"The Love Chapter", lede:"If I have not love, I am nothing.",
      scripture:`<p><span class="vnum">1</span>If I speak with the languages of men and of angels, but don't have love, I have become sounding brass, or a clanging cymbal. <span class="vnum">2</span>If I have the gift of prophecy, and know all mysteries and all knowledge; and if I have all faith, so as to remove mountains, but don't have love, I am nothing. <span class="vnum">4</span>Love is patient and is kind; love doesn't envy. Love doesn't brag, is not proud, <span class="vnum">5</span>doesn't behave itself inappropriately, doesn't seek its own way, is not provoked, takes no account of evil; <span class="vnum">7</span>bears all things, believes all things, hopes all things, endures all things. <span class="vnum">8</span>Love never fails. <span class="vnum">13</span>But now faith, hope, and love remain, these three. The greatest of these is love.</p>`,
      author:"Paul", when:"Roughly 55 CE", where:"Written from Ephesus", audience:"The church at Corinth, a divided, competitive community",
      context:"Paul placed this chapter between two chapters about spiritual gifts because the Corinthian church was divided over which gift was most important. He interrupted the argument with a description of the only thing that actually matters. The famous love chapter was not written for weddings. It was written for a church in conflict.",
      keyTerms:[{script:"ἀγάπη",word:"agape",lang:"Greek",gloss:"the highest form of love, chosen, unconditional, not dependent on the worthiness of its object",note:"Agape is what Paul uses throughout this chapter. Not romantic love (eros), not friendship love (philia). Agape is the kind of love that continues whether or not anything is returned."}],
      relatable:"God chose the foolish things of the world to shame the wise. He chose the weak things to shame the strong. He chose the lowly things, the despised things, the things that are not, to nullify the things that are. Paul was writing to a community in Corinth that was divided by class, by status, by who was aligned with the impressive teachers. He told them: look at who God actually chose. Not the credentialed. Not the powerful. The ones the world had already written off. That is not a description of the early church only. That is a permanent pattern of divine selection.",
      themes:"First Corinthians is Paul's argument that the gospel inverts the world's hierarchy of value. The cross, which is foolishness to those who are perishing, is the power of God. Black women who have been told their faith is naive, their theology is unsophisticated, their spiritual practice is not serious enough, Paul's answer is that the wisdom of the world has consistently missed the thing that God is doing. The ones the academy dismissed have often been closest to the truth that the academy was looking for.",
      prayer:"God who chose the foolish things to shame the wise and the weak things to shame the strong, I come to you as one of the ones who has been counted as not enough by the systems that surround me. The credential systems. The credibility systems. The rooms that weigh your worth by what institution trained you, who sponsored you, who gave you a title. I bring you what I actually have. Not the impressive version. What I actually have. And I trust that your pattern of choosing is still operative. You chose a stable and a manger. You chose fishermen and a tax collector. You chose a Samaritan woman at noon. You are not looking for the impressive. You are looking for the available. I am available. Use what I have. Shame what needs to be shamed through who I am. I am one of the ones your pattern has always included. Amen."
    },
    "Ephesians": {
      ref:"Ephesians 6:10-18", title:"The Armor of God", lede:"Put on the full armor of God, so that you can take your stand.",
      scripture:`<p><span class="vnum">10</span>Finally, be strong in the Lord and in his mighty power. <span class="vnum">11</span>Put on the full armor of God, so that you can take your stand against the devil's schemes. <span class="vnum">12</span>For our struggle is not against flesh and blood, but against the rulers, against the authorities, against the powers of this dark world and against the spiritual forces of evil in the heavenly realms. <span class="vnum">13</span>Therefore put on the full armor of God, so that when the day of evil comes, you may be able to stand your ground, and after you have done everything, to stand. <span class="vnum">14</span>Stand firm then, with the belt of truth buckled around your waist, with the breastplate of righteousness in place, <span class="vnum">15</span>and with your feet fitted with the readiness that comes from the gospel of peace. <span class="vnum">16</span>In addition to all this, take up the shield of faith, with which you can extinguish all the flaming arrows of the evil one. <span class="vnum">17</span>Take the helmet of salvation and the sword of the Spirit, which is the word of God. <span class="vnum">18</span>And pray in the Spirit on all occasions with all kinds of prayers and requests.</p>`,
      author:"Paul", when:"Roughly 62 CE", where:"Written from prison", audience:"The church at Ephesus",
      context:"Ephesus was a city where the practice of magic and the commerce around it was massive, Paul's ministry there created a riot among the silversmiths who made idols for the goddess Artemis. The metaphor of armor would have been immediately recognizable to readers in a Roman military context. Paul is not describing a literal outfit. He is describing what you carry into spiritual conflict.",
      keyTerms:[{script:"πανοπλία",word:"panoplia",lang:"Greek",gloss:"the full armor, the complete set, not some of it",note:"Put on the panoplia. The full set. Paul's point is that you do not pick and choose which pieces to wear into a day. You put on all of it."}],
      relatable:"The struggle is not against flesh and blood. The person who dismissed you in the meeting is not the real opposition. The system that passed you over is not the ultimate enemy. The relationship that wounded you is not the source of the war. Paul is not minimizing the real harm that real people do. He is trying to expand your vision of what is actually happening so you are fighting the right battle with the right weapons. The enemy is spiritual. The armor is spiritual. The victory is spiritual, and it was won before the fight you are currently in.",
      themes:"Ephesians is the book about the church as the body of Christ, the household of God, the dwelling place of the Spirit. It is also the book where Paul prays that the readers would know the width and length and height and depth of the love of God, a love that surpasses knowledge. That prayer was written for a community under the weight of empire. The comprehension of that love is not an intellectual exercise. It is spiritual power. Knowing how loved you are changes how you move. Paul asked God to give them that knowledge as a gift.",
      prayer:"God who raised Jesus from the dead and seated him far above every principality and power, and who seated me with him in that same position, I come to you from my actual spiritual location. Not from defeat. Not from below. From the seated place far above the thing that has been fighting me. I put on every piece of the armor today. Not as a spiritual exercise. As an act of war. The belt of truth because I have been believing some lies. The breastplate of righteousness because my heart has been exposed. The shoes of the gospel because I have been walking in dread. The shield of faith because the arrows have been landing. The helmet of salvation because my mind has been under attack. The sword of the word. I know who I am. I know where I am seated. I will stand. Amen.", carry:"Name the actual enemy today. Not the person. Not the situation. The spiritual force behind the opposition. Then put on the specific piece of armor that addresses it: truth, righteousness, peace, faith, salvation, the word. One piece. Consciously."
    },
    "Galatians": {
      ref:"Galatians 5:22-25", title:"The Fruit of the Spirit", lede:"The fruit of the Spirit is love, joy, peace, patience.",
      scripture:`<p><span class="vnum">22</span>But the fruit of the Spirit is love, joy, peace, patience, kindness, goodness, faith, <span class="vnum">23</span>gentleness, and self-control. Against such things there is no law. <span class="vnum">24</span>Those who belong to Christ Jesus have crucified the flesh with its passions and lusts. <span class="vnum">25</span>If we live by the Spirit, let's also walk by the Spirit.</p>`,
      author:"Paul", when:"Roughly 48-55 CE", where:"Written during his missionary journeys", audience:"Churches in the region of Galatia",
      context:"Paul wrote Galatians as an argument for freedom from the law. Certain teachers had come behind him telling the Galatian churches they needed to follow the Jewish law in addition to faith in Jesus. Paul's response is emphatic and personal. Chapter 5 ends with the fruit of the Spirit as the evidence of what a life led by the Spirit actually produces, not law-keeping, but these nine characteristics.",
      keyTerms:[{script:"καρπός",word:"karpos",lang:"Greek",gloss:"fruit, the natural outgrowth of what a thing is rooted in",note:"The fruit of the Spirit. Not the works of the Spirit or the effort of the Spirit. Fruit is what grows from the nature of the tree. You do not produce fruit by trying harder. You produce it by being more deeply rooted."}],
      relatable:"There is neither Jew nor Gentile, neither slave nor free, nor is there male and female, for you are all one in Christ Jesus. Paul wrote this to a community that had been told they needed to perform a certain identity in order to be fully included in the covenant. He said no. The dividing walls are gone in Christ. What the world uses to rank you, race, class, gender, has no standing in the new creation. This is not an aspirational statement. It is a present-tense declaration of what is already true in Christ.",
      themes:"Galatians 3:28 is the most quoted text in theological arguments for gender and racial equality. It has also been the most resisted. The institution has found ways to honor it theoretically while ignoring it practically for two thousand years. Womanist theologians have insisted that this text means what it says, that the hierarchy of race and gender that structures the world has been dissolved in Christ, and any theology that reconstructs those hierarchies is operating in contradiction to the gospel it claims to preach.",
      prayer:"God who in Christ dissolved every dividing wall, every hierarchy of race and gender and class that the world keeps trying to rebuild, I receive the freedom of Galatians 3:28 as fully operational for my life right now. The system that ranked me was not built by you. The hierarchy that said my voice did not belong in the room was not built by you. The theology that found reasons to limit my access was not built by you. In Christ there is no more of that division. I walk in the newness of the gospel, not in the constrictions of the institution. Let me live in the freedom that was purchased and stop performing within the cage that Christ already broke. Where the Spirit of the Lord is, there is freedom. The Spirit is in me. The freedom is here. Amen.", carry:"Name one hierarchy, racial, gendered, economic, religious, that you have been accepting as more real than what the gospel says about you. Then say: in Christ, that wall is gone. I walk in the freedom that was purchased for me."
    },
    "Hebrews": {
      ref:"Hebrews 11:1-6, 11-12", title:"The Hall of Faith", lede:"Faith is the substance of things hoped for.",
      scripture:`<p><span class="vnum">1</span>Now faith is the substance of things hoped for, the evidence of things not seen. <span class="vnum">2</span>For by this, the elders were testified to. <span class="vnum">3</span>By faith, we understand that the universe has been framed by the word of God, so that what is seen has not been made out of things which are visible. <span class="vnum">4</span>By faith, Abel offered to God a more excellent sacrifice than Cain. <span class="vnum">5</span>By faith, Enoch was taken away, so that he wouldn't see death. <span class="vnum">6</span>Without faith it is impossible to be well pleasing to him, for he who comes to God must believe that he exists, and that he is a rewarder of those who seek him. <span class="vnum">11</span>By faith, even Sarah herself received power to conceive, and she bore a child when she was past age, since she counted him faithful who had promised. <span class="vnum">12</span>Therefore as many as the stars of the sky in multitude, and as innumerable as the sand which is by the sea shore, were fathered by one man, and him as good as dead.</p>`,
      author:"Unknown, traditionally attributed to Paul but widely debated", when:"Roughly 60-70 CE", where:"Unknown", audience:"Jewish Christians facing persecution",
      context:"Hebrews 11 is called the Hall of Faith because it catalogs people across the Old Testament who acted on what they could not yet see. The author is writing to people who are under pressure to abandon faith in Jesus and return to traditional Judaism. He argues: look at what faith actually looked like throughout your history. It always looked like this, holding on to something not yet visible.",
      keyTerms:[{script:"πίστις",word:"pistis",lang:"Greek",gloss:"faith, trust, confidence, active reliance on what is declared true",note:"Faith is the substance. The word for substance is hypostasis, the underlying reality beneath what is visible. Faith is not wishful thinking. It is the actual foundation you stand on before you can see it with your eyes."}],
      relatable:"We do not have a high priest who is unable to empathize with our weaknesses. He was tempted in every way, just as we are, yet he did not sin. Jesus entered the full human experience, the hunger, the grief, the loneliness, the physical pain, the betrayal, the institutional opposition, and he did not abstract himself from any of it. He sat in it. Which means when you come to the throne of grace, you are not explaining your experience to someone who has only heard about it. You are coming to someone who has been in it.",
      themes:"Hebrews is the book about the priesthood of Christ, the once-for-all sacrifice that opened direct access to God for everyone. The veil in the temple that separated the holy of holies from the rest of the people was torn in two when Jesus died. Direct access. For everyone. No mediator required. No institution required. Black women who have been told they need someone else to access God, who have been kept from the altar, who have been denied the full expression of their calling by religious gatekeepers, Hebrews says the veil is already torn.",
      prayer:"God who is the same yesterday and today and forever, I approach your throne with the confidence this letter instructs. Not with the shrinking that says I am not sure I am allowed to come this directly. Not with the performance that tries to make my approach worthy before I arrive. With confidence. Because Jesus is my high priest and he has made a way and the veil is torn and I have been given access that no institution can revoke. I bring the specific thing I have been too uncertain to bring. The need I was not sure was legitimate enough. The grief I was not sure counted. The desire I was not sure God was interested in. He is interested. He is in the business of mercy and grace to help in time of need. This is my time of need. I am here. Amen.", carry:"You have direct access. Today. Approach the throne of grace with confidence and find mercy to help in your time of need. Come specifically. Come with the actual need. Come as a daughter. Confidence is the instruction."
    },
    "Proverbs": {
      ref:"Proverbs 3:1-8", title:"Trust in the Lord", lede:"In all your ways acknowledge him and he will make your paths straight.",
      scripture:`<p><span class="vnum">1</span>My son, don't forget my teaching; but let your heart keep my commandments: <span class="vnum">2</span>for length of days, and years of life, and peace, will they add to you. <span class="vnum">3</span>Don't let kindness and truth forsake you. Bind them around your neck. Write them on the tablet of your heart. <span class="vnum">4</span>So you will find favor and good understanding in the sight of God and man. <span class="vnum">5</span>Trust in the Lord with all your heart, and don't lean on your own understanding. <span class="vnum">6</span>In all your ways acknowledge him, and he will make your paths straight. <span class="vnum">7</span>Don't be wise in your own eyes. Fear the Lord, and depart from evil. <span class="vnum">8</span>It will be health to your body, and nourishment to your bones.</p>`,
      author:"Solomon and others", when:"Compiled roughly BC 950-550", where:"Jerusalem", audience:"Young people being trained in wisdom, the next generation of leadership",
      context:"Proverbs is a collection of wisdom literature assembled over centuries. The book is addressed to a son, but the Hebrew wisdom tradition was always understood as being for anyone entering adult life and responsibility. Proverbs 3:5-6 is among the most memorized verses in Scripture. It appears simple. It is not. To not lean on your own understanding is a counterintuitive act for anyone who believes they know what they are doing.",
      keyTerms:[{script:"בָּטַח",word:"batach",lang:"Hebrew",gloss:"to trust, to rely on, to make yourself secure in someone else's reliability",note:"Trust in the Lord, batach. The word means to lean your full weight against something. The instruction in verse 5 is: lean your whole weight against God and specifically stop leaning against your own analysis."}],
      relatable:"Proverbs 31 has been weaponized against Black women. Used to add more to the already-impossible list. Used to make a woman feel that her worth depends on her output, her rising before dawn, her never-resting, her perfect household, her income-generating, her clothed-in-fine-linen while also clothed-in-strength. But read in its original context, this is a poem of praise, not a performance standard. It is someone describing what power looks like when a woman is fully herself. The point is the strength. The dignity. The laughter at the future.",
      themes:"The woman of Proverbs 31 is not exhausted. She is powerful. She is not performing for approval, she is operating from a place of deep security. Womanist theologians have reclaimed her as a portrait of embodied divine wisdom, not a checklist for the perfect wife. The word used for her in verse 10 is eshet chayil, woman of valor. The same word used for warriors. She is not domesticity performing strength. She is strength expressed in a full life.",
      prayer:"God who created wisdom and offers it freely to those who ask, I come to you as a student of the way the world actually works when it is oriented toward you. Let me be the woman of Proverbs 31 who laughs at the future, not because she has no fear but because she knows who holds what is coming. She opens her mouth with wisdom. Let my mouth be that. She watches over her household. Let me be that kind of present in my home. She does not eat the bread of idleness. Let me be active in my calling without confusing activity with purpose. Clothe me in strength and dignity. Let it not be the performance of those things but the actual wearing of them. I want to be a woman whose life, when examined, says: she feared the Lord. Amen.", carry:"Identify one place today where you are performing, for approval, for safety, for the role others need you in. Name it. Then ask: what would the woman of valor, who laughs at the future, do instead?"
    },
    "James": {
      ref:"James 1:2-8, 19-22", title:"Do What It Says", lede:"Be doers of the word, and not only hearers.",
      scripture:`<p><span class="vnum">2</span>Count it all joy, my brothers, when you fall into various trials, <span class="vnum">3</span>knowing that the testing of your faith produces endurance. <span class="vnum">4</span>Let endurance have its perfect work, that you may be perfect and complete, lacking in nothing. <span class="vnum">5</span>But if any of you lacks wisdom, let him ask of God, who gives to all liberally and without reproach; and it will be given to him. <span class="vnum">6</span>But let him ask in faith, without any doubting, for he who doubts is like a wave of the sea, driven by the wind and tossed. <span class="vnum">19</span>So then, my beloved brothers, let every man be swift to hear, slow to speak, and slow to anger; <span class="vnum">20</span>for the anger of man doesn't produce the righteousness of God. <span class="vnum">21</span>Therefore putting away all filthiness and overflowing of wickedness, receive with humility the implanted word, which is able to save your souls. <span class="vnum">22</span>But be doers of the word, and not only hearers, deluding your own selves.</p>`,
      author:"James, brother of Jesus", when:"Roughly 45-50 CE, possibly the earliest New Testament letter", where:"Jerusalem", audience:"Jewish Christians scattered throughout the Roman world",
      context:"James may have written his letter before Paul wrote any of his. It reads like a sermon, direct, practical, structured around pairs: trials and wisdom, faith and doubt, hearing and doing. James does not do sustained theological argument the way Paul does. He makes statements and moves on. He trusts the reader to feel the weight of them.",
      keyTerms:[{script:"ὑπομονή",word:"hypomone",lang:"Greek",gloss:"endurance, steadfastness, the capacity to remain under pressure without collapsing",note:"The testing of your faith produces hypomone. This is not passive waiting. It is active remaining. Staying under the weight until the weight produces something."}],
      relatable:"Faith without works is dead. James was not arguing against Paul, he was correcting a misreading of Paul that was using grace as a reason to do nothing. Real faith changes what you do on Tuesday. It changes how you treat the employee. It changes what happens with your resources when someone in front of you is in need. The Black church has always understood this, that faith is not private and it is not passive. It is expressed in the community. It is tested in the daily decisions. It is alive in the doing.",
      themes:"James is the epistle of practical theology. It is also the epistle that condemns the preferential treatment of the wealthy in worship spaces, you invite the person in fine clothes to the best seat and tell the poor person to stand by the wall. James says that is evil. The church that rearranges its priorities to accommodate wealth and power while marginalizing the poor is the specific target of James's sharpest critique. This critique has not aged. Black churches navigating the prosperity gospel and the performance of wealth know exactly what James is addressing.",
      prayer:"God of the wisdom that comes from above, which is pure, peace-loving, considerate, submissive, full of mercy and good fruit, impartial and sincere, I ask for it. Simply. Directly. Without doubting. You give generously to all without finding fault. I receive what you have for me today. And I give what I have, because faith without works is dead. I name the action that my faith is asking of me today. The one I know I need to do that I have been delaying. The giving that makes no sense on paper. The conversation I have been avoiding. The person I have been not showing up for. Let my faith be alive in that action today. You are the one who looks at what I do and sees whether it matches what I say I believe. Let it match today. Amen.", carry:"Faith without works is dead. Name one thing you believe that you are not currently living. Then do one action today that matches what you say you believe. Let your faith be alive in something visible."
    },
    "Luke": {
      ref:"Luke 15:11-24", title:"The Prodigal Son", lede:"But when he was still a great way off, his father saw him.",
      scripture:`<p><span class="vnum">11</span>He said, "A certain man had two sons. <span class="vnum">12</span>The younger of them said to his father, 'Father, give me my share of your property.' He divided his livelihood between them. <span class="vnum">13</span>Not many days after, the younger son gathered all of this together and traveled into a far country. There he wasted his property with reckless living. <span class="vnum">15</span>He went and joined himself to one of the citizens of that country, and he sent him into his fields to feed pigs. <span class="vnum">17</span>But when he came to himself he said, 'How many hired servants of my father's have bread enough to spare, and I'm dying with hunger! <span class="vnum">18</span>I will get up and go to my father.' <span class="vnum">20</span>He arose and came to his father. But while he was still far off, his father saw him, and was moved with compassion, and ran, and fell on his neck, and kissed him. <span class="vnum">22</span>But the father said to his servants, 'Bring out the best robe, and put it on him. Put a ring on his hand, and shoes on his feet. <span class="vnum">23</span>Bring the fattened calf, kill it, and let us eat, and celebrate; <span class="vnum">24</span>for this, my son, was dead, and is alive again. He was lost, and is found.'</p>`,
      author:"Luke", when:"Roughly 60-80 CE", where:"Unknown", audience:"Theophilus and a Greek-speaking Gentile audience",
      context:"Luke 15 contains three parables about lost things: a lost sheep, a lost coin, a lost son. Jesus told all three in response to the religious leaders grumbling that he welcomed and ate with sinners. The parable of the prodigal son is the third and longest. The father in the parable does something undignified by the standards of the day: he runs. A wealthy man of that culture did not run. He ran.",
      keyTerms:[{script:"σπλαγχνίζομαι",word:"splagchnizomai",lang:"Greek",gloss:"to be moved with compassion, a gut-level, visceral response to someone's suffering",note:"His father saw him and was splagchnizomai. This is the same word used of Jesus when he saw the crowds and healed them. The compassion is physical, immediate, and not withheld while the child is still at a distance."}],
      relatable:"Luke gave us the Magnificat, Mary's song. My soul magnifies the Lord. He has brought down the mighty from their thrones and lifted up the lowly. He has filled the hungry with good things and sent the rich away empty. This was not sung after the situation improved. Mary sang it when she was an unmarried pregnant teenager in an occupied country, visiting her elderly cousin who was also mysteriously pregnant, with no visible resources and every social risk. The song was sung before any of it was resolved. That is a specific kind of faith.",
      themes:"Luke is the gospel of the marginalized and the gospel of the women. Luke named women throughout his narrative in ways the other gospels do not. He is the one who gave us Mary of Bethany sitting at Jesus's feet in the position of a disciple. He gave us the woman who lost her coin and swept until she found it. He gave us the persistent widow who wore down the unjust judge. Luke's Jesus is consistently on the side of the woman in the room that everyone else has decided does not belong.",
      prayer:"God who gave voice to Mary's song, I sing what she sang from my own experience. You have done great things for me. You have looked with favor on the lowly state of your servant. You scatter the proud. You bring down the powerful. You lift the humble. You fill the hungry. You send the comfortable away empty to make room for the ones who actually need you. I receive the favor that does not require my credentials. The lift that does not require the powerful to grant it. The filling that does not require the right people to notice I am hungry. You notice. You are the God who runs toward the returning child from a long way off. You have already seen me coming and you are already moving in my direction. Amen.", carry:"Write the first two lines of the Magnificat in your own words, what has God done for you specifically that the world would not predict? Say it. That is your song."
    },
    "1 Peter": {
      ref:"1 Peter 1:3-9", title:"A Living Hope", lede:"He has caused us to be born again to a living hope through the resurrection.",
      scripture:`<p><span class="vnum">3</span>Blessed be the God and Father of our Lord Jesus Christ, who according to his great mercy caused us to be born again to a living hope through the resurrection of Jesus Christ from the dead, <span class="vnum">4</span>to an incorruptible and undefiled inheritance that doesn't fade away, reserved in Heaven for you, <span class="vnum">5</span>who by the power of God are guarded through faith for a salvation ready to be revealed in the last time. <span class="vnum">6</span>In this you greatly rejoice, even though now for a little while, if necessary, you have been grieved by various trials, <span class="vnum">7</span>that the proof of your faith, being more precious than gold that perishes even though it is tested by fire, may be found to result in praise, glory, and honor at the revelation of Jesus Christ. <span class="vnum">8</span>Though you have not seen him, you love him. Though you don't see him now, yet believing, you rejoice greatly with joy unspeakable and full of glory, <span class="vnum">9</span>receiving the result of your faith, the salvation of your souls.</p>`,
      author:"Peter", when:"Roughly 62-65 CE", where:"Written from Rome, referred to as Babylon", audience:"Christians scattered throughout Asia Minor, people in exile",
      context:"Peter opens his letter with a doxology. He is writing to people who are experiencing real suffering, the word he uses for various trials is not hypothetical. He brackets the hardship with two things: what God has already done (caused you to be born again to a living hope) and what is already reserved for you (an inheritance that cannot be destroyed). He is giving people the full view of their situation.",
      keyTerms:[{script:"ἀναγεννάω",word:"anagennao",lang:"Greek",gloss:"to cause to be born again, to regenerate, to bring into new existence",note:"Born again to a living hope. The hope is living, it is not a wish or a sentiment. It is an active, present reality that was brought into existence by the resurrection."}],
      relatable:"You are a chosen people, a royal priesthood, a holy nation, God's special possession. Peter wrote this to people he called strangers in the world, scattered communities living as minorities in cultures that were hostile to them. He gave them the most expansive identity language in the New Testament. Not despite your marginality. Because of your faithfulness in it. You are a royal priesthood. You have priestly access to God and you carry the presence of God into every space you enter. That does not change when the room does not recognize it.",
      themes:"First Peter is the epistle of identity under pressure. Written to people who were being actively persecuted, Peter's instruction is not primarily about survival strategy. It is about identity maintenance, knowing who you are clearly enough that the external pressure cannot redefine you. Black women navigating spaces designed to make them doubt their worth, their intelligence, their right to be there, Peter's language is the counter-declaration. You are chosen. You are royal. You are holy. You are God's own possession. Say it until you believe it.",
      prayer:"God who chose a suffering people and called them royal, who took the scattered and named them a nation, who took the abandoned and named them the people of God, I receive that naming for myself today. I am chosen. Before the committee had a vote. I am royal. Before the organization offered a position. I am a holy nation, God's special possession, someone called out of darkness into his marvelous light. I will not live smaller than my name. I will not enter rooms as a guest when God put my name on the door. I will not perform humility that is actually self-erasure. I carry the presence of God into every space I enter. Let that change how I enter and how I move while I am there. Amen.", carry:"You are a royal priesthood. Before you enter the next difficult space today, say it. Say who you are before you go. Then walk in from that identity. Not from anxiety. From inheritance."
    },
    "Revelation": {
      ref:"Revelation 21:1-5", title:"All Things New", lede:"He who sits on the throne said, Behold, I am making all things new.",
      scripture:`<p><span class="vnum">1</span>I saw a new heaven and a new earth: for the first heaven and the first earth have passed away, and the sea is no more. <span class="vnum">2</span>I saw the holy city, New Jerusalem, coming down out of heaven from God, prepared like a bride adorned for her husband. <span class="vnum">3</span>I heard a loud voice out of heaven saying, "Behold, God's dwelling is with people, and he will dwell with them, and they will be his people, and God himself will be with them as their God. <span class="vnum">4</span>He will wipe away from them every tear from their eyes. Death will be no more; neither will there be mourning, nor crying, nor pain, any more. The first things have passed away." <span class="vnum">5</span>He who sits on the throne said, "Behold, I am making all things new." He said, "Write, for these words of God are faithful and true."</p>`,
      author:"John the Apostle", when:"Roughly 94-96 CE", where:"Written from the island of Patmos in exile", audience:"Seven churches in Asia Minor under Roman persecution",
      context:"John received the Revelation on the island of Patmos, where he had been exiled. The final vision of the book is not a destruction, it is a renovation. Not God abandoning the created order but God renewing it. The New Jerusalem does not appear in the sky as an escape destination. It comes down, God moving toward humanity, not away from it. He will dwell with them. The word for dwell is the same as John 1:14 where the Word dwelt among us.",
      keyTerms:[{script:"καινός",word:"kainos",lang:"Greek",gloss:"new, not newly made from nothing, but renewed, transformed, made fresh",note:"I am making all things kainos. Not neos, which would mean brand new, unrelated to what came before. Kainos is renewal, taking what exists and making it new. The creation is not thrown away. It is made new."}],
      relatable:"I am the Alpha and the Omega, the First and the Last, the Beginning and the End. John received this vision from Patmos, an island of political exile, where Rome sent people it wanted to silence. He was not silenced. He wrote the most expansive vision of the end of empires and the permanence of God's kingdom in the entire canon. The Babylon in Revelation is not one city. It is every system of power that has built itself on the exploitation of human beings. And the declaration over it is clear: fallen, fallen is Babylon the great. What oppresses you is not permanent. God is.",
      themes:"Revelation has been the foundational text of Black liberation theology in America. The enslaved read it and understood: Babylon is not eternal. The book of Revelation is not primarily about the end of the world. It is about the end of empire. It is the vision given to a man in exile of every oppressive system falling and the holy city coming down from God. The streets of gold are not excess, they are abundance for people who have been denied it. The water of life is free, for people who have been charged for everything. Revelation is the vision of what God is building to replace what empire built.",
      prayer:"God who is Alpha and Omega, who was and is and is to come, I come to you from a world that is loud with the evidence of empire. Systems that feel permanent. Powers that feel unassailable. Structures designed to make me believe this is as good as it gets or as stable as it gets or as permanent as it gets. And I receive the vision of Revelation: Babylon falls. Every system of exploitation, every economy built on someone else's labor and life, every structure that substitutes itself for your kingdom, falls. You are building something that cannot be shaken. Streets of gold for people who were told their worth was in their labor. Water of life free for people who were charged for everything. Come, Lord Jesus. And while I wait for the coming, let me live from the kingdom that is already here, already inside me, already moving through the people who carry your Spirit into places that have not yet seen your face. Amen.", carry:"Every system that feels permanent is temporary. God is Alpha and Omega. He has the last word on what endures. Name one thing that feels like it will always be this way. Then say: this is not the last chapter. He is."
    },
    "Mark": { ref:"Mark 10:46-52", title:"Blind Bartimaeus", lede:"Jesus, Son of David, have mercy on me.", scripture:`<p><span class="vnum">47</span>When he heard that it was Jesus the Nazarene, he began to cry out, "Jesus, you son of David, have mercy on me!" <span class="vnum">48</span>Many rebuked him, that he should be quiet, but he cried out much more, "You son of David, have mercy on me!" <span class="vnum">49</span>Jesus stood still, and said, "Call him." <span class="vnum">50</span>He, casting away his cloak, sprang up, and came to Jesus. <span class="vnum">51</span>Jesus asked him, "What do you want me to do for you?" He said to him, "Rabboni, that I may see again." <span class="vnum">52</span>Jesus said to him, "Go your way. Your faith has made you well." Immediately he received his sight, and followed Jesus in the way.</p>`, author:"Mark", when:"Roughly 55-65 CE", where:"Possibly Rome", audience:"Roman Christians", context:"Mark's gospel moves at speed, immediately appears forty times. Near the end, Bartimaeus is named, which is unusual. The crowd told him to be quiet. He got louder. Jesus stopped. He asked him: what do you want me to do for you? Bartimaeus threw off his cloak, his permit to beg, his livelihood, before he was healed. He acted as if the yes was already given.", keyTerms:[{script:"ἐλέησόν",word:"eleison",lang:"Greek",gloss:"have mercy, the root of Kyrie eleison, the oldest continuous prayer in the church",note:"Son of David, eleison me. He used the messianic title before most disciples understood who Jesus was."}], relatable:"Mark's gospel opens with no introduction, no genealogy, no birth narrative. It begins: the beginning of the gospel of Jesus Christ. And then Jesus appears in the wilderness being baptized. And immediately he healed. And immediately he called disciples. And immediately he taught. The word immediately appears forty-one times in Mark. The kingdom of God is not patient about suffering. When Jesus encountered it, he addressed it. Black women who have been told to wait patiently for justice, for healing, for recognition, Mark's Jesus did not tell people to wait. He healed them on the spot.", themes:"Mark is the gospel of urgency and the gospel of the underdog. His audience was likely the community in Rome, people under the direct threat of Nero's persecution, people who needed to know that the God they worshipped moved fast and moved for them. The miracles in Mark are not primarily about supernatural spectacle. They are about a God who sees suffering and responds to it immediately. That is not a comfortable Jesus. It is the Jesus Black liberation theology has always claimed.", prayer:"God who moved immediately, who never once said wait until conditions improve, I come to you with the thing I have been postponing. The healing I have been hoping for without fully receiving. The assignment I have been preparing for without stepping into. Mark's Jesus healed people on the spot. He cast out demons in the middle of a sermon. He fed people before he sent them away. His immediate response to suffering was not: I will consider this request. It was the touch, the word, the wholeness, now. I receive that immediacy for what I am carrying. I am not at the back of a queue. I am standing in front of the one who stopped for the woman who touched his hem, who called Lazarus out of a tomb, who is the same yesterday and today. Now. I receive it now. Amen.", carry:"Mark's Jesus moved immediately. What is one thing you have been delaying because you are waiting for the right conditions? Conditions will not become more right than they are today. Move toward it." },
    "Acts": { ref:"Acts 2:1-4, 42-47", title:"The Day the Church Began", lede:"When the day of Pentecost had come, they were all together in one place.", scripture:`<p><span class="vnum">1</span>When the day of Pentecost had come, they were all together in one place. <span class="vnum">2</span>Suddenly there came from the sky a sound like the rushing of a mighty wind, and it filled all the house where they were sitting. <span class="vnum">3</span>Tongues like fire appeared and were distributed to them, and one sat on each of them. <span class="vnum">4</span>They were all filled with the Holy Spirit. <span class="vnum">41</span>Those who received his word were baptized. There were added that day about three thousand souls. <span class="vnum">42</span>They continued steadfastly in the apostles' teaching and fellowship, in the breaking of bread, and prayer. <span class="vnum">44</span>All who believed were together, and had all things in common. <span class="vnum">47</span>The Lord added to their number day by day those who were being saved.</p>`, author:"Luke", when:"Roughly 62-80 CE", where:"Unknown", audience:"Theophilus and a Greek-speaking audience", context:"Acts 2 reversed Babel, languages divided at Genesis 11, united here. Peter's sermon followed. Three thousand came to faith in a day. The same crowd that weeks earlier called for crucifixion.", keyTerms:[{script:"πνεῦμα",word:"pneuma",lang:"Greek",gloss:"Spirit, wind, breath, the animating presence of God",note:"Filled with the pneuma. Same word used when God breathed life into the first human. Pentecost was a second creation breath."}], relatable:"The Holy Spirit fell on 120 people in the upper room. They included Mary, the mother of Jesus, and women who had followed him throughout his ministry. When Peter stood up and explained what was happening, he quoted Joel: your daughters will prophesy. The first Spirit-filled community was gender-integrated in its leadership from the first hour. The institution has been trying to walk that back ever since. What happened on Pentecost is the original charter. It is still in effect.", themes:"Acts is the record of a Spirit-led community that kept pushing past the boundaries of who was included. Every chapter is another expansion, into Samaria, into the Ethiopian eunuch's chariot, into the Gentile household of Cornelius, into Europe through Lydia's home. Lydia is the first recorded European convert. She was a businesswoman, a dealer in purple cloth, a woman of means who opened her home and effectively planted the Philippian church. The Holy Spirit's expansion has always moved through women. Acts documents it.", prayer:"God who poured your Spirit on all flesh on the day of Pentecost, I come to you to receive what was given in that upper room. Your Spirit without restriction. Your gifts without credential requirement. Your power without the institution's permission. You fell on 120 people, including every woman who had followed Jesus and stood at the cross and showed up at the tomb. You fell on them first. I receive the same Spirit today. Not a lesser portion. Not a conditional access. The same Spirit who raised Jesus from the dead lives in me right now. Let the gifts you placed in me be fully alive. Let the boldness of Pentecost come on me for the specific assignment I am in right now. I am in an upper room. Come, Holy Spirit. Amen.", carry:"You have the Holy Spirit. Right now. Not as a concept, as a presence and a power. Ask him what he wants to do through you today. Then listen for thirty seconds before you move to the next thing." },
    "2 Corinthians": { ref:"2 Corinthians 12:7-10", title:"My Grace Is Sufficient", lede:"My power is made perfect in weakness.", scripture:`<p><span class="vnum">7</span>A thorn in the flesh was given to me: a messenger of Satan to torment me, that I should not be exalted excessively. <span class="vnum">8</span>Concerning this thing, I begged the Lord three times that it might depart from me. <span class="vnum">9</span>He has said to me, "My grace is sufficient for you, for my power is made perfect in weakness." Most gladly therefore I will rather glory in my weaknesses, that the power of Christ may rest on me. <span class="vnum">10</span>For when I am weak, then am I strong.</p>`, author:"Paul", when:"Roughly 55-56 CE", where:"Macedonia", audience:"The church at Corinth", context:"Paul asked God three times to remove something. Three times. God said no. The answer was not silence, it was my grace is sufficient. Not your situation is not bad. Not this will end soon. Sufficient. What I give you is enough for what you are in.", keyTerms:[{script:"ἀσθένεια",word:"astheneia",lang:"Greek",gloss:"weakness, incapacity, the condition of not being sufficient on one's own",note:"Made perfect in astheneia. The weakness is not the problem. It is the condition in which the power operates."}], relatable:"We are hard pressed on every side, but not crushed. Perplexed, but not in despair. Persecuted, but not abandoned. Struck down, but not destroyed. Paul wrote this from inside the experience of all four. He was not describing a theology of eventual triumph. He was describing the maintenance of something essential, not being destroyed, in the middle of being struck down. The distinction matters. You do not have to be unaffected. You have to still be standing. That is a different standard and it is achievable.", themes:"Second Corinthians is the most personal of Paul's letters. He defends his ministry not through credentials but through suffering, through what he has been through and what has sustained him. The power made perfect in weakness is the central theological claim. For Black women who have been told their strength is in their endurance, their value in their productivity, Paul's inversion says the power shows up most clearly in the moments of visible weakness. The treasure in the clay jar is most visible when the jar is cracked.", prayer:"God whose power is made perfect in weakness, I come to you in the cracked-jar state. Hard pressed but not crushed. Perplexed but not in despair. Right now the hard-pressed part is very true and the not-crushed part is the part I need your help with. I am carrying this treasure in a very visible clay jar. The cracks are showing. The pressure is showing. And I am trusting that this is exactly the condition in which your power shows up most clearly, not because suffering is the point but because in my weakness you become undeniable. Show up undeniable in me today. The all-surpassing power that people can see has to come from somewhere beyond me, because I am clearly not enough to explain it. Be the explanation. Amen." },
    "1 John": { ref:"1 John 4:7-12, 19", title:"God Is Love", lede:"God is love. Whoever lives in love lives in God.", scripture:`<p><span class="vnum">7</span>Beloved, let's love one another, for love is of God; and everyone who loves has been born of God, and knows God. <span class="vnum">8</span>He who doesn't love doesn't know God, for God is love. <span class="vnum">9</span>By this God's love was revealed in us, that God has sent his one and only Son into the world that we might live through him. <span class="vnum">10</span>In this is love, not that we loved God, but that he loved us, and sent his Son as the atoning sacrifice for our sins. <span class="vnum">12</span>No one has seen God at any time. If we love one another, God remains in us, and his love has been perfected in us. <span class="vnum">19</span>We love him, because he first loved us.</p>`, author:"John the Apostle", when:"Roughly 85-95 CE", where:"Ephesus", audience:"Early churches under pressure from false teaching", context:"John was the last surviving member of the twelve. His response to false teaching was not a theological argument. It was: God is love, and whether you actually know God shows up in how you treat people.", keyTerms:[{script:"ἀγάπη",word:"agape",lang:"Greek",gloss:"the unconditional, self-giving love that IS God's nature",note:"God is agape. Not God has agape. God is agape. Love is not something God does. It is what God is."}], relatable:"God is love. This is not a sentimental statement. In the context of 1 John, it is a specific theological claim: love is not just what God does or how God acts. Love is what God is. Therefore, perfect love drives out fear. The fear and the love cannot coexist because they come from different sources. If you are operating from fear, you are not yet fully in the love. Not because you have done something wrong but because you have not yet fully received what has already been given. The antidote to fear is not willpower. It is deeper immersion in the love of God.", themes:"First John is the epistle of assurance. Three times John writes: we know that we know him. This is not arrogance. It is the settled confidence of someone who has encountered the real thing and will not be confused by the counterfeit. For Black women who have been made to doubt their access to God, by religious systems, by their own histories, by theological arguments designed to keep them uncertain, 1 John is the refusal of that doubt. He who is in you is greater than he who is in the world. You have the Holy Spirit. You know him. That is not uncertain.", prayer:"God who is love, not just loving but the source and substance of love itself, I receive the declaration of this letter over my specific fear. Perfect love drives out fear. Not my love. Yours. Cast out what I have been carrying in my chest since before I can remember. The fear of not being enough. The fear of being left. The fear of what happens if the thing I am afraid of actually happens. Cast it out the way you cast out anything that does not belong in your presence. Fear did not come from you. You gave me power and love and a sound mind. I receive all three right now. Let the love that is larger than the fear be what my nervous system rests in today. Let it be true in my body not just in my theology. Amen.", carry:"Perfect love drives out fear. Name the fear. Then name one specific truth about God's love that addresses that specific fear. Say the love truth directly to the fear. Say it out loud." },
    "Colossians": { ref:"Colossians 3:1-4, 14-15", title:"Hidden with Christ", lede:"Your life is hidden with Christ in God.", scripture:`<p><span class="vnum">1</span>If then you were raised together with Christ, seek the things that are above. <span class="vnum">2</span>Set your mind on the things that are above, not on the things that are on the earth. <span class="vnum">3</span>For you died, and your life is hidden with Christ in God. <span class="vnum">14</span>Above all these things, walk in love, which is the bond of perfection. <span class="vnum">15</span>And let the peace of God rule in your hearts, and be thankful. <span class="vnum">16</span>Let the word of Christ dwell in you richly.</p>`, author:"Paul", when:"Roughly 60-62 CE", where:"Written from prison", audience:"The church at Colossae", context:"Chapter 3: this is who you are (dead to the old, raised with Christ), therefore this is how you live. The theology drives the ethics.", keyTerms:[{script:"φρονέω",word:"phronéo",lang:"Greek",gloss:"to set one's mind, a particular orientation of thought and will",note:"Set your mind on things above. Not about avoiding earthly things. About the frame of reference from which you engage with everything."}], relatable:"Christ is all and in all. Paul said this to a community being pressured by elaborate spiritual hierarchies, angel worship, ascetic practices, and rules about what you could touch, taste, and handle. He said: all of that is a shadow. The substance is Christ. Whatever system you are navigating that makes you feel you need more than Christ, more credentials, more purity, more performance, more platform, Paul's letter is the answer. You are complete in him. Not becoming complete. Not working toward complete. You are complete in Christ now.", themes:"Colossians was written to address syncretism, the mixing of the gospel with other spiritual frameworks that ultimately diminished the sufficiency of Christ. It is remarkably relevant to a moment when Black women are navigating a proliferation of spiritual frameworks, when the self-help industry and the wellness industry and various spiritual practices compete for the space that the gospel claims. Paul's answer is not prohibition. It is elevation: set your mind on things above, where Christ is. When you have the real thing, the substitute loses its power.", prayer:"God in whom all the fullness of deity lives in bodily form, and in whom I have been brought to fullness, I come to you releasing every supplement I have been reaching for. Every system that promised to fill what I thought was still empty in me. I receive Colossians 2:10. I am complete. Not working toward complete. Complete. Right now. In this body, this season, this history. The fullness of Christ is in me. Not partially. Not conditionally. I set my mind on things above today, on the reality of where I am seated and what I carry, not on the circumstances that are trying to convince me I am less than what Christ made me. What was buried with him in baptism was buried. What was raised with him is raised. I am the raised version. Let me live like it today. Amen.", carry:"You are complete in Christ. Right now. Name one thing you are trying to acquire, achieve, or become in order to feel complete. Then say: I am already full. Let that be true just for today." },
    "2 Timothy": { ref:"2 Timothy 4:7-8", title:"I Have Kept the Faith", lede:"I have fought the good fight, I have finished the course.", scripture:`<p><span class="vnum">6</span>The time of my departure has come. <span class="vnum">7</span>I have fought the good fight. I have finished the course. I have kept the faith. <span class="vnum">8</span>From now on, the crown of righteousness is stored up for me, which the Lord, the righteous judge, will give to me on that day; and not to me only, but also to all those who have loved his appearing.</p>`, author:"Paul", when:"Roughly 67 CE, his last letter", where:"Written from prison in Rome awaiting execution", audience:"Timothy, his son in the faith", context:"Paul wrote this knowing he was about to be executed. He asks Timothy to bring his cloak and his books. Then: three sentences that summarize everything. I fought. I finished. I kept.", keyTerms:[{script:"ἀγῶν",word:"agon",lang:"Greek",gloss:"the contest, the organized struggle toward a goal",note:"The good agon. Not a metaphor for mild difficulty. A sustained contest with real opposition, real cost, a finish line."}], relatable:"Paul wrote 2 Timothy from prison, knowing he was close to death. He told Timothy: fan into flame the gift of God that is in you. The gift does not self-sustain. It requires tending. It requires your active participation in keeping it alive. For I know the one in whom I have placed my trust. That trust was not naive, Paul had been through everything. The confidence was earned through experience of God's faithfulness across the worst possible circumstances. He had finished the race. He had kept the faith. That was the testimony.", themes:"Second Timothy is a letter from a man on death row to the person he trusted most with what he had spent his life building. The charge he gave Timothy is the charge he gives every generation: preach the word, in season and out of season, in good times and bad times, when people want to hear it and when they do not. Black women who have been faithful teachers, preachers, and carriers of the word in institutions that did not fully honor them, Paul's final letter is for them. He saw that faithfulness. It mattered.", prayer:"God who gives a spirit of power and love and a sound mind, I come to you to fan into flame what you placed in me. The gift that has been going dim under the weight of discouragement and delay and the accumulated cost of being faithful in a world that does not always reward faithfulness. I will not let it go out. I fan it today. I choose to use what you gave me even before I feel confident about it. I have fought the good fight in seasons where fighting was not the right word for what I was doing. I have kept the faith when keeping was the only thing I had left to do. Finish the race in me. Bring me to the crown that waits at the end. And in the meantime, let me be to someone else what Paul was to Timothy: a voice that says you have what you need, use it, the grace of God is sufficient for what you were sent to do. Amen.", carry:"Fan into flame the gift of God that is in you. Name the gift. Then do one specific thing with it today, not the grand expression, the small one. Light the small fire. The large one grows from it." },
    "Exodus": { ref:"Exodus 14:13-14", title:"The Lord Will Fight for You", lede:"The Lord will fight for you. You need only to be still.", scripture:`<p><span class="vnum">10</span>Pharaoh drew near. The children of Israel were very afraid. They cried out to the Lord. <span class="vnum">13</span>Moses said to the people, "Don't be afraid. Stand still, and see the salvation of the Lord, which he will work for you today: for the Egyptians whom you have seen today, you shall never see them again. <span class="vnum">14</span>The Lord will fight for you, and you shall be still." <span class="vnum">21</span>Moses stretched out his hand over the sea, and the Lord drove the sea back by a strong east wind all night, and the waters were divided.</p>`, author:"Moses", when:"Events roughly 1446 BCE", where:"The Red Sea", audience:"Israel between Egypt and the wilderness", context:"The army was behind them. The sea was in front. The instruction in the moment of maximum threat: stand still and watch. The deliverance would be God's act, not theirs.", keyTerms:[{script:"יָשַׁע",word:"yashua",lang:"Hebrew",gloss:"salvation, the first use of this word in its fullest sense in the Torah",note:"See the yashua of the Lord. The deliverance about to happen will define Israel's understanding of salvation for the next three thousand years."}], relatable:"The Israelites did not plan their own escape. They were told to stand still while God moved. That instruction goes against everything hustle culture has told you, that your freedom is something you engineer, that your breakthrough depends on how hard you work, that stillness is a failure of strategy. God told them: the Egyptians you see today you will never see again. Some things that have been chasing you are not yours to defeat. They are God's assignment. Your job in that moment is to stop running and let him fight.", themes:"The Exodus is the foundational narrative of Black liberation theology. It was the story enslaved people held onto when every other story was taken from them. A God who sees oppression, names it, and moves to end it. A God who does not tell the enslaved to wait patiently for the oppressor's conscience to develop. He sends plagues. He opens water. He is not neutral about whose side he is on. That is not incidental to the gospel. It is the shape of it.", prayer:"God, the army is behind me and the sea is in front. I choose to stand still. You said you would fight for me. I am holding you to that. Amen.", carry:"Name the army behind you. The thing that has been chasing you. Then practice stillness for five minutes, not because nothing is happening, but because God is fighting on your behalf and you do not have to run." },
    "Joshua": { ref:"Joshua 1:7-9", title:"Be Strong and Courageous", lede:"Have I not commanded you? Be strong and courageous.", scripture:`<p><span class="vnum">7</span>Only be strong and very courageous. Don't turn from it to the right hand or to the left, that you may have good success wherever you go. <span class="vnum">8</span>This book of the law shall not depart from your mouth, but you shall meditate on it day and night. <span class="vnum">9</span>Haven't I commanded you? Be strong and courageous. Don't be afraid. Don't be dismayed, for the Lord your God is with you wherever you go.</p>`, author:"Joshua, with later additions", when:"Events roughly 1400 BCE", where:"East of the Jordan River", audience:"Israel on the threshold of the promised land", context:"Moses was dead. Joshua had just received leadership. God's instruction before the first battle was not strategic advice. It was: meditate on the law. Chazak, be strong, said three times in six verses. God knew Joshua was afraid.", keyTerms:[{script:"חָזַק",word:"chazak",lang:"Hebrew",gloss:"to be strong, to take hold firmly, a command not a compliment",note:"God says it three times. Not once as encouragement. Three times as command. The repetition is pastoral, he knew."}], relatable:"Be strong and courageous. God said it to Joshua four times in one chapter. Not once as encouragement. Four times. Because courage is not something you feel once and carry forward, it has to be spoken again and again into the specific fear of each new threshold. You have been told to be strong your whole life. What God is offering is different: not the performance of strength for others' comfort, but genuine courage sourced in his presence. He told Joshua why he could be courageous: because I am with you wherever you go.", themes:"Joshua is about taking territory that has been promised but requires action to possess. The land did not come without war, without courage, without showing up at walls that looked impossible. Black women have always understood this, that promised inheritance often requires a willingness to move toward what has not yet manifested. The theological argument of Joshua is that God's presence makes the possession possible, not the absence of opposition.", prayer:"God who gave Joshua the land and required him to move toward it, I come to you with the promised thing that is still unclaimed. You said it is yours. You have not taken it back. What is required of me is the courage to move toward it. Every place the sole of my foot treads you will give me. I have been standing at the edge. I move today. I take the first step toward the thing you placed before me. I will meditate on your word. I will not turn from it to the right or to the left. I will be strong and courageous not because I have figured out how it works but because the Lord my God is with me wherever I go. That is enough. I take the step. Amen.", carry:"What territory has God promised you that you have not moved toward yet? Name it. Then take one step, one specific action, toward it today. Not the whole plan. One step. The promise requires your movement." },
    "Ecclesiastes": { ref:"Ecclesiastes 3:1-8", title:"A Time for Everything", lede:"There is a time for everything, and a season for every activity.", scripture:`<p><span class="vnum">1</span>For everything there is a season, and a time for every purpose under heaven: <span class="vnum">2</span>a time to be born, and a time to die; a time to plant, and a time to pluck up; <span class="vnum">4</span>a time to weep, and a time to laugh; a time to mourn, and a time to dance; <span class="vnum">7</span>a time to keep silence, and a time to speak; <span class="vnum">8</span>a time to love, and a time to hate; a time for war, and a time for peace.</p>`, author:"Solomon (tradition) or later wisdom writer", when:"BC 935 BCE or later", where:"Jerusalem", audience:"People grappling with the apparent meaninglessness of human effort", context:"Ecclesiastes opens with hevel, vapor, breath. Everything is vapor. But chapter 3 is different. Both birth and death, weeping and laughing, mourning and dancing are given their season. The hard things have their time too.", keyTerms:[{script:"עֵת",word:"et",lang:"Hebrew",gloss:"time, the right moment, the appointed season",note:"For everything there is an et. Not time in general, the right time. The appropriate moment. What feels like the wrong season may simply be the season it is."}], relatable:"Solomon had everything the world says will satisfy: wealth, power, wisdom, pleasure, achievement. He examined all of it and said: vanity of vanities. Not because these things are evil but because they are insufficient. They do not reach the part of you that is hungry for meaning. In a culture that tells Black women their worth is in their productivity, their hustle, their brand, their output, their visibility, Ecclesiastes is the counter-testimony of someone who had all of it and still felt the emptiness underneath.", themes:"Ecclesiastes is the book of honest disillusionment that ends in the fear of God. The Teacher does not arrive at despair. He arrives at simplicity: fear God and keep his commandments. After examining every possible source of meaning and finding it wanting, he lands on the one thing that survives the examination. This is sophisticated theology, not naive faith but tested faith. The kind that comes out the other side of having tried everything else.", prayer:"God who is outside the vanity, who is the one thing that survives the examination of everything else, I come to you from the exhaustion of a season where I have tried a lot of things that did not satisfy. The achievement that felt empty after I got there. The relationship I thought would finally be enough. The platform I built that did not give me what I thought it would. Everything under the sun is vanity. But you are above the sun. Fear God and keep his commandments is the whole of it. Not the complicated version. The simple version. I simplify today. I orient back to the one relationship that is not vanity. I receive the peace that comes from knowing what actually matters and releasing what does not. Amen.", carry:"Fear God and keep his commandments. After all the examining, this is what remains. Name one command, not a rule, a relational instruction, that you have not been keeping. Do that one thing today." },
    "Daniel": { ref:"Daniel 3:17-18", title:"Even If He Does Not", lede:"Our God is able to deliver us. But even if he does not.",  scripture:`<p><span class="vnum">15</span>"Who is that god that will deliver you out of my hands?" <span class="vnum">16</span>Shadrach, Meshach, and Abednego answered, "Nebuchadnezzar, we have no need to answer you in this matter. <span class="vnum">17</span>If it be so, our God whom we serve is able to deliver us from the burning fiery furnace; and he will deliver us out of your hand, O king. <span class="vnum">18</span>But if not, be it known to you, O king, that we will not serve your gods, or worship the golden image which you have set up."</p>`, author:"Daniel, with later additions", when:"Events BC 605-530", where:"Babylon", audience:"Jewish exiles under sustained pressure to compromise", context:"Three young men. A ninety-foot statue. A second chance. Their response is one of the most theologically sophisticated statements in the Old Testament: God can deliver us. But even if he does not, we will not bow.", keyTerms:[{script:"וְהֵן",word:"v'hen",lang:"Hebrew",gloss:"but if not, the phrase that separates conditional faith from unconditional faith",note:"V'hen, but if not, we still will not bow. This is not a deficiency of faith. It is the highest expression of it."}], relatable:"Daniel did not stop praying when it became illegal. He went home, opened his window toward Jerusalem, and prayed as he always had. Three times a day. He did not make a scene. He did not argue with the law. He did not ask for protection before he obeyed. He simply continued being who he was. There is a theology in that, the quiet defiance of continuing your practice when systems demand you abandon it. Black spiritual practice has always understood this. Prayer was kept alive under every form of prohibition. It did not stop.", themes:"The Daniel narrative is about integrity under empire, the refusal to assimilate in ways that compromise covenant identity. Shadrach, Meshach, and Abednego did not know they would be delivered from the fire. They said: our God is able to deliver us. But even if he does not, we will not bow. That 'but even if he does not' is one of the most theologically significant phrases in the Old Testament. It separates faith from transaction. It is the faith of people who cannot guarantee the outcome but will not betray the covenant.", prayer:"God who is the Ancient of Days, who outlasts every empire and outranks every system that has tried to make faithfulness illegal, I come to you with my window open facing Jerusalem. I will pray as I always have. I will not stop the practice because the decree changed. I will not adjust my walk with you to accommodate what the powers of this world have decided is acceptable. Let me be the consistency of Daniel. Not dramatic. Not announcing my defiance. Simply continuing to be who I am before you every day regardless of what they say. And when the lions' den comes, let the mouth of what threatens me be shut. You are in the fire with me. You always have been. Amen.", carry:"Continue your practice today as you always have. Whatever it is, prayer, scripture, stillness, gratitude. Do it specifically today even if the circumstances argue against it. The window is open. Pray anyway." },
    "Job": { ref:"Job 1:20-22", title:"The Lord Gives and Takes Away", lede:"The Lord gave and the Lord has taken away. Blessed be the name of the Lord.",
      scripture:`<p><span class="vnum">1</span>There was a man in the land of Uz whose name was Job. He was blameless and upright, one who feared God and turned away from evil. <span class="vnum">2</span>There were born to him seven sons and three daughters. <span class="vnum">20</span>Then Job arose and tore his robe and shaved his head and fell on the ground and worshiped. <span class="vnum">21</span>He said, "Naked I came from my mother's womb, and naked shall I return. The Lord gave, and the Lord has taken away; blessed be the name of the Lord." <span class="vnum">22</span>In all this Job did not sin or charge God with wrong.</p>`,
      author:"Unknown, possibly among the oldest texts in the Bible", when:"Unknown, possibly BC 1500-1000", where:"The land of Uz", audience:"People in unexplained suffering",
      context:"Job lost everything, his children, his wealth, his health, in rapid succession. His friends came and sat with him in silence for seven days. That silence was the best thing they did. When they opened their mouths they offered explanations. God rebuked them: you have not spoken what is right, as my servant Job has. Job argued with God. Demanded answers. Was answered from the whirlwind, not with explanation but with presence. God never answered the why. He answered the who.",
      keyTerms:[{script:"בָּרַך",word:"barak",lang:"Hebrew",gloss:"to bless, and, paradoxically, also used as a euphemism for curse",note:"Blessed be the name of the Lord. Job blesses God in the moment of maximum loss. The same word his wife later uses when she says: curse God and die. Same word. Opposite direction. Job chose blessing."}],
      relatable:"Job's friends did what people have been doing to suffering Black women for centuries: they offered theological explanations for pain that protected their own comfort. They said: something you did brought this. Something you failed at caused this. If you would just repent, if you would just be more faithful, if you would just trust more, this would lift. God called it what it was. He told them they had not spoken what was right. He told them to go ask Job to pray for them. He took the side of the one who suffered, not the ones who explained.",
      themes:"Job is the book that gave Black liberation theologians permission to question. It established that lament is legitimate, that demanding an answer from God is not faithlessness, that suffering is not always deserved, and that God will correct the theology of people who use his name to silence the grieving. Womanist theologian Delores Williams has written that Job's restoration does not cancel the suffering, it comes after it. The integrity of the complaint is honored. God engages with it directly.",
      prayer:"God who sided with Job against the friends who explained his pain, I come to you with the things I have been told are my fault that are not my fault. The suffering that has been given theological explanations that were really about someone else's comfort. I bring the honest version. I do not package this for palatability. You told Job he had spoken what was right. You honor the honest cry. I bring mine. And I trust that you will answer it the way you answered Job, from the whirlwind, from the enormity of who you are, which is not always an explanation but is always a presence. Be present in my unanswered questions. Let your presence be enough when the explanation does not come. Amen.", carry:"Write down one thing you have been told about why your suffering is your fault. Then write what God said about Job: you have spoken what is right. Say the honest thing to God today. He will not correct your grief." },
